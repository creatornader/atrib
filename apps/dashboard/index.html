<style>
  /*
   * atrib explorer, design system
   * D054 option 1, single-file vanilla; no framework, no build.
   */

  :root {
    /* Product token aliases, kept in sync with atrib-web/DESIGN.md. */
    --color-background: #0a0a0a;
    --color-surface: #131210;
    --color-surface-raised: #1c1a17;
    --color-foreground: #f5f4ee;
    --color-muted: #8a877e;
    --color-muted-foreground: #b8b5ac;
    --color-border: #2d2a25;
    --color-border-strong: #423e36;
    --color-accent: #e8a04f;
    --color-accent-strong: #f0b46c;

    /* Surface */
    --bg: var(--color-background);
    --surface: var(--color-surface);
    --surface-2: var(--color-surface-raised);
    --surface-hover: #24211d;
    --border: var(--color-border);
    --border-subtle: #211f1b;

    /* Text */
    --text: var(--color-foreground);
    --text-2: var(--color-muted-foreground);
    --text-3: var(--color-muted);
    --text-4: #4d4c48;

    /* Brand: amber, evoking wax seal / signed / highlighted */
    --accent: var(--color-accent);
    --accent-strong: var(--color-accent-strong);
    --accent-subtle: rgba(232, 160, 79, 0.12);
    --accent-border: rgba(232, 160, 79, 0.3);

    /* Status */
    --ok: #34d399;
    --ok-subtle: rgba(52, 211, 153, 0.12);
    --ok-border: rgba(52, 211, 153, 0.3);
    --warn: #fbbf24;
    --warn-subtle: rgba(251, 191, 36, 0.12);
    --warn-border: rgba(251, 191, 36, 0.3);
    --err: #f87171;
    --err-subtle: rgba(248, 113, 113, 0.12);
    --err-border: rgba(248, 113, 113, 0.3);
    --info: #60a5fa;
    --info-subtle: rgba(96, 165, 250, 0.12);
    --info-border: rgba(96, 165, 250, 0.3);
    --muted: #9ca3af;
    --muted-subtle: rgba(156, 163, 175, 0.1);

    /* Per event_type chip colors */
    --et-tool-call: var(--info);
    --et-tool-call-subtle: var(--info-subtle);
    --et-tool-call-border: var(--info-border);
    --et-transaction: var(--accent);
    --et-transaction-subtle: var(--accent-subtle);
    --et-transaction-border: var(--accent-border);
    --et-observation: #c084fc;
    --et-observation-subtle: rgba(192, 132, 252, 0.12);
    --et-observation-border: rgba(192, 132, 252, 0.3);
    --et-extension: var(--muted);
    --et-extension-subtle: var(--muted-subtle);
    --et-extension-border: rgba(156, 163, 175, 0.25);
    /* atrib-system event types (e.g. directory_anchor, byte 0x04 per D056).
       Pink sits well outside both the agent-action triad (blue tool_call,
       amber transaction, purple observation) and the verification-badge
       greens, so infrastructure events read as a clearly distinct category.
       Falls back to this style for any future atrib-namespace URI that ships
       before its own byte allocation lands (renderEventChip safety net). */
    --et-system: #ec4899;
    --et-system-subtle: rgba(236, 72, 153, 0.12);
    --et-system-border: rgba(236, 72, 153, 0.3);
    /* Synthetic dangling nodes (§3.2.4 step 6/7/8): an INFORMED_BY,
       PROVENANCE_OF, or ANNOTATES reference that did not resolve to a
       record in the resolved set. Surfaces the agent's claim without
       pretending the upstream is recoverable here. Muted-warning style
       (warm grey) so the dangling marker reads as "incomplete" without
       competing with the err-red used for verification failures. */
    --et-dangling: #92400e;
    --et-dangling-subtle: rgba(146, 64, 14, 0.12);
    --et-dangling-border: rgba(146, 64, 14, 0.3);
    --ref-external: #9ca3af;
    --ref-missing: var(--err);
    --ref-unresolved: var(--warn);
    /* Annotation event_type (D058, byte 0x05): the recall-fidelity
       primitive. Annotations are commentary records pointing at any
       prior record via the `annotates` field. Distinct color from
       observation (purple) since their cognitive role is different,
       annotations are forward-pointing claims about earlier records,
       observations are first-class signed events. Teal sits between
       observation's purple and tool_call's blue, signalling "related
       to but distinct from both." */
    --et-annotation: #14b8a6;
    --et-annotation-subtle: rgba(20, 184, 166, 0.12);
    --et-annotation-border: rgba(20, 184, 166, 0.3);
    /* Revision event_type (D059, byte 0x06): the contradiction-handling
       primitive. A revision asserts the agent now holds a position
       incompatible with the referenced predecessor (which stays immutable
       on the log). Distinct color from annotation (teal) because the
       semantics are different: annotation comments, revision supersedes.
       Indigo signals "structural change of stance" and reads as deeper /
       weightier than annotation's commentary tone. */
    --et-revision: #6366f1;
    --et-revision-subtle: rgba(99, 102, 241, 0.12);
    --et-revision-border: rgba(99, 102, 241, 0.3);

    /* Edge-type colors (graph viz), organized in two semantic tiers.
       Tier 1 (vibrant): the edges that carry meaning beyond
       structure. Each either gets a dedicated color (informed_by) or
       intentionally aliases a node color (annotates → annotation node,
       revises → revision node, converges_on → transaction node) so the
       visual cluster reads as a single semantic thread.
       Tier 2 (muted greys, graded): structural-derivation edges with no
       semantic content of their own. CHAIN_PRECEDES is "primary structural"
       (every non-genesis record has one), the SESSION_* and CROSS_SESSION
       edges are weaker derivations. The grey gradient marks this hierarchy
       (text-2 > text-3 > text-4 > muted). */
    /* Tier 1, semantic */
    --edge-ancestry:         #fb923c;                  /* informed_by + provenance_of (warm orange, no node analogue) */
    --edge-annotates:        var(--et-annotation);     /* tracks annotation node */
    --edge-revises:          var(--et-revision);       /* tracks revision node */
    --edge-converges:        var(--accent);            /* tracks transaction node */
    /* Tier 2, structural derivations, graded by strength */
    /* Structural edges deliberately use desaturated hues from different
       parts of the color wheel rather than a monochromatic grey ramp.
       The original --text-2/3/4 ramp had two failure modes: chain_precedes
       (#a0a3ab) and cross_session (#9ca3af) were near-identical at line
       widths, and the text-2/3/4 gradient is too tight to distinguish at
       1-2px stroke. Each color below is desaturated enough to read as
       "structural / quiet" relative to the semantic edges (orange for
       ancestry, teal for annotates, etc.) while staying distinguishable
       from each other at small line widths. */
    --edge-chain:            #6b8aaf;  /* chain_precedes, desaturated slate-blue (primary structural backbone) */
    --edge-session-precedes: #8a7aa8;  /* session_precedes, desaturated indigo (fallback sequencing) */
    --edge-session-parallel: #6b8e7a;  /* session_parallel, desaturated sage (equal-time peers) */
    --edge-cross-session:    #a08672;  /* cross_session, desaturated taupe (across-session derived) */

    /* Type */
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, Roboto, sans-serif;
    --font-mono: ui-monospace, "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;

    /* Layout */
    --container: 1180px;
    --radius: 8px;
    --radius-sm: 5px;
  }

  * { box-sizing: border-box; }
  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: clip;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.55 var(--font-sans);
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    overflow-x: clip;
    min-width: 0;
  }

  ::selection { background: var(--accent); color: var(--bg); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--surface-hover); }

  a { color: var(--accent); text-decoration: none; transition: color 120ms ease; }
  a:hover { color: var(--accent-strong); text-decoration: underline; text-underline-offset: 2px; }
  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

  .skip-link {
    position: fixed;
    left: 16px;
    top: 16px;
    z-index: 1000;
    transform: translateY(-140%);
    border-radius: var(--radius-sm);
    background: var(--text);
    color: var(--bg);
    padding: 10px 14px;
    font: 600 13px/1 var(--font-sans);
  }
  .skip-link:focus,
  .skip-link:focus-visible {
    transform: translateY(0);
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  code {
    font: 12.5px/1.4 var(--font-mono);
    color: var(--text);
    background: var(--surface-2);
    padding: 1px 6px;
    border-radius: 3px;
    /* Code chips wrap AS UNITS in flowing prose, not character-by-character.
       word-break: break-all (the previous setting) split tokens like
       `informed_by` mid-identifier into `informed` + `_by` on two lines, with
       the chip background painting both halves separately. overflow-wrap:
       anywhere only breaks when the token alone exceeds container width
       (e.g. a 64-char hash in a narrow column), and white-space: nowrap
       keeps short identifiers together. The combination handles:
      , flowing prose with `informed_by` chips → chips stay intact, lines wrap between chips
      , long hashes inside narrow panels → soft-break to fit
      , identifier names with underscores → never split mid-token
       Reference: this is the third recurring layout bug from word-break:break-all,
       fixed once globally rather than per-view. Applies to every <code> in
       every view via the cascade. */
    white-space: nowrap;
    overflow-wrap: anywhere;
  }
  pre {
    font: 12.5px/1.55 var(--font-mono);
    background: var(--surface-2);
    border: 1px solid var(--border-subtle);
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    max-height: 420px;
    max-width: 100%;
    min-width: 0;
    color: var(--text-2);
  }

  /* ─── Page header (top nav) ──────────────────────────────────────────── */
  /* Scoped to body > header so it doesn't bleed into per-view <header class="view-header">. */

  body > header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    padding: 14px max(20px, calc((100vw - var(--container)) / 2 + 20px));
    border-bottom: 1px solid var(--border);
    background: rgba(10, 11, 14, 0.85);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    position: sticky; top: 0; z-index: 50;
  }
  body > header .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  body > header .brand a {
    color: var(--text); font: 600 16px/1 var(--font-sans);
    letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  body > header .brand a:hover { text-decoration: none; color: var(--accent-strong); }
  body > header .brand .seal {
    display: block; width: 20px; height: 20px;
    border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(232, 160, 79, 0.16), inset 0 -2px 4px rgba(0, 0, 0, 0.28);
  }
  body > header .brand .sub {
    color: var(--text-3); font: 12px/1 var(--font-mono);
    padding-left: 10px; border-left: 1px solid var(--border);
    margin-left: 2px;
  }
  body > header nav {
    display: flex; gap: 4px; align-items: center;
    min-width: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  body > header nav::-webkit-scrollbar { display: none; }
  body > header nav a {
    color: var(--text-2); font: 500 13px/1 var(--font-sans);
    padding: 8px 12px; border-radius: var(--radius-sm);
    flex-shrink: 0;
    transition: background 120ms ease, color 120ms ease;
  }
  body > header nav a:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }
  body > header nav a.active { color: var(--accent); background: var(--accent-subtle); }
  @media (max-width: 520px) {
    body > header {
      gap: 10px;
      padding: 10px 12px;
      align-items: flex-start;
    }
    body > header .brand .sub { display: none; }
    body > header nav {
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 2px;
    }
    body > header nav a {
      padding: 7px 8px;
      font-size: 12px;
    }
  }

  /* ─── Layout ──────────────────────────────────────────────────────────── */

  main {
    width: min(100%, var(--container));
    margin: 0 auto;
    padding: 0 20px 80px;
    min-width: 0;
  }

  .stack { display: flex; flex-direction: column; gap: 32px; }
  .stack-sm { display: flex; flex-direction: column; gap: 12px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 24px;
  }
  .panel.flush { padding: 0; overflow: hidden; }
  .panel .panel-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .panel .panel-head h2 {
    margin: 0; font: 600 13px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-2);
  }
  .panel .panel-head .meta { font: 12px/1 var(--font-mono); color: var(--text-3); }
  .panel .panel-body { padding: 20px; }
  details.raw-panel > summary {
    list-style: none;
    cursor: pointer;
  }
  .raw-panel { margin-top: 24px; }
  details.raw-panel > summary::-webkit-details-marker { display: none; }
  .raw-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-2);
    font: 500 12px/1 var(--font-sans);
    text-transform: none;
  }
  .raw-toggle::before { content: "open"; }
  details.raw-panel[open] .raw-toggle::before { content: "close"; }
  /* Mobile horizontal-scroll fix for tables and graphs inside flush panels.
     The .panel.flush rule above sets overflow:hidden so rounded corners clip
     correctly. On narrow viewports that would also clip wide tables (the
     sessions table, claim history, action detail) and graph canvases (trace,
     session DAG, identity activity map), making them unreadable on mobile.
     Applying overflow-x:auto on tables AND graph containers, matching the
     existing .feed-wrap pattern at line 454, restores horizontal scroll
     globally, not just on the homepage feed. */
  @media (max-width: 720px) {
    .panel.flush { overflow-x: auto; overflow-y: hidden; }
    .panel.flush table { min-width: 540px; }
    .panel.flush .trace-graph { min-width: 540px; }
  }

  /* ─── Hero ───────────────────────────────────────────────────────────── */

  .hero {
    padding: 64px 0 48px;
    text-align: left;
    max-width: 880px;
    min-width: 0;
  }
  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--accent-subtle);
    border: 1px solid var(--accent-border);
    padding: 6px 10px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
  .hero .eyebrow .pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 var(--ok);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
    70%  { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
    100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
  }
  .hero h1 {
    font: 600 44px/1.08 var(--font-sans);
    letter-spacing: -0.025em;
    color: var(--text);
    margin: 0 0 18px;
    text-wrap: balance;
    overflow-wrap: anywhere;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero .lede {
    font: 17px/1.55 var(--font-sans);
    color: var(--text-2);
    margin: 0 0 28px;
    max-width: 700px;
  }
  .hero .quick-links {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
  }
  .hero .quick-links a {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 7px 12px;
    font: 500 13px/1 var(--font-sans);
    border-radius: var(--radius-sm);
    transition-property: background, border-color, color;
    transition-duration: 120ms;
    transition-timing-function: ease;
  }
  .hero .quick-links a:hover {
    background: var(--surface-hover); color: var(--text);
    border-color: var(--text-3);
    text-decoration: none;
  }
  .hero .quick-links a .arrow { color: var(--text-3); transition: color 120ms ease; }
  .hero .quick-links a:hover .arrow { color: var(--accent); }

  .verification-path {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 0 0 32px;
  }
  .verification-path .step {
    background: var(--surface);
    padding: 18px 20px;
    min-width: 0;
  }
  .verification-path .step .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 999px;
    background: var(--accent-subtle);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    font: 600 11px/1 var(--font-mono);
    margin-bottom: 12px;
  }
  .verification-path .step h2 {
    margin: 0 0 6px;
    font: 600 14px/1.25 var(--font-sans);
    color: var(--text);
  }
  .verification-path .step p {
    margin: 0;
    color: var(--text-3);
    font: 13px/1.5 var(--font-sans);
    text-wrap: pretty;
  }
  .event-key {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 32px 0 0;
  }
  .event-key .item {
    background: var(--surface);
    padding: 14px 16px;
    min-width: 0;
  }
  .event-key p {
    margin: 8px 0 0;
    color: var(--text-3);
    font: 12.5px/1.45 var(--font-sans);
    text-wrap: pretty;
  }
  .detail-status {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
    margin: -8px 0 24px;
  }
  .detail-status .item {
    background: var(--surface);
    padding: 16px 18px;
    min-width: 0;
  }
  .detail-status .label {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--text-3);
    font: 600 11px/1 var(--font-sans);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
  }
  .detail-status .label::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--info);
    box-shadow: 0 0 0 2px var(--info-subtle);
    flex: 0 0 auto;
  }
  .detail-status .item.ok .label::before {
    background: var(--ok);
    box-shadow: 0 0 0 2px var(--ok-subtle);
  }
  .detail-status .item.warn .label::before {
    background: var(--warn);
    box-shadow: 0 0 0 2px var(--warn-subtle);
  }
  .detail-status .value {
    color: var(--text);
    font: 600 15px/1.25 var(--font-sans);
    overflow-wrap: anywhere;
  }
  .detail-status .note {
    margin-top: 6px;
    color: var(--text-3);
    font: 12.5px/1.45 var(--font-sans);
    text-wrap: pretty;
  }
  .detail-path {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
    margin: -8px 0 24px;
  }
  .detail-path .step {
    background: var(--surface);
    padding: 14px 16px;
    min-width: 0;
  }
  .detail-path .step .num {
    display: inline-block;
    color: var(--accent);
    font: 600 11px/1 var(--font-mono);
    margin-bottom: 8px;
  }
  .detail-path .step h2 {
    margin: 0 0 5px;
    color: var(--text);
    font: 600 13px/1.25 var(--font-sans);
  }
  .detail-path .step p {
    margin: 0;
    color: var(--text-3);
    font: 12.5px/1.45 var(--font-sans);
    text-wrap: pretty;
  }

  /* ─── System pulse strip (demoted stats) ─────────────────────────────── */

  .pulse-strip {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .pulse-strip .stat {
    background: var(--surface);
    padding: 18px 22px;
    display: flex; flex-direction: column; gap: 6px;
    min-width: 0;
  }
  .pulse-strip a.stat {
    color: inherit;
    text-decoration: none;
    transition-property: background-color;
    transition-duration: 120ms;
    transition-timing-function: ease;
  }
  .pulse-strip a.stat:hover {
    background: var(--surface-hover);
  }
  .pulse-strip a.stat:hover .value {
    color: var(--accent);
  }
  .pulse-strip .stat .label {
    font: 500 11px/1 var(--font-sans);
    color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .pulse-strip .stat.ok .value { color: var(--ok); }
  .pulse-strip .stat.warn .value { color: var(--warn); }
  .pulse-strip .stat.err .value { color: var(--err); }
  .pulse-strip .stat .value {
    font: 600 22px/1.1 var(--font-sans);
    letter-spacing: -0.015em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .pulse-strip .stat .sub {
    font: 12px/1.3 var(--font-sans);
    color: var(--text-3);
  }
  /* Wide-row stat: opts a stat into spanning the full row. Used for
     composition-style breakdowns that benefit from horizontal room
     (avoids cramped wrapping when an atomic-stat row has a different
     final stat that is intrinsically a list, not a single number). */
  .pulse-strip .stat.wide { grid-column: 1 / -1; }

  @media (max-width: 720px) {
    main {
      max-width: 100vw;
      padding-left: 20px;
      padding-right: 20px;
    }
    body > header {
      padding: 14px 20px;
    }
    body > header .brand .sub {
      display: none;
    }
    .pulse-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .verification-path { grid-template-columns: 1fr; }
    .event-key { grid-template-columns: 1fr; }
    .detail-status { grid-template-columns: 1fr; }
    .detail-path { grid-template-columns: 1fr; }
    .hero,
    .pulse-strip,
    .verification-path,
    .event-key,
    .detail-status,
    .detail-path,
    .search-wrap,
    .feed-wrap {
      width: calc(100vw - 40px);
      max-width: 100%;
    }
    .hero .lede {
      max-width: 32ch;
      overflow-wrap: break-word;
    }
    .pulse-strip .stat { padding: 16px 14px; }
    .pulse-strip .stat .label,
    .pulse-strip .stat .sub {
      overflow-wrap: anywhere;
    }
    .search-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px;
      width: 100%;
    }
    .search-wrap input {
      width: 100%;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hero { padding-top: 48px; }
    .hero h1 { font-size: 30px; }
  }

  /* ─── Search ─────────────────────────────────────────────────────────── */

  .search-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    display: flex; gap: 4px;
    transition: border-color 120ms ease;
  }
  .search-wrap:focus-within { border-color: var(--accent); }
  .search-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 12px 14px;
    font: 14px/1 var(--font-mono);
    min-width: 0;
    width: 100%;
  }
  .search-wrap input:focus { outline: none; }
  .search-wrap input::placeholder { color: var(--text-4); }
  .search-wrap button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: 600 13px/1 var(--font-sans);
    letter-spacing: 0.01em;
    min-width: 48px;
    transition-property: background, color, transform;
    transition-duration: 120ms;
    transition-timing-function: ease;
  }
  .search-wrap button:hover { background: var(--accent-strong); }
  .search-help {
    font: 12px/1.5 var(--font-sans);
    color: var(--text-3);
    margin: 8px 2px 0;
  }
  .search-help code {
    background: transparent;
    color: var(--text-2);
    padding: 0;
    font-size: 12px;
  }

  /* ─── Activity feed ──────────────────────────────────────────────────── */

  .load-more {
    background: var(--surface-2);
    color: var(--text-2);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: 500 12px/1 var(--font-sans);
    letter-spacing: 0.02em;
    transition-property: background, border-color, color;
    transition-duration: 120ms;
    transition-timing-function: ease;
  }
  .load-more:hover { background: var(--surface-hover); color: var(--text); border-color: var(--accent); }

  .feed-wrap { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--radius); overflow: hidden; }
  /* Activity table mobile fix: on narrow viewports the table's columns
   * (creator_key, content_id, hash, action) overflow the wrapper. The base
   * wrapper rule above sets overflow:hidden (needed to clip rounded corners
   * for animations etc.); on mobile, switch to overflow-x:auto and pin a
   * min-width on the table so columns stay readable while horizontal scroll
   * is enabled. Defined AFTER the base rule so the cascade resolves correctly
   * (CSS specificity is identical; later rule wins). */
  @media (max-width: 720px) {
    .feed-wrap { overflow-x: auto; overflow-y: hidden; }
    table.feed { min-width: 540px; }
  }
  .feed-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .feed-head h2 {
    margin: 0; font: 600 13px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
  }
  .feed-head .live-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--ok);
    padding: 4px 8px; border-radius: 999px;
    background: var(--ok-subtle); border: 1px solid var(--ok-border);
  }
  .feed-head .live-tag .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok);
    animation: pulse 2s infinite;
  }
  .feed-head .meta { font: 12px/1 var(--font-mono); color: var(--text-3); }

  table.feed { width: 100%; border-collapse: collapse; font: 13.5px/1.4 var(--font-sans); }
  table.feed thead th {
    text-align: left;
    color: var(--text-3);
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 10px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-subtle);
  }
  table.feed tbody tr {
    border-bottom: 1px solid var(--border-subtle);
    transition: background 120ms ease;
  }
  table.feed tbody tr:last-child { border-bottom: none; }
  table.feed tbody tr:hover { background: var(--surface-hover); }
  table.feed tbody td { padding: 12px 16px; vertical-align: middle; }
  table.feed tbody td.shrink { white-space: nowrap; width: 1%; }
  table.feed tbody td .mono {
    font: 12.5px/1 var(--font-mono); color: var(--text-2);
  }
  /* New-row highlight: a sustained amber wash (not a flicker). The cell-level
   * animation matches the row-level so striped table backgrounds don't
   * override on tr. Holds full color for ~3.5s, fades over ~3s. Total
   * ~6.5s, long enough to actually catch the eye scanning the table. */
  table.feed tbody tr.new,
  table.feed tbody tr.new td {
    animation: rowEnter 6500ms ease-out;
  }
  @keyframes rowEnter {
    0%   { background-color: rgba(252, 211, 77, 0.18); }
    50%  { background-color: rgba(252, 211, 77, 0.18); }
    100% { background-color: transparent; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hero .eyebrow .pulse, .feed-head .live-tag .dot { animation: none; }
    table.feed tbody tr.new,
    table.feed tbody tr.new td { animation: none; }
  }

  /* ─── Chips & badges ─────────────────────────────────────────────────── */

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font: 500 11px/1 var(--font-sans);
    padding: 4px 8px;
    border-radius: 4px;
    text-transform: lowercase;
    letter-spacing: 0;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .chip.event-tool_call    { background: var(--et-tool-call-subtle);    color: var(--et-tool-call);    border-color: var(--et-tool-call-border); }
  .chip.event-transaction  { background: var(--et-transaction-subtle);  color: var(--et-transaction);  border-color: var(--et-transaction-border); }
  .chip.event-observation  { background: var(--et-observation-subtle);  color: var(--et-observation);  border-color: var(--et-observation-border); }
  .chip.event-extension        { background: var(--et-extension-subtle); color: var(--et-extension); border-color: var(--et-extension-border); }
  .chip.event-directory_anchor { background: var(--et-system-subtle);    color: var(--et-system);    border-color: var(--et-system-border); }
  .chip.event-annotation       { background: var(--et-annotation-subtle); color: var(--et-annotation); border-color: var(--et-annotation-border); }
  .chip.event-revision         { background: var(--et-revision-subtle);   color: var(--et-revision);   border-color: var(--et-revision-border); }
  .chip.event-system           { background: var(--et-system-subtle);    color: var(--et-system);    border-color: var(--et-system-border); }
  .chip.event-dangling_node    { background: var(--et-dangling-subtle);  color: var(--et-dangling);  border-color: var(--et-dangling-border); }
  .chip.ref-external           { background: var(--muted-subtle);        color: var(--ref-external); border-color: rgba(156, 163, 175, 0.25); }
  .chip.ref-missing            { background: var(--err-subtle);          color: var(--ref-missing);  border-color: var(--err-border); }
  .chip.ref-unresolved         { background: var(--warn-subtle);         color: var(--ref-unresolved); border-color: var(--warn-border); }
  .chip.event-reserved         { background: var(--err-subtle);          color: var(--err);          border-color: var(--err-border); }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font: 500 10.5px/1 var(--font-sans);
    padding: 3px 7px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.05em;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .badge.ok    { background: var(--ok-subtle);    color: var(--ok);    border-color: var(--ok-border); }
  .badge.warn  { background: var(--warn-subtle);  color: var(--warn);  border-color: var(--warn-border); }
  .badge.err   { background: var(--err-subtle);   color: var(--err);   border-color: var(--err-border); }
  .badge.info  { background: var(--info-subtle);  color: var(--info);  border-color: var(--info-border); }
  .badge.dim   { background: var(--muted-subtle); color: var(--muted); border-color: rgba(156, 163, 175, 0.2); }

  .verify-badges { display: inline-flex; gap: 4px; flex-wrap: wrap; }

  .receipt {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: 24px;
  }
  .receipt-main,
  .receipt-proof {
    background: var(--surface);
    min-width: 0;
  }
  .receipt-main { padding: 24px; }
  .receipt-proof { padding: 20px; }
  .receipt-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font: 600 11px/1 var(--font-sans);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  .receipt-kicker::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-subtle);
  }
  .receipt-main h2 {
    margin: 0 0 12px;
    font: 600 22px/1.2 var(--font-sans);
    letter-spacing: -0.015em;
    color: var(--text);
  }
  .receipt-main .hash {
    display: block;
    color: var(--text-2);
    font: 13px/1.5 var(--font-mono);
    overflow-wrap: anywhere;
    margin-bottom: 10px;
  }
  .receipt-summary {
    margin: 0 0 18px;
    color: var(--text-3);
    font: 13px/1.5 var(--font-sans);
    max-width: 62ch;
  }
  .receipt-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 18px;
  }
  .receipt-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-2);
    padding: 8px 11px;
    font: 500 13px/1 var(--font-sans);
  }
  .receipt-link:hover {
    background: var(--surface-hover);
    border-color: var(--accent-border);
    color: var(--text);
    text-decoration: none;
  }
  .proof-list {
    display: grid;
    gap: 12px;
    margin: 0;
  }
  .proof-step {
    display: grid;
    grid-template-columns: 22px minmax(0, 1fr);
    gap: 10px;
    align-items: start;
  }
  .proof-step .mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 999px;
    background: var(--ok-subtle);
    border: 1px solid var(--ok-border);
    color: var(--ok);
    font: 700 12px/1 var(--font-sans);
  }
  .proof-step.dim .mark {
    background: var(--muted-subtle);
    border-color: rgba(156, 163, 175, 0.2);
    color: var(--muted);
  }
  .proof-step strong {
    display: block;
    color: var(--text);
    font: 600 13px/1.25 var(--font-sans);
    margin-bottom: 3px;
  }
  .proof-step span {
    display: block;
    color: var(--text-3);
    font: 12.5px/1.45 var(--font-sans);
  }
  .proof-note {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--border-subtle);
    display: grid;
    gap: 10px;
  }
  .proof-note h3 {
    margin: 0 0 3px;
    color: var(--text);
    font: 600 12px/1.2 var(--font-sans);
  }
  .proof-note p {
    margin: 0;
    color: var(--text-3);
    font: 12.5px/1.45 var(--font-sans);
  }
  @media (max-width: 760px) {
    .receipt { grid-template-columns: 1fr; }
    .receipt-main,
    .receipt-proof { padding: 18px; }
  }

  /* ─── Identity label ─────────────────────────────────────────────────── */

  .id-label { display: inline-flex; align-items: center; gap: 8px; }
  .id-label .name { color: var(--text); font-weight: 500; }
  .id-label .key { color: var(--text-3); font: 11.5px/1 var(--font-mono); }

  /* ─── Footer ─────────────────────────────────────────────────────────── */

  footer {
    border-top: 1px solid var(--border-subtle);
    margin-top: 80px;
    padding: 32px max(20px, calc((100vw - var(--container)) / 2 + 20px));
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
    color: var(--text-3); font-size: 13px;
  }
  footer h3 {
    margin: 0 0 12px; font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2);
  }
  footer .endpoints code {
    background: transparent; padding: 0;
    color: var(--text-2);
    font-size: 12px;
  }
  footer .endpoints div { padding: 4px 0; }
  footer .links { display: flex; flex-direction: column; gap: 6px; }
  footer .links a { color: var(--text-2); }
  footer .links a:hover { color: var(--accent); }

  @media (max-width: 720px) { footer { grid-template-columns: 1fr; } }

  /* ─── Loading + error states ─────────────────────────────────────────── */

  .empty {
    color: var(--text-3); font-style: normal;
    padding: 32px 20px; text-align: center;
    font-size: 14px;
  }
  .empty .icon { font-size: 24px; opacity: 0.4; display: block; margin-bottom: 8px; }

  .err-banner {
    background: var(--err-subtle); border: 1px solid var(--err-border);
    color: var(--err); padding: 12px 16px;
    border-radius: var(--radius-sm); margin-bottom: 16px;
    font: 13px/1.5 var(--font-sans);
  }
  .err-banner .label { font-weight: 600; margin-right: 6px; }

  /* ─── View headers (per-view onboarding) ─────────────────────────────── */

  .view-header { margin: 32px 0 24px; }
  .view-header .crumb {
    display: inline-flex; gap: 6px; align-items: center;
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-3); margin-bottom: 12px;
  }
  .view-header h1 {
    margin: 0 0 8px;
    font: 600 28px/1.15 var(--font-sans);
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .view-header .subject {
    font: 13.5px/1.4 var(--font-mono);
    color: var(--text-2);
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    display: inline-block;
    margin-bottom: 16px;
    word-break: break-all;
  }
  .view-header .explainer {
    color: var(--text-2);
    font: 14px/1.6 var(--font-sans);
    max-width: 720px;
    margin: 8px 0 0;
  }
  .view-header .explainer .term {
    color: var(--accent); font-weight: 500;
  }

  /* ─── Key-value grids (per-view detail panels) ───────────────────────── */

  dl.kv {
    display: grid; grid-template-columns: 180px 1fr;
    gap: 0; margin: 0;
  }
  dl.kv dt, dl.kv dd {
    padding: 12px 0;
    border-bottom: 1px solid var(--border-subtle);
    margin: 0;
  }
  dl.kv dt {
    color: var(--text-3);
    font: 12px/1.4 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding-right: 16px;
  }
  dl.kv dd { color: var(--text); font: 13.5px/1.4 var(--font-sans); }
  dl.kv dt:last-of-type, dl.kv dd:last-of-type { border-bottom: none; }
  dl.kv dd .mono { font: 13px/1.4 var(--font-mono); color: var(--text-2); word-break: break-all; }

  /* ─── About view styling ─────────────────────────────────────────────── */

  .prose { max-width: 720px; color: var(--text-2); font-size: 15px; line-height: 1.7; }
  .prose h2 { color: var(--text); margin: 32px 0 12px; font: 600 18px/1.2 var(--font-sans); letter-spacing: -0.01em; }
  .prose h3 { color: var(--text); margin: 24px 0 8px; font: 600 14px/1.3 var(--font-sans); }
  .prose p { margin: 0 0 16px; }
  .prose ul { padding-left: 18px; margin: 0 0 16px; }
  .prose li { margin: 6px 0; }

  /* ─── Trace view (provenance ancestry) ──────────────────────────────── */

  .trace-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--surface-2);
    font: 13px/1.4 var(--font-sans);
  }
  .trace-controls label {
    color: var(--text-3);
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .trace-controls input[type=range] {
    accent-color: var(--accent);
    vertical-align: middle;
  }
  .trace-controls .depth-readout {
    font: 11px var(--font-mono);
    color: var(--text-3);
    min-width: 56px;
  }
  .trace-controls .start-link a {
    color: var(--text-2);
    text-decoration: none;
    border-bottom: 1px dotted var(--text-3);
  }
  .trace-controls .start-link a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  .trace-controls .actions { margin-left: auto; display: inline-flex; gap: 12px; }
  .trace-controls .actions a {
    color: var(--text-2);
    text-decoration: none;
    border-bottom: 1px dotted var(--text-3);
  }
  .trace-controls .actions a:hover { color: var(--accent); border-color: var(--accent); }

  .trace-graph {
    position: relative;
    width: 100%;
    height: 600px;
    background: var(--surface);
  }
  .trace-graph canvas {
    display: block;
    cursor: grab;
  }
  .trace-graph .graph-focus-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    width: 100%;
    height: 100%;
    pointer-events: none;
    cursor: inherit;
  }
  .trace-graph.is-dragging canvas { cursor: grabbing; }
  /* Camera controls: float over the graph in the top-right corner.
     Subtle by default so it doesn't compete with the graph content;
     strengthens on hover so it's findable when needed. Same color
     vocabulary as the search button. */
  .graph-camera-controls {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 5;
    display: inline-flex;
    align-items: stretch;
    overflow: hidden;
    background: var(--surface-2, var(--surface));
    border: 1px solid var(--border, rgba(255,255,255,0.08));
    border-radius: var(--radius-sm);
    opacity: 0.6;
    transition-property: opacity;

<script type="module">
// Pure graph-rendering helpers (layout selection, degree, node size,
// bbox, framed-camera default state) live in a sibling .mjs so a
// vitest suite can exercise the optimization-relevant branches without
// a browser. log-node serves /graph-utils.mjs from apps/dashboard/.
//
// Cache-busting: the URL carries a deploy-tag query param so Cloudflare's
// edge cache invalidates the import URL on every deploy. Without this,
// adding new exports to graph-utils.mjs ships an HTML that imports
// names the cached mjs doesn't define, causing the entire <script>
// to throw at module-resolution time and a blank explorer. Bump the
// tag whenever graph-utils.mjs changes its export surface.
import {
  HIERARCHICAL_EDGE_TYPES,
  DAGRE_MAX_EDGES,
  FA2_MAX_NODES,
  SIGMA_FRAMED_DEFAULT_CAMERA,
  LAYOUT_MODES,
  resolveLayoutMode,
  clusterSeedPositions,
  computeNodeDegrees,
  hasParallelEdges,
  computeNodeSizeFromCentrality,
  computeGraphBBox,
  computeNeighborhood,
  normalizeGraphRecordHash,
  graphNodeActionHash,
  graphReferenceStatus,
  referenceStatusLabel,
  graphNodeLegendEntry,
  isGraphReferenceNode,
  summarizeGraphNodes,
  summarizeReferenceEdges,
  buildReplayGraphFromEntries,
  computeDemoGraphSignature,
  computeDemoLaneOffset,
} from '/graph-utils.mjs?v=2026-05-25-graph-counts'

/*
 * atrib explorer, D054 option 1.
 * Single-file vanilla JS. Read-only public surface composing log + graph + directory.
 * Routes:
 *   /                              overview (live activity feed + system pulse + search)
 *   /identity/<creator_key>        identity view
 *   /session/<context_id>          session view
 *   /action/<record_hash>          action view
 *   /trace/<record_hash>           provenance trace view (ancestor DAG)
 *   /anchoring                     log + directory anchoring details
 *   /about                         what atrib is, how to read this
 */

const DEFAULTS = {
  log:       'https://log.atrib.dev/v1',
  graph:     'https://graph.atrib.dev/v1',
  directory: 'https://directory.atrib.dev/v6',
  archive:   'https://archive.atrib.dev/v1',
}

const POLL_INTERVAL_MS = 5000
const RECENT_LIMIT = 25

const STATIC_ROUTES = new Set(['/', '/overview', '/demo', '/anchoring', '/about'])
const DETAIL_ROUTE_PREFIXES = ['/identity/', '/session/', '/action/', '/trace/']

function normalizeRoutePath(value) {
  let path = String(value || '').trim()
  if (!path) return '/'
  if (path.startsWith('#')) path = path.slice(1)
  if (!path.startsWith('/')) path = `/${path}`
  path = path.replace(/\/{2,}/g, '/')
  if (path.length > 1 && path.endsWith('/')) path = path.slice(0, -1)
  if (path === '/dashboard' || path === '/dashboard.html') return '/'
  return path
}

function isExplorerRoutePath(path) {
  const normalized = normalizeRoutePath(path)
  return STATIC_ROUTES.has(normalized) || DETAIL_ROUTE_PREFIXES.some((prefix) => normalized.startsWith(prefix))
}

function currentRoutePath() {
  const hashPath = location.hash.startsWith('#/') ? normalizeRoutePath(location.hash.slice(1)) : ''
  const routePath = hashPath || normalizeRoutePath(location.pathname)
  if (hashPath) {
    history.replaceState(null, '', `${routePath}${location.search || ''}`)
  }
  return routePath
}

function navigateToRoute(path) {
  const nextPath = normalizeRoutePath(path)
  history.pushState(null, '', `${nextPath}${location.search || ''}`)
  route()
}

function endpoints() {
  const q = new URLSearchParams(location.search)
  return {
    log:       q.get('log')       || DEFAULTS.log,
    graph:     q.get('graph')     || DEFAULTS.graph,
    directory: q.get('directory') || DEFAULTS.directory,
    archive:   q.get('archive')   || DEFAULTS.archive,
  }
}

// ─── DOM helpers ─────────────────────────────────────────────────────────

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag)
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue
    if (k === 'class') e.className = v
    else if (k === 'style') e.style.cssText = v
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v)
    else e.setAttribute(k, v)
  }
  for (const c of children) {
    if (c == null || c === false) continue
    if (Array.isArray(c)) for (const i of c) { if (i != null && i !== false) e.append(i instanceof Node ? i : document.createTextNode(String(i))) }
    else e.append(c instanceof Node ? c : document.createTextNode(String(c)))
  }
  return e
}

function clearAndRender(node) {
  document.getElementById('app').replaceChildren(node)
}

// ─── Formatting helpers ──────────────────────────────────────────────────

function shorten(s, head = 6, tail = 4) {
  if (!s) return ''
  if (s.startsWith('sha256:')) return 'sha256:' + shorten(s.slice(7), head, tail)
  if (s.length < head + tail + 2) return s
  return `${s.slice(0, head)}…${s.slice(-tail)}`
}

function formatCount(value) {
  return typeof value === 'number' && Number.isFinite(value) ? value.toLocaleString() : '—'
}

function timeAgo(ms) {
  if (!ms || typeof ms !== 'number') return '—'
  const diff = Date.now() - ms
  if (diff < 0) return 'just now'
  const sec = Math.floor(diff / 1000)
  if (sec < 5) return 'just now'
  if (sec < 60) return `${sec}s ago`
  const min = Math.floor(sec / 60)
  if (min < 60) return `${min}m ago`
  const hr = Math.floor(min / 60)
  if (hr < 24) return `${hr}h ago`
  const day = Math.floor(hr / 24)
  if (day < 7) return `${day}d ago`
  return new Date(ms).toISOString().slice(0, 10)
}

function isoTime(ms) {
  if (!ms || typeof ms !== 'number') return ''
  return new Date(ms).toISOString()
}

// ─── Network helpers ─────────────────────────────────────────────────────

async function fetchJson(url, opts = {}) {
  const { timeoutMs, ...fetchOpts } = opts
  const ctrl = timeoutMs ? new AbortController() : null
  const timer = ctrl ? setTimeout(() => ctrl.abort(), timeoutMs) : null
  try {
    const r = await fetch(url, {
      headers: { accept: 'application/json' },
      ...fetchOpts,
      ...(ctrl ? { signal: ctrl.signal } : {}),
    })
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`)
    return r.json()
  } finally {
    if (timer) clearTimeout(timer)
  }
}

async function fetchMaybe(url, opts = {}) {
  try { return await fetchJson(url, opts) }
  catch (e) { return { _error: e.message } }
}

async function fetchTextMaybe(url) {
  try {
    const r = await fetch(url)
    if (!r.ok) return { _error: `${r.status} ${r.statusText}` }
    return { text: await r.text() }
  } catch (e) { return { _error: e.message } }
}

// ─── Identity-label cache ────────────────────────────────────────────────
// Many feed rows share a small set of creator_keys. Cache directory lookups
// across the page lifetime; "no claim" is a valid cached state too.

const identityCache = new Map() // key → { found, claim, version, epoch } or { _error }

async function resolveIdentity(creatorKey) {
  if (identityCache.has(creatorKey)) return identityCache.get(creatorKey)
  const ep = endpoints()
  // Custom fetch: treat 404 (no claim published) as a successful "no claim"
  // result rather than an error, per §6.1 absence of claim is normal.
  let result
  try {
    const r = await fetch(`${ep.directory}/lookup/${creatorKey}`, {
      headers: { accept: 'application/json' },
    })
    if (r.status === 404) {
      result = { found: false }
    } else if (!r.ok) {
      result = { _error: `${r.status} ${r.statusText}` }
    } else {
      result = await r.json()
    }
  } catch (e) {
    result = { _error: e.message }
  }
  identityCache.set(creatorKey, result)
  return result
}

// ─── Event-type chip ─────────────────────────────────────────────────────
// The 90-byte log entry (§2.3.1) only carries one byte for event_type, so any
// URI without a dedicated normative byte slot arrives here as 'extension'.
// As of D059 (2026-05-04), normative bytes are 0x01 tool_call, 0x02
// transaction, 0x03 observation, 0x04 directory_anchor (D056), 0x05
// annotation (D058), 0x06 revision (D059); the spec reserves 0x07-0xFE
// for future atrib normative additions per D036, and 0xFF for non-atrib-namespace extension
// URIs. Pre-D056 directory_anchor records (encoded 0xFF before the byte
// allocation landed) still arrive here as 'extension'; when one is signed
// by an atrib-system identity (claim URL in the atrib.dev namespace), the
// renderEventChip helper below relabels it rather than implying it's an
// external/non-normative type. Pre-D058 annotation records (emitted under
// downstream-consumer extension URIs before the byte allocation landed)
// remain valid signed records but carry the extension byte; they will be
// queryable via URI filter, not byte filter, until they age out.
function atribSystemSignerKind(creatorKey) {
  const lookup = identityCache.get(creatorKey)
  if (!lookup || !lookup.found) return null
  const subject = lookup.claim?.claim_subject
  if (!subject) return null

  // Canonical signal: explicit url host. Future self-claims should populate
  // this; checking it first lets the URL-based path supersede string sniffing.
  const url = subject.url
  if (typeof url === 'string') {
    let host
    try { host = new URL(url).host } catch { host = null }
    if (host === 'directory.atrib.dev') return 'directory_anchor'
    if (host === 'atrib.dev' || (host && host.endsWith('.atrib.dev'))) return 'system'
  }

  // Fallback: scan display_name + organization for atrib-namespace hostnames.
  // Existing self-claims (directory-node pre-D056-follow-up, log-node) encode
  // the system-identity intent in the friendly name rather than the url field.
  // Sniff for atrib.dev hostnames so the chip recognizes the signer until those
  // claims get re-published with proper url fields.
  const hay = `${subject.display_name ?? ''} ${subject.organization ?? ''}`.toLowerCase()
  if (hay.includes('directory.atrib.dev')) return 'directory_anchor'
  if (hay.includes('atrib.dev')) return 'system'

  return null
}

const EVENT_TYPE_ORDER = ['tool_call', 'observation', 'annotation', 'revision', 'transaction', 'directory_anchor', 'extension']

const EVENT_TYPE_INFO = {
  tool_call: {
    label: 'tool call',
    noun: 'tool call record',
    description: 'An agent invoked a tool or MCP method.',
  },
  transaction: {
    label: 'transaction',
    noun: 'transaction record',
    description: 'Commerce or settlement activity closed over the chain.',
  },
  observation: {
    label: 'observation',
    noun: 'observation record',
    description: 'The agent wrote an explicit note or conclusion.',
  },
  directory_anchor: {
    label: 'directory anchor',
    noun: 'directory anchor record',
    description: 'The identity directory committed a new state anchor.',
  },
  annotation: {
    label: 'annotation',
    noun: 'annotation record',
    description: 'The agent marked an earlier record with importance, topics, or a summary.',
  },
  revision: {
    label: 'revision',
    noun: 'revision record',
    description: 'The agent superseded an earlier position with a stated reason.',
  },
  system: {
    label: 'atrib system',
    noun: 'atrib system record',
    description: 'A system-level atrib event before a dedicated byte slot.',
  },
  extension: {
    label: 'extension',
    noun: 'extension record',
    description: 'A URI-defined event outside the core byte vocabulary.',
  },
  dangling_node: {
    label: 'reference',
    noun: 'reference placeholder',
    description: 'A referenced record is outside this graph response or missing from the log.',
  },
  reserved: {
    label: 'reserved',
    noun: 'reserved event',
    description: 'A reserved or unknown byte appeared in the log entry.',
  },
  unknown: {
    label: 'unknown',
    noun: 'signed record',
    description: 'The endpoint did not return an event type.',
  },
}

function humanEventLabel(value) {
  return String(value || 'unknown').replace(/_/g, ' ')
}

function pluralEventLabel(label, count) {
  if (count === 1) return label
  if (label.endsWith('y')) return `${label.slice(0, -1)}ies`
  if (label.endsWith('s')) return label
  return `${label}s`
}

function referenceHashFromId(id) {
  return normalizeGraphRecordHash(id)
}

function referenceHashFromNode(node) {
  return normalizeGraphRecordHash(node?.reference_hash || node?.id)
}

function referenceHashFromEdge(edge) {
  return normalizeGraphRecordHash(edge?.reference_hash || edge?.target)
}

function formatReferenceSummary(counts) {
  const parts = []
  if (counts.external > 0) parts.push(`${counts.external} external ref ${counts.external === 1 ? 'link' : 'links'}`)
  if (counts.missing > 0) parts.push(`${counts.missing} missing ref ${counts.missing === 1 ? 'link' : 'links'}`)
  if (counts.unresolved > 0) parts.push(`${counts.unresolved} unresolved ref ${counts.unresolved === 1 ? 'link' : 'links'}`)
  return parts.join(' · ')
}

function formatNodeScope(summary) {
  const pieces = [`${summary.recordNodeCount.toLocaleString()} signed ${summary.recordNodeCount === 1 ? 'record' : 'records'}`]
  if (summary.referenceNodeCount > 0) {
    pieces.push(`${summary.referenceNodeCount.toLocaleString()} reference ${summary.referenceNodeCount === 1 ? 'node' : 'nodes'}`)
  }
  return `${summary.totalNodeCount.toLocaleString()} nodes (${pieces.join(', ')})`
}

function formatReferenceStatus(usingFallback, nodeSummary, referenceEdgeCounts) {
  if (usingFallback) {
    return {
      value: 'not evaluated',
      note: 'Graph edges are unavailable in this log-derived view.',
      tone: 'info',
    }
  }

  const refSummary = formatReferenceSummary(referenceEdgeCounts)
  const refLinkCount = referenceEdgeCounts.external + referenceEdgeCounts.missing + referenceEdgeCounts.unresolved
  if (!refSummary && nodeSummary.referenceNodeCount === 0) {
    return {
      value: 'self-contained',
      note: 'No references point outside this rendered session.',
      tone: 'ok',
    }
  }
  if (!refSummary) {
    return {
      value: 'reference nodes',
      note: 'Reference placeholders are present, but no dangling reference links were returned.',
      tone: 'info',
    }
  }

  if (referenceEdgeCounts.missing > 0) {
    return {
      value: 'some missing',
      note: `${refSummary}. Missing refs are referenced by records but not indexed here.`,
      tone: 'warn',
    }
  }

  return {
    value: 'external context',
    note: `${refSummary} ${refLinkCount === 1 ? 'points' : 'point'} outside this rendered session.`,
    tone: 'info',
  }
}

function eventTypeInfo(eventType, creatorKey = null, eventTypeUri = null) {
  let key = eventType || 'unknown'
  let rawKey = key
  let uri = typeof eventTypeUri === 'string' ? eventTypeUri : null

  if (key === 'extension' && uri && uri.startsWith('https://atrib.dev/v1/types/')) {
    const leaf = uri.slice('https://atrib.dev/v1/types/'.length)
    if (EVENT_TYPE_INFO[leaf]) {
      key = leaf
      rawKey = leaf
    } else {
      const label = humanEventLabel(leaf)
      return {
        key: 'system',
        rawKey: leaf,
        label,
        noun: `${label} record`,
        description: `A URI-defined atrib event: ${uri}.`,
        uri,
      }
    }
  } else if (key === 'extension' && creatorKey) {
    const systemKind = atribSystemSignerKind(creatorKey)
    if (systemKind) {
      key = systemKind
      rawKey = systemKind
    }
  }

  const base = EVENT_TYPE_INFO[key]
  if (base) return { key, rawKey, uri, ...base }

  const label = humanEventLabel(key)
  return {
    key: 'extension',
    rawKey,
    label,
    noun: `${label} record`,
    description: 'A non-core event type returned by this endpoint.',
    uri,
  }
}

function renderEventKey() {
  const keys = ['tool_call', 'observation', 'annotation', 'revision', 'transaction', 'directory_anchor']
  return el('section', { class: 'event-key', 'aria-label': 'Event type key' },

function renderEventChip(eventType, creatorKey, eventTypeUri = null) {
  const info = eventTypeInfo(eventType, creatorKey, eventTypeUri)
  const rawSuffix = info.rawKey && info.rawKey !== info.key ? ` Raw type: ${info.rawKey}.` : ''
  const uriSuffix = info.uri ? ` URI: ${info.uri}.` : ''
  const title = `${info.noun}: ${info.description}${rawSuffix}${uriSuffix}`
  return el('span', {
    class: `chip event-${info.key}`,
    title,
    'aria-label': `Event type: ${info.label}. ${info.description}`,
  }, info.label)
}

function doSearch() {
  const q = document.getElementById('search').value.trim()
  if (!q) return
  if (/^[A-Za-z0-9_-]{43}$/.test(q))                navigateToRoute(`/identity/${q}`)
  else if (/^[0-9a-f]{32}$/.test(q))                navigateToRoute(`/session/${q}`)
  else if (/^sha256:[0-9a-f]{64}$/.test(q))         navigateToRoute(`/action/${q}`)
  else if (/^[0-9a-f]{64}$/.test(q))                navigateToRoute(`/action/sha256:${q}`)
  else alert('Not a recognized format.\n\nExpected one of:\n• creator key (43 chars base64url)\n• session id (32 hex chars)\n• record hash (64 hex chars, optionally sha256: prefixed)')
}

function evidenceBlocks(value) {
  const evidence = value && Array.isArray(value.evidence) ? value.evidence : []
  return evidence.filter((block) => block && typeof block === 'object')

function mergeArchiveEvidence(entry, archiveResponse) {
  if (!archiveResponse || archiveResponse._error) return entry
  const blocks = [...evidenceBlocks(entry), ...evidenceBlocks(archiveResponse)]
  if (blocks.length === 0) return entry
  const seen = new Set()
  const evidence = []
  for (const block of blocks) {
    const key = JSON.stringify(block)
    if (seen.has(key)) continue
    seen.add(key)
    evidence.push(block)
  }
  return {
    ...entry,
    evidence,
    archive: {
      record_hash: archiveResponse.record_hash,
      archived_at_ms: archiveResponse.archived_at_ms,
      retention_window_ms: archiveResponse.retention_window_ms,
      resolved_facts: archiveResponse.resolved_facts,
    },
  }
}

function evidenceStatus(blocks) {
  if (blocks.length === 0) {
    return {
      label: 'evidence',
      value: 'not attached',
      note: 'No verifier evidence blocks were returned with this action.',
      tone: 'info',
    }
  }
  const valid = blocks.filter((block) => block.valid === true).length
  const invalid = blocks.length - valid
  return {
    label: 'evidence',
    value: `${valid}/${blocks.length} valid`,
    note: invalid === 0
      ? 'External evidence blocks passed verifier checks.'
      : 'One or more external evidence blocks need verifier review.',
    tone: invalid === 0 ? 'ok' : 'warn',
  }
}
