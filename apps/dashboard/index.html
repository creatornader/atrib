function parseCheckpointSummary(checkpoint) {
  if (checkpoint._error || !checkpoint.text) {
    return { origin: null, treeSize: null, rootHash: null, error: checkpoint._error || null }
  }
  const lines = checkpoint.text.split('\n')
  const origin = lines[0] || null
  const treeSizeText = lines[1] || ''
  const rootHash = lines[2] || null
  const treeSize = /^\d+$/.test(treeSizeText.trim()) ? parseInt(treeSizeText.trim(), 10) : null
  return { origin, treeSize, rootHash, error: null }
}

function logHealthStat(recent, stats) {
  const latest = recent && Array.isArray(recent.entries) ? recent.entries[0] : null
  if (latest) {
    const info = eventTypeInfo(latest.event_type, latest.creator_key, latest.event_type_uri)
    const age = latest.timestamp_ms ? timeAgo(latest.timestamp_ms) : 'time unknown'
    const ageMs = typeof latest.timestamp_ms === 'number' ? Date.now() - latest.timestamp_ms : Infinity
    const value = ageMs <= 10 * 60 * 1000 ? 'live' : ageMs <= 60 * 60 * 1000 ? 'active' : 'quiet'
    const tone = value === 'quiet' ? 'warn' : 'ok'
    const hash = latest.record_hash ? shorten(latest.record_hash, 8, 4) : null
    return pulseStat(
      'log health',
      value,
      hash ? `newest ${info.label} ${age} · ${hash}` : `newest ${info.label} ${age}`,
      latest.record_hash
        ? { href: `/action/${latest.record_hash}`, title: 'Open the newest record in the log', tone }
        : { tone },
    )
  }
  if (recent && recent._error) {
    return pulseStat('log health', 'unavailable', recent._error, { tone: 'err' })
  }
  if (stats.newest_timestamp_ms) {
    return pulseStat('log health', 'active', `newest record ${timeAgo(stats.newest_timestamp_ms)}`, { tone: 'ok' })
  }
  return pulseStat('log health', '—', 'no records yet')
}

function updatePulseStrip(stats, checkpoint, recent = null) {
  const strip = document.getElementById('pulse-strip')
  if (!strip) return
  if (stats._error) {
    strip.replaceChildren(el('div', { class: 'stat', style: 'grid-column: 1 / -1;' },
      el('span', { class: 'label' }, 'system'),
      el('span', { class: 'value', style: 'color: var(--err);' }, 'log unreachable'),
      el('span', { class: 'sub' }, stats._error),
    ))
    return
  }
  const cp = parseCheckpointSummary(checkpoint)
  const treeSize = stats.tree_size ?? null
  const checkpointTreeMatches = cp.treeSize !== null && treeSize !== null && cp.treeSize === treeSize
  const snapshotSub = cp.rootHash
    ? `${formatCount(cp.treeSize)} records protected${checkpointTreeMatches ? '' : ' at snapshot'}`
    : cp.error || 'checkpoint unavailable'
  const snapshotTitle = cp.rootHash
    ? `Signed snapshot from ${cp.origin || 'the log'} at tree size ${formatCount(cp.treeSize)}. Open anchoring details for the checkpoint proof.`
    : 'Open anchoring details'
  strip.replaceChildren(
    logHealthStat(recent, stats),
    pulseStat('protected history', formatCount(stats.tree_size), 'signed records committed'),
    pulseStat('signing actors', formatCount(stats.distinct_signers), 'creator keys with records'),
    pulseStat(
      'proof status',
      cp.rootHash ? 'signed snapshot' : '—',
      snapshotSub,
      { href: '/anchoring', title: snapshotTitle, tone: cp.rootHash ? 'ok' : 'warn' },
    ),
  )
}

// Module-level state so renderFeed + load-more can compose without re-fetching.
let feedEntries = []
let feedTreeSize = 0

function renderFeed(entries, withAnimation, treeSize = null) {
  const body = document.getElementById('feed-body')
  if (!body) return
  feedEntries = entries
  if (treeSize !== null) feedTreeSize = treeSize
  const meta = document.getElementById('feed-meta')
  if (meta) {
    const totalSuffix = feedTreeSize > 0 ? ` of ${feedTreeSize.toLocaleString()}` : ''
    meta.textContent = `showing ${entries.length}${totalSuffix} signed records, newest first`
  }

  const tbl = el('table', { class: 'feed' },
    el('thead', {}, el('tr', {},
      el('th', {}, 'event'),
      el('th', {}, 'record'),
      el('th', {}, 'identity'),
      el('th', {}, 'session'),
      el('th', { class: 'shrink' }, 'when'),
      el('th', {}, 'trust checks'),
    )),
    el('tbody', {},
      ...entries.map((e, idx) => {
        const isNew = withAnimation && lastFeedTopHash !== null && idx === 0 && e.record_hash !== lastFeedTopHash
        return el('tr', { class: isNew ? 'new' : '' },
          el('td', {}, renderEventChip(e.event_type, e.creator_key)),
          el('td', {}, el('a', { href: `/action/${e.record_hash}` },
            el('span', { class: 'mono' }, shorten(e.record_hash, 13, 4)),
          )),
          el('td', {}, renderIdentityLabel(e.creator_key)),
          el('td', {}, el('a', { href: `/session/${e.context_id}` },
            el('span', { class: 'mono' }, shorten(e.context_id, 8, 4)),
          )),
          el('td', { class: 'shrink', title: isoTime(e.timestamp_ms), 'data-ts': String(e.timestamp_ms) }, timeAgo(e.timestamp_ms)),
          el('td', {}, renderVerifyBadges(e.creator_key)),
        )
      }),
    ),
  )
  body.replaceChildren(tbl)
  if (entries.length > 0) lastFeedTopHash = entries[0].record_hash
  renderLoadMore()
}

function renderLoadMore() {
  const wrap = document.getElementById('feed-loadmore')
  if (!wrap) return
  const haveMore = feedTreeSize > feedEntries.length
  if (!haveMore) { wrap.replaceChildren(); return }
  const remaining = feedTreeSize - feedEntries.length
  const btn = el('button', {
    class: 'load-more',
    onclick: loadOlder,
  }, `load older (${remaining.toLocaleString()} more)`)
  wrap.replaceChildren(btn)
}

async function loadOlder() {
  const wrap = document.getElementById('feed-loadmore')
  if (wrap) wrap.replaceChildren(el('span', { class: 'meta' }, 'loading…'))
  const ep = endpoints()
  // Pause polling while we paginate so the live tail doesn't race with our offset window.
  stopPolling()
  const offset = feedEntries.length
  const more = await fetchMaybe(`${ep.log}/recent?limit=50&offset=${offset}`)
  if (more._error || !more.entries || more.entries.length === 0) {
    if (wrap) wrap.replaceChildren(
      el('span', { class: 'meta' }, more._error || 'no more entries'),
    )
    if (isOverviewRoute()) startPolling()
    return
  }
  await resolveIdentities(more.entries.map(e => e.creator_key))
  renderFeed([...feedEntries, ...more.entries], false, more.tree_size ?? feedTreeSize)
  if (isOverviewRoute()) startPolling()
}
window.loadOlder = loadOlder

function populateQuickLinks(entries) {
  const wrap = document.getElementById('quick-links')
  if (!wrap || entries.length === 0) return
  // Pick the freshest entry that has all three IDs populated. Defensive:
  // every well-formed entry projection populates all three (record_hash +
  // context_id + creator_key are required by §2.3.1 binary entry layout),
  // but the filter guards against any future projection that drops a field
  // from listing payloads.
  const linkable = entries.find(
    (e) => e && e.record_hash && e.context_id && e.creator_key,
  ) ?? entries[0]
  const txn = entries.find((e) => e.event_type === 'transaction')
  // replaceChildren coerces non-Node args via String(), so passing JS null
  // renders the literal text "null". Filter optional links explicitly.
  const links = [
    el('a', { href: '/yc-demo' },
      'Watch the signed-context demo ', el('span', { class: 'arrow' }, '→'),
    ),
    el('a', { href: `/action/${linkable.record_hash}` },
      'Open a recent record ', el('span', { class: 'arrow' }, '→'),
    ),
    linkable.context_id && el('a', { href: `/session/${linkable.context_id}` },
      'Browse a recent session ', el('span', { class: 'arrow' }, '→'),
    ),
    linkable.creator_key && el('a', { href: `/identity/${linkable.creator_key}` },
      'Inspect an identity ', el('span', { class: 'arrow' }, '→'),
    ),
    txn && el('a', { href: `/action/${txn.record_hash}` },
        'See a transaction ', el('span', { class: 'arrow' }, '→'),
      ),
  ].filter(Boolean)
  wrap.replaceChildren(...links)
}

// ─── Demo mode: agent timeline + living graph replay ─────────────────────

let demoReplayHandle = null
let demoRefreshHandle = null
let demoReplayToken = 0
const DEMO_RECENT_LIMIT = 80
const DEMO_REPLAY_LIMIT = 24
const DEMO_LIVE_REFRESH_MS = 6000

function stopDemoReplay() {
  if (demoReplayHandle) {
    clearInterval(demoReplayHandle)
    demoReplayHandle = null
  }
  if (demoRefreshHandle) {
    clearInterval(demoRefreshHandle)
    demoRefreshHandle = null
  }
  demoReplayToken += 1
}

function nodeTimestamp(node) {
  const value = node?.timestamp ?? node?.timestamp_ms
  return typeof value === 'number' ? value : Date.parse(value || 0) || 0
}

function normalizeDemoGraph(graph) {
  const nodes = Array.isArray(graph?.nodes)
    ? graph.nodes
        .filter((node) => node?.id)
        .map((node) => ({
          ...node,
          record_hash: graphNodeRecordHash(node),
          timestamp: nodeTimestamp(node),
          verification_state: node.verification_state || 'log_committed',
        }))
    : []
  const nodeIds = new Set(nodes.map((node) => node.id))
  const edges = Array.isArray(graph?.edges)
    ? graph.edges.filter((edge) => nodeIds.has(edge.source) && nodeIds.has(edge.target))
    : []
  return {
    ...graph,
    nodes,
    edges,
    node_count: nodes.length,
    edge_count: edges.length,
  }
}

function chooseDemoContext(entries) {
  const counts = new Map()
  for (const entry of entries) {
    if (!entry.context_id) continue
    counts.set(entry.context_id, (counts.get(entry.context_id) ?? 0) + 1)
  }
  let best = null
  for (const [contextId, count] of counts) {
    if (!best || count > best.count) best = { contextId, count }
  }
  return best?.contextId || entries.find((entry) => entry.context_id)?.context_id || null
}

function demoStepRow(node, isLive, onSelect = null) {
  const hash = graphNodeRecordHash(node)
  const attrs = {
    class: isLive ? 'demo-step live' : 'demo-step',
    type: 'button',
    'data-node-id': node.id,
  }
  if (onSelect) {
    attrs.onclick = (event) => {
      event.preventDefault()
      event.stopPropagation()
      onSelect(node)
    }
    attrs.onkeydown = (event) => {
      if (event.key !== 'Enter' && event.key !== ' ') return
      event.preventDefault()
      event.stopPropagation()
      onSelect(node)
    }
  }
  return el('button', attrs,
    el('div', { class: 'when', ...(node.timestamp ? { 'data-ts': String(node.timestamp) } : {}) },
      node.timestamp ? timeAgo(node.timestamp) : 'queued'),
    el('div', { class: 'main' },
      el('div', {}, renderEventChip(node.event_type, node.creator_key, node.event_type_uri)),
      el('div', { class: 'summary' },
        graphNodeKindLabel(node.event_type),
        node.creator_key ? ' by ' : '',
        node.creator_key ? renderIdentityLabel(node.creator_key, { withLink: false }) : null),
      hash ? el('span', { class: 'hash' }, shorten(hash, 14, 6)) : null,
    ),
  )
}

function renderDemoTimeline(container, nodes, visibleCount, onSelect = null) {
  const priorCount = container._demoVisibleCount ?? 0
  const mustReset = priorCount > visibleCount || !container._demoTimelineInitialized
  if (mustReset) {
    container.replaceChildren()
    container._demoVisibleCount = 0
    container._demoTimelineInitialized = true
  }
  for (const row of container.querySelectorAll('.demo-step.live')) row.classList.remove('live')
  const start = container._demoVisibleCount ?? 0
  for (let i = start; i < visibleCount; i += 1) {
    const node = nodes[i]
    if (node) container.append(demoStepRow(node, i === visibleCount - 1, onSelect))
  }
  const last = container.lastElementChild
  if (last && last.classList?.contains('demo-step')) last.classList.add('live')
  container._demoVisibleCount = visibleCount
  container.scrollTop = container.scrollHeight
}

function renderDemoInspector(container, node, onClear = null, title = 'selected record') {
  if (!node) {
    container.hidden = true
    container.replaceChildren()
    return
  }
  const hash = graphNodeRecordHash(node)
  const tsMs = nodeTimestamp(node)
  container.hidden = false
  container.replaceChildren(
    el('div', { class: 'top' },
      el('div', { class: 'title' }, title),
      el('button', {
        class: 'close',
        type: 'button',
        'aria-label': 'Clear selected record',
        onclick: () => {
          if (onClear) onClear()
          renderDemoInspector(container, null, onClear)
        },
      }, 'clear'),
    ),
    el('dl', { class: 'details' },
      el('dt', {}, 'event'), el('dd', {}, renderEventChip(node.event_type, node.creator_key, node.event_type_uri)),
      el('dt', {}, 'identity'), el('dd', {}, node.creator_key ? renderIdentityLabel(node.creator_key) : 'unknown'),
      el('dt', {}, 'when'), el('dd', {}, tsMs ? timeAgo(tsMs) : 'queued'),
      el('dt', {}, 'record'), el('dd', {},
        hash
          ? el('a', { class: 'mono', href: `/action/${hash}` }, shorten(hash, 16, 8))
          : el('span', { class: 'mono' }, shorten(node.id || 'unknown', 16, 8))),
    ),
  )
}

async function renderDemo() {
  setActiveNav('demo')
  stopDemoReplay()
  stopPolling()
  const ep = endpoints()
  const myGen = currentRouteGeneration()
  const root = el('div', { class: 'demo-shell' })
  const timeline = el('div', { class: 'demo-agent-feed' },
    el('div', { class: 'empty' }, 'loading signed agent actions…'))
  const graphContainer = el('div', { class: 'trace-graph', id: 'demo-live-graph' },
    el('div', { class: 'loading' }, 'loading graph replay…'))
  const inspector = el('aside', { class: 'demo-inspector', hidden: '', 'aria-live': 'polite' })
  const meta = el('span', { class: 'meta' }, 'warming up')
  root.append(
    el('section', { class: 'demo-panel demo-timeline-panel' },
      el('div', { class: 'demo-panel-head' },
        el('h1', {}, 'live recent-action replay'),
        el('span', { class: 'demo-status' }, 'public log'),
      ),
      timeline,
    ),
    el('section', { class: 'demo-panel demo-graph-panel' },
      el('div', { class: 'demo-panel-head' },
        el('h2', {}, 'signed activity graph'),
        meta,
      ),
      el('div', { class: 'demo-graph-frame' }, graphContainer, inspector),
    ),
  )
  clearAndRender(root)

  const recent = await fetchMaybe(`${ep.log}/recent?limit=${DEMO_RECENT_LIMIT}`)
  if (!routeGenerationStillCurrent(myGen)) return
  if (recent._error || !recent.entries?.length) {
    timeline.replaceChildren(el('div', { class: 'empty' }, recent._error || 'No recent signed actions returned.'))
    graphContainer.replaceChildren(el('div', { class: 'err-banner' },
      el('span', { class: 'label' }, 'log error:'), recent._error || 'empty recent feed'))
    return
  }

  const contextId = chooseDemoContext(recent.entries)
  let latestRecentEntries = recent.entries
  const contextEntries = contextId
    ? recent.entries.filter((entry) => entry.context_id === contextId)
    : recent.entries
  await resolveIdentities(contextEntries.map((entry) => entry.creator_key).filter(Boolean))
  if (!routeGenerationStillCurrent(myGen)) return

  const graphResult = contextId ? await fetchMaybe(`${ep.graph}/graph/${contextId}?shape=compact`) : null
  if (!routeGenerationStillCurrent(myGen)) return
  let graph = null
  let sourceLabel = 'graph-node'
  if (graphResult && !graphResult._error && Array.isArray(graphResult.nodes) && graphResult.nodes.length > 1) {
    graph = normalizeDemoGraph(graphResult)
  }
  if (!graph || graph.edges.length === 0) {
    graph = normalizeDemoGraph(buildReplayGraphFromEntries(contextEntries.length > 1 ? contextEntries : recent.entries, { limit: DEMO_REPLAY_LIMIT }))
    sourceLabel = 'log replay'
  }
  if (graph.nodes.length === 0) {
    graphContainer.replaceChildren(el('div', { class: 'empty' }, 'No graphable records found.'))
    return
  }

  const trimDemoGraph = (candidate) => {
    const sortedNodes = candidate.nodes.slice().sort((a, b) => nodeTimestamp(a) - nodeTimestamp(b))
    const maxNodes = Math.min(DEMO_REPLAY_LIMIT, sortedNodes.length)
    const nodes = sortedNodes.slice(Math.max(0, sortedNodes.length - maxNodes))
    const nodeIds = new Set(nodes.map((node) => node.id))
    const edges = candidate.edges.filter((edge) => nodeIds.has(edge.source) && nodeIds.has(edge.target))
    return {
      ...candidate,
      nodes,
      edges,
      node_count: nodes.length,
      edge_count: edges.length,
    }
  }
  graph = trimDemoGraph(graph)

  try {
    await loadGraphLibs()
  } catch (e) {
    graphContainer.replaceChildren(el('div', { class: 'err-banner' },
      el('span', { class: 'label' }, 'graph library load error:'), ' ', e.message))
    return
  }
  if (!routeGenerationStillCurrent(myGen)) return

  let visibleCount = Math.min(3, graph.nodes.length)
  let clearGraphSelection = null
  let selectGraphNode = null
  let inspectorPinned = false
  let demoLayoutMode = 'timeline'
  let graphSignature = computeDemoGraphSignature(graph)
  const token = demoReplayToken
  const visibleNodeIds = new Set()
  let nodeIndexById = new Map(graph.nodes.map((node, index) => [node.id, index]))
  const syncVisibleNodes = () => {
    visibleNodeIds.clear()
    for (let i = 0; i < visibleCount; i += 1) {
      const node = graph.nodes[i]
      if (node) visibleNodeIds.add(node.id)
    }
  }
  const selectDemoNode = (node) => {
    inspectorPinned = true
    if (selectGraphNode) selectGraphNode(node.id)
    renderDemoInspector(inspector, node, () => {
      inspectorPinned = false
      if (clearGraphSelection) clearGraphSelection()
    }, 'selected record')
  }
  const updateReplayReadout = () => {
    syncVisibleNodes()
    const visibleEdges = graph.edges.filter((edge) => visibleNodeIds.has(edge.source) && visibleNodeIds.has(edge.target)).length
    meta.textContent = `${sourceLabel} · ${visibleNodeIds.size} nodes · ${visibleEdges} edges`
    renderDemoTimeline(timeline, graph.nodes, visibleCount, selectDemoNode)
    if (!inspectorPinned) {
      const latestNode = graph.nodes[Math.max(0, visibleCount - 1)]
      if (latestNode) renderDemoInspector(inspector, latestNode, null, 'latest record')
    }
  }
  const renderDemoGraph = async () => {
    nodeIndexById = new Map(graph.nodes.map((node, index) => [node.id, index]))
    syncVisibleNodes()
    graphContainer.replaceChildren()
    if (_activeSigmaInstance) {
      try { _activeSigmaInstance.kill() } catch {}
      _activeSigmaInstance = null
    }
    const { sigma, fitCameraToGraph, selectNode, clearSelection } = await renderSigmaDAG(graphContainer, graph, {
      layoutMode: demoLayoutMode,
      demoBranchLanes: demoLayoutMode === 'timeline',
      nodeSize: 13,
      focalSize: 18,
      isNodeVisible: (nodeId) => (nodeIndexById.get(nodeId) ?? Infinity) < visibleCount,
      onNodeClick: (_nodeId, sourceRecord, controls) => {
        inspectorPinned = true
        clearGraphSelection = controls?.clearSelection || null
        renderDemoInspector(inspector, sourceRecord, () => {
          inspectorPinned = false
          if (clearGraphSelection) clearGraphSelection()
        }, 'selected record')
      },
    })
    _activeSigmaInstance = sigma
    selectGraphNode = selectNode
    clearGraphSelection = clearSelection
    attachCameraControls(graphContainer, fitCameraToGraph, sigma)
    attachLayoutSwitcher(graphContainer, demoLayoutMode, (mode) => {
      demoLayoutMode = mode
      inspectorPinned = false
      renderDemoGraph().catch((e) => {
        renderGraphRenderError(graphContainer, e)
      })
    })
    updateReplayReadout()
  }
  try {
    await renderDemoGraph()
  } catch (e) {
    renderGraphRenderError(graphContainer, e)
    return
  }

  demoReplayHandle = setInterval(() => {
    if (token !== demoReplayToken || !routeGenerationStillCurrent(myGen) || !_activeSigmaInstance) return
    if (visibleCount < graph.nodes.length) {
      visibleCount += 1
    } else {
      visibleCount = Math.min(3, graph.nodes.length)
    }
    updateReplayReadout()
    _activeSigmaInstance.refresh({ skipIndexation: true })
  }, 1400)

  demoRefreshHandle = setInterval(async () => {
    if (token !== demoReplayToken || !routeGenerationStillCurrent(myGen) || document.hidden) return
    const nextRecent = await fetchMaybe(`${ep.log}/recent?limit=${DEMO_RECENT_LIMIT}`)
    if (token !== demoReplayToken || !routeGenerationStillCurrent(myGen)) return
    if (nextRecent._error || !Array.isArray(nextRecent.entries) || nextRecent.entries.length === 0) return
    if (nextRecent.entries[0]?.record_hash === latestRecentEntries[0]?.record_hash) return
    latestRecentEntries = nextRecent.entries
    const nextContextEntries = contextId
      ? nextRecent.entries.filter((entry) => entry.context_id === contextId)
      : nextRecent.entries
    await resolveIdentities(nextContextEntries.map((entry) => entry.creator_key).filter(Boolean))
    if (token !== demoReplayToken || !routeGenerationStillCurrent(myGen)) return
    let nextGraph = null
    let nextSourceLabel = sourceLabel
    const nextGraphResult = contextId ? await fetchMaybe(`${ep.graph}/graph/${contextId}?shape=compact`) : null
    if (token !== demoReplayToken || !routeGenerationStillCurrent(myGen)) return
    if (nextGraphResult && !nextGraphResult._error && Array.isArray(nextGraphResult.nodes) && nextGraphResult.nodes.length > 1) {
      nextGraph = normalizeDemoGraph(nextGraphResult)
      nextSourceLabel = 'graph-node'
    }
    if (!nextGraph || nextGraph.edges.length === 0) {
      nextGraph = normalizeDemoGraph(buildReplayGraphFromEntries(nextContextEntries.length > 1 ? nextContextEntries : nextRecent.entries, { limit: DEMO_REPLAY_LIMIT }))
      nextSourceLabel = 'log replay'
    }
    nextGraph = trimDemoGraph(nextGraph)
    const nextSignature = computeDemoGraphSignature(nextGraph)
    if (nextSignature === graphSignature || nextGraph.nodes.length === 0) return
    const priorVisibleCount = visibleCount
    graph = nextGraph
    sourceLabel = nextSourceLabel
    graphSignature = nextSignature
    visibleCount = Math.min(Math.max(priorVisibleCount, 3), graph.nodes.length)
    inspectorPinned = false
    try {
      await renderDemoGraph()
    } catch (e) {
      console.warn('[atrib-dashboard] live demo refresh skipped:', e)
    }
  }, DEMO_LIVE_REFRESH_MS)
}

// ─── Polling ─────────────────────────────────────────────────────────────

function isOverviewRoute() {
  const h = currentRoutePath()
  return !h || h === '/' || h === '/overview'
}

// Views that maintain user-driven state across renders. Silent-refresh
// (the 60s `route({ silent: true })` interval) re-runs the render
// function which creates fresh closures, wiping any in-memory state
// (dropdown selections, custom date-range inputs, layout-switcher
// position). Identity view has the time-window dropdown + custom range;
// session view has the layout-switcher (timeline / organic / cluster).
// Both lose user state on silent-refresh, manifesting as "I clicked
// apply and the same graph rendered", the silent refresh ran between
// the user picking a range and clicking apply, resetting the state.
//
// These views skip silent-refresh and rely on user-driven refresh
// (dropdown change, layout toggle, browser reload). Views without user
// state (action, trace, anchoring) keep silent-refresh.
function isUserStatefulRoute() {
  const h = currentRoutePath()
  return h.startsWith('/identity/') || h.startsWith('/session/') || h === '/demo'
}

// Per-view soft refresh: every active view (action, trace, anchoring)
// re-runs route() on a long interval so newly-arrived records become
// visible without a manual reload. The overview route uses the
// dedicated fast feed polling above; this is a coarser fallback for
// views that don't have incremental update logic. Identity + session
// are excluded because they maintain user state that silent-refresh
// would wipe (see isUserStatefulRoute). Pause when the tab is hidden
// so background tabs don't burn CPU. Generation-guarded inside the
// renderers so a refresh mid-fetch doesn't stomp on a navigation.
const VIEW_REFRESH_INTERVAL_MS = 60_000  // 60s; long enough to avoid flicker
let viewRefreshHandle = null
function startViewRefresh() {
  stopViewRefresh()
  viewRefreshHandle = setInterval(() => {
    if (document.hidden) return
    if (isOverviewRoute()) return  // overview has its own faster polling
    if (isUserStatefulRoute()) return  // identity + session maintain user state
    // Pass silent: true so route() skips the "loading…" blank state.
    // Each render function builds its `root` off-screen and atomic-swaps
    // via clearAndRender(root) at the end; with silent=true the existing
    // content stays visible during the fetch, eliminating the periodic
    // page flicker the unconditional loading-state replace produced.
    route({ silent: true })
  }, VIEW_REFRESH_INTERVAL_MS)
}
function stopViewRefresh() {
  if (viewRefreshHandle) { clearInterval(viewRefreshHandle); viewRefreshHandle = null }
}

function startPolling() {
  stopPolling()
  pollHandle = setInterval(async () => {
    if (document.hidden) return
    if (!isOverviewRoute()) { stopPolling(); return }
    const ep = endpoints()
    const [recent, stats, checkpoint] = await Promise.all([
      fetchMaybe(`${ep.log}/recent?limit=${RECENT_LIMIT}`),
      fetchMaybe(`${ep.log}/stats`),
      fetchTextMaybe(`${ep.log}/checkpoint`),
    ])
    updatePulseStrip(stats, checkpoint, recent)
    if (recent._error || !recent.entries) return
    if (recent.entries.length === 0) return
    if (recent.entries[0].record_hash === lastFeedTopHash) return
    // Prepend any newly-arrived entries (those above lastFeedTopHash) instead
    // of replacing the whole feed, preserves the user's loaded-older state.
    const knownTop = lastFeedTopHash
    const newOnes = []
    for (const e of recent.entries) {
      if (e.record_hash === knownTop) break
      newOnes.push(e)
    }
    if (newOnes.length === 0) return
    await resolveIdentities(newOnes.map(e => e.creator_key))
    renderFeed([...newOnes, ...feedEntries], true, recent.tree_size ?? feedTreeSize)
  }, POLL_INTERVAL_MS)
}

function stopPolling() {
  if (pollHandle) { clearInterval(pollHandle); pollHandle = null }
}

// Independent ticker that re-renders any cell tagged with data-ts so
// "Xs ago" labels don't go stale between polls. Runs every 10s globally
// (cheap; just a querySelectorAll + textContent set per cell).
// Independent of polling because rows stay in the DOM across polls.
function tickRelativeTimes() {
  const cells = document.querySelectorAll('[data-ts]')
  cells.forEach((cell) => {
    const ts = parseInt(cell.dataset.ts, 10)
    if (Number.isFinite(ts)) cell.textContent = timeAgo(ts)
  })
}
setInterval(tickRelativeTimes, 10000)

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isOverviewRoute() && !pollHandle) startPolling()
  // Also tick immediately when the tab becomes visible so the first
  // glance shows fresh times rather than "5s ago" from minutes prior.
  if (!document.hidden) tickRelativeTimes()
})

// ─── View header (per-view onboarding chrome) ────────────────────────────

function viewHeader({ crumb, title, subject, explainer }) {
  return el('header', { class: 'view-header' },
    el('span', { class: 'crumb' },
      el('a', { href: '/', style: 'color: var(--text-3);' }, 'explorer'),
      ' / ',
      crumb,
    ),
    el('h1', {}, title),
    subject ? el('div', { class: 'subject' }, subject) : null,
    explainer ? el('p', { class: 'explainer' }, ...explainer) : null,
  )
}

// ─── Identity view ───────────────────────────────────────────────────────

async function renderIdentity(creatorKey) {
  setActiveNav(null)
  const ep = endpoints()
  const root = el('div')

  root.append(viewHeader({
    crumb: 'identity',
    title: 'Identity',
    subject: creatorKey,
    explainer: [
      'An ',
      el('span', { class: 'term' }, 'identity'),
      ' here is an Ed25519 public key (',
      el('code', {}, '43-char base64url'),
      '). It\'s the thing doing the signing. Identities can publish a directory claim that binds their key to a person, org, or service, but it\'s optional. A missing claim doesn\'t invalidate the signature; the cryptography works either way.',
    ],
  }))

  root.append(el('section', { class: 'detail-path', 'aria-label': 'Identity page path' },
    detailPathStep('01', 'Check the claim', 'See whether this key published a directory claim. Missing claims do not invalidate signatures.'),
    detailPathStep('02', 'Review sessions', 'Find the workflows this signer participated in and inspect their records.'),
    detailPathStep('03', 'Map activity', 'Use the cross-session graph to see handoffs and provenance relationships.'),
  ))

  const lookup = await resolveIdentity(creatorKey)
  root.append(renderDetailStatus([
    {
      label: 'claim',
      value: lookup._error ? 'directory error' : lookup.found ? 'found' : 'optional',
      note: lookup.found ? `Directory version ${lookup.version}, epoch ${lookup.epoch}.` : 'A missing claim does not invalidate signed records.',
      tone: lookup._error ? 'warn' : lookup.found ? 'ok' : 'info',
    },
    {
      label: 'signer key',
      value: 'Ed25519',
      note: 'The public key is the identity surface for verification.',
      tone: 'ok',
    },
    {
      label: 'evidence',
      value: 'sessions below',
      note: 'Use session rows and the activity map to inspect related records.',
      tone: 'info',
    },
  ]))

  const stack = el('div', { class: 'stack' })
  root.append(stack)

  stack.append(el('section', { class: 'panel flush' },
    el('div', { class: 'panel-head' },
      el('h2', {},
        'directory claim ',
        el('span', { class: 'meta', style: 'font-weight: normal; font-size: 12px;' },
          '· spec ', el('a', { href: 'https://github.com/creatornader/atrib/blob/main/atrib-spec.md#62-directory-operations', target: '_blank', rel: 'noopener', style: 'color: var(--text-2);' }, '§6.2'),
        ),
      ),
      el('span', { class: 'meta' },
        lookup._error ? '' :
        lookup.found
          ? el('span', {},
              el('span', { title: 'Per-key counter. The Nth time this creator_key has published to the directory.' }, `version ${lookup.version}`),
              ' · ',
              el('span', { title: 'Global directory counter. The Nth publish operation across ALL keys system-wide.' }, `epoch ${lookup.epoch}`),
            )
          : 'no claim'),
    ),
    el('div', { class: 'panel-body' },
      lookup.found ? el('p', { class: 'meta', style: 'margin: 0 0 14px; color: var(--text-3); font-size: 13px;' },
        'A directory claim binds a creator_key to a name. Optional per spec [§6.1]; the cryptography works either way. ',
        el('strong', {}, 'version'),
        ' increments each time this key publishes (e.g., updating display_name → v2). ',
        el('strong', {}, 'epoch'),
        ' is the directory\'s global counter, every publish across all keys advances it.',
      ) : null,
      renderClaimBody(lookup),
    ),
  ))

  const history = await fetchMaybe(`${ep.directory}/history/${creatorKey}`)
  if (!history._error && history.versions && history.versions.length > 0) {
    stack.append(el('section', { class: 'panel flush' },
      el('div', { class: 'panel-head' },
        el('h2', {}, 'claim history'),
        el('span', { class: 'meta' }, `${history.versions.length} version${history.versions.length === 1 ? '' : 's'}`),
      ),
      el('div', { class: 'panel-body' },
        el('p', { class: 'meta', style: 'margin: 0 0 14px; color: var(--text-3); font-size: 13px;' },
          'Each row is a prior version of this key\'s claim. v2 superseded v1; both remain audit-visible. AKD proofs let any verifier confirm a historical version was the directory\'s current state at its epoch.',
        ),
        el('table', { class: 'feed' },
          el('thead', {}, el('tr', {},
            el('th', {}, 'version'), el('th', {}, 'epoch'), el('th', {}, 'claim_type'),
          )),
          el('tbody', {},
            ...history.versions.map(v => el('tr', {},
              el('td', {}, String(v.version)),
              el('td', {}, String(v.epoch)),
              el('td', {}, v.claim?.claim_type || '—'),
            )),
          ),
        ),
      ),
    ))
  }

  // Try graph first; fall back to log-derived list when graph hasn't ingested.
  let sessions = await fetchMaybe(`${ep.graph}/creators/${encodeURIComponent(creatorKey)}/sessions`)
  let sessionsFromLog = false
  if (sessions._error || !sessions.sessions || sessions.sessions.length === 0) {
    const fromLog = await fetchMaybe(`${ep.log}/by-creator/${creatorKey}`)
    if (!fromLog._error && fromLog.sessions && fromLog.sessions.length > 0) {
      sessions = fromLog
      sessionsFromLog = true
    }
  }
  if (sessions.sessions && sessions.sessions.length > 0) {
    // Collapse-state cache key. Per-creator so a user who collapses
    // their own dense identity view doesn't accidentally collapse a
    // sparse one. localStorage survives reloads + tabs; sessionStorage
    // would scope to one tab which is the wrong shape (user expects
    // their preference to stick across browser sessions). Default
    // open: legacy behavior, only a user who explicitly collapsed
    // sees it collapsed on the next visit.
    const collapseKey = `atrib.identity.sessions-collapsed.${creatorKey}`
    let collapsed = false
    try {
      collapsed = localStorage.getItem(collapseKey) === '1'
    } catch {
      // localStorage unavailable (private mode, quota, sandboxed iframe).
      // Treat as "always open", better than throwing.
    }

    const tableBody = el('div', {
      class: 'panel-body',
      style: collapsed ? 'display: none;' : '',
    },
      el('p', { class: 'meta', style: 'margin: 0 0 14px; color: var(--text-3); font-size: 13px;' },
        'A ',
        el('strong', {}, 'session'),
        ' is one logical workflow, a trace, a task, a conversation. Records sharing a ',
        el('code', {}, 'context_id'),
        ' are related operations within that workflow per spec ',
        el('a', { href: 'https://github.com/creatornader/atrib/blob/main/atrib-spec.md#151-context_id-the-session-anchor', target: '_blank', rel: 'noopener', style: 'color: var(--text-2);' }, '§1.5.1'),
        '. New workflow → new session. Long-running collaborative work can produce sessions of thousands of records; one-off scripts produce single-record sessions.',
      ),
      el('table', { class: 'feed' },
        el('thead', {}, el('tr', {},
          el('th', {}, 'context_id'),
          el('th', {}, 'records'),
          el('th', {}, 'composition'),
          el('th', { class: 'shrink' }, 'duration'),
          el('th', { class: 'shrink' }, 'first seen'),
        )),
        el('tbody', {},
          ...sessions.sessions.map(s => el('tr', {},
            el('td', {},
              el('a', { href: `/session/${s.context_id}` },
                el('span', { class: 'mono' }, shorten(s.context_id, 10, 6)),
              ),
              ' ',
              s.has_genesis
                ? el('span', { class: 'badge dim', style: 'font-size: 10px; margin-left: 4px;', title: 'Session contains a genesis record (chain_root = SHA-256(context_id))' }, 'G')
                : null,
            ),
            el('td', {}, String(sessionSignedRecordCount(s) ?? '—')),
            el('td', {}, renderCompositionChips(s)),
            el('td', { class: 'shrink' },
              s.first_seen && s.last_seen
                ? renderDuration(s.first_seen, s.last_seen)
                : '—'),
            el('td', { class: 'shrink', ...(s.first_seen ? { 'data-ts': String(s.first_seen) } : {}) },
              s.first_seen ? timeAgo(s.first_seen) : '—'),
          )),
        ),
      ),
    )

    // Toggle button in the panel-head. Glyph rotates / label flips so
    // the user sees both the affordance ("clickable to expand") and
    // the current state. Persists choice to localStorage under the
    // per-creator key so it survives reloads.
    const toggleBtn = el('button', {
      type: 'button',
      'aria-expanded': String(!collapsed),
      'aria-controls': `sessions-body-${creatorKey.slice(0, 12)}`,
      style: [
        'background: transparent',
        'border: 1px solid var(--border)',
        'color: var(--text-2)',
        'padding: 3px 10px',
        'border-radius: 3px',
        'font-size: 12px',
        'cursor: pointer',
        'font-family: var(--font-sans)',
        'margin-left: auto',
      ].join('; '),
    }, collapsed ? 'expand ▾' : 'collapse ▴')
    toggleBtn.addEventListener('click', () => {
      collapsed = !collapsed
      tableBody.style.display = collapsed ? 'none' : ''
      toggleBtn.textContent = collapsed ? 'expand ▾' : 'collapse ▴'
      toggleBtn.setAttribute('aria-expanded', String(!collapsed))
      try {
        localStorage.setItem(collapseKey, collapsed ? '1' : '0')
      } catch {
        // Persistence failed; the in-memory toggle still works.
      }
    })
    tableBody.id = `sessions-body-${creatorKey.slice(0, 12)}`

    stack.append(el('section', { class: 'panel flush' },
      el('div', { class: 'panel-head' },
        el('h2', {}, 'sessions'),
        el('span', { class: 'meta' },
          `${sessions.sessions.length} session${sessions.sessions.length === 1 ? '' : 's'}` +
          (sessionsFromLog ? ' · from log (graph not ingested)' : '')),
        toggleBtn,
      ),
      tableBody,
    ))
  }

  // Activity-map graph (§3.4.7 / D068.consequences). Composes records across
  // every session this creator participated in into a single graph response.
  // Surfaces cross-session edges (CROSS_SESSION via shared session_token,
  // PROVENANCE_OF anchoring sessions) that the per-session DAG cannot show.
  //
  // Time slider exposes the spec §3.4.7 since/until query parameters as a
  // simple "last N hours/days/weeks" select. Without the slider, the activity
  // map is unscoped and quickly becomes unreadable on long-running creators
  // (1000+ records all rendered at once produces a dense blob; selecting
  // "last 24h" trims to recent activity, restoring useful structure).
  // Time-window control: hybrid of presets + explicit since/until inputs
  // for analytical queries (e.g. "what happened during a specific past session"
  // or "the week of April 28"). Presets cover the common case; the custom
  // option exposes the spec §3.4.7 since/until query parameters directly
  // as datetime-local inputs. The custom range is opt-in to keep the
  // common case (last N hours) one click away.
  const TIME_WINDOWS = [
    { label: 'last 6h', sinceMs: 6 * 60 * 60 * 1000 },
    { label: 'last 24h', sinceMs: 24 * 60 * 60 * 1000 },
    { label: 'last 7d', sinceMs: 7 * 24 * 60 * 60 * 1000 },
    { label: 'last 30d', sinceMs: 30 * 24 * 60 * 60 * 1000 },
    { label: 'all time', sinceMs: null },
    { label: 'custom range…', sinceMs: 'custom' },
  ]
  let currentWindowIdx = 1 // default: last 24h
  let customSinceMs = null
  let customUntilMs = null
  const windowSelect = el('select', {
    style: 'background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 4px 8px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px;',
    onchange: (ev) => {
      currentWindowIdx = parseInt(ev.target.value, 10)
      const isCustom = TIME_WINDOWS[currentWindowIdx].sinceMs === 'custom'
      customRangeRow.style.display = isCustom ? 'flex' : 'none'
      if (!isCustom) refetchActivity()
    },
  }, ...TIME_WINDOWS.map((w, i) => el('option', { value: String(i), ...(i === currentWindowIdx ? { selected: '' } : {}) }, w.label)))

  // Datetime-local inputs for the custom-range case. When the user picks
  // "custom range…" from the dropdown, this row becomes visible. Apply
  // button triggers the refetch so the user can dial in both bounds before
  // hitting the network.
  const isoLocal = (ms) => new Date(ms - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16)
  const sinceInput = el('input', {
    type: 'datetime-local',
    style: 'background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 3px 6px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; color-scheme: dark;',
    value: isoLocal(Date.now() - 24 * 60 * 60 * 1000),
  })
  const untilInput = el('input', {
    type: 'datetime-local',
    style: 'background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 3px 6px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; color-scheme: dark;',
    value: isoLocal(Date.now()),
  })
  const applyCustomBtn = el('button', {
    style: 'background: var(--accent-subtle); color: var(--accent); border: 1px solid var(--accent-border); padding: 3px 12px; border-radius: 3px; font-size: 12px; cursor: pointer;',
    onclick: () => {
      const since = new Date(sinceInput.value).getTime()
      const until = new Date(untilInput.value).getTime()
      if (Number.isNaN(since) || Number.isNaN(until)) {
        // setActivityMeta isn't in scope yet at element-creation time
        // (the helper is declared inside renderIdentity AFTER the
        // applyCustomBtn is created), but by the time the user clicks
        // apply the closure resolves to the initialized const. Update
        // both meta slots so the validation error is visible whether
        // the user is scrolled to the panel-head or to the controls.
        activityMetaInline.textContent = 'invalid date range'
        activityMetaSlot.textContent = 'invalid date range'
        return
      }
      if (since > until) {
        activityMetaInline.textContent = 'since must be earlier than until'
        activityMetaSlot.textContent = 'since must be earlier than until'
        return
      }
      customSinceMs = since
      customUntilMs = until
      refetchActivity()
    },
  }, 'apply')
  const customRangeRow = el('div', { style: 'display: none; margin: 0 12px 12px; align-items: center; gap: 8px; flex-wrap: wrap;' },
    el('label', { style: 'color: var(--text-2); font-size: 12px;' }, 'from'),
    sinceInput,
    el('label', { style: 'color: var(--text-2); font-size: 12px;' }, 'to'),
    untilInput,
    applyCustomBtn,
  )

  // Single visible meta block, rendered between the time-window
  // controls and the graph. Structured as a multi-line block (one
  // line per fact) so it reads cleanly even when the truncation
  // message is verbose. setActivityMeta() rebuilds the children;
  // setActivityMetaText() handles transient string-only states
  // (loading, validation errors) without the structured layout.
  const activityMetaInline = el('div', {
    style: [
      'margin: 0 12px 12px',
      'padding: 10px 12px',
      'background: var(--surface-2)',
      'border: 1px solid var(--border)',
      'border-radius: 4px',
      'color: var(--text-2)',
      'font-size: 12px',
      'font-family: var(--font-mono)',
      'line-height: 1.6',
      'display: flex',
      'flex-direction: column',
      'gap: 2px',
    ].join('; '),
  }, 'cross-session edges only · loading…')

  const activityGraphContainer = el('div', { class: 'trace-graph', id: 'identity-activity-graph' })
  const activityNodeLegend = el('div', { class: 'legend-row', id: 'identity-activity-node-legend' })
  const activityEdgeLegend = el('div', { class: 'legend-row', id: 'identity-activity-edge-legend' })
  const activityLegend = el('div', { class: 'graph-legend' },
    el('span', { class: 'legend-label' }, 'nodes'),
    activityNodeLegend,
    el('span', { class: 'legend-label' }, 'edges'),
    activityEdgeLegend,
  )
  // Hidden anchor element kept ONLY for back-compat with anything that
  // queries '#identity-activity-meta'. The visible meta lives inline
  // above the graph (activityMetaInline), which renders as a structured
  // multi-line block, readable, single-source-of-truth.
  const activityMetaSlot = el('span', { class: 'meta', id: 'identity-activity-meta', style: 'display: none;' }, '')
  const activitySection = el('section', { class: 'panel flush' },
    el('div', { class: 'panel-head' },
      el('h2', {}, 'activity map'),
    ),
    el('div', { class: 'panel-body', style: 'padding: 0 0 12px;' },
      el('p', { class: 'meta', style: 'margin: 0 12px 14px; color: var(--text-3); font-size: 13px;' },
        'Cross-session relationships across this creator\'s records, ',
        el('code', {}, 'CROSS_SESSION'),
        ' (shared ', el('code', {}, 'session_token'), '), ',
        el('code', {}, 'INFORMED_BY'),
        ' / ', el('code', {}, 'ANNOTATES'), ' / ', el('code', {}, 'REVISES'),
        ' across context boundaries, plus ',
        el('code', {}, 'CHAIN_PRECEDES'),
        '. Intra-session sequencing (',
        el('code', {}, 'SESSION_PRECEDES'),
        ' / ', el('code', {}, 'SESSION_PARALLEL'),
        ') is excluded by default per spec §3.4.7 to keep the cross-session signal visible. Each per-session DAG is at ',
        el('code', {}, '/session/<context_id>'),
        '.',
      ),
      el('div', { style: 'margin: 0 12px 12px; display: flex; align-items: center; gap: 8px;' },
        el('label', { style: 'color: var(--text-2); font-size: 12px;' }, 'time window'),
        windowSelect,
      ),
      customRangeRow,
      activityMetaInline,
    ),
    activityGraphContainer,
    activityLegend,
  )
  stack.append(activitySection)
  activityGraphContainer.replaceChildren(el('div', { class: 'loading' }, 'loading activity map…'))

  clearAndRender(root)

  const myGen = currentRouteGeneration()

  // Two helpers for updating the activity-map meta block:
  //
  //   setActivityMetaText(text), collapses to one line. For transient
  //   states (loading, validation errors) where structure adds noise.
  //
  //   setActivityMetaLines(rows), renders each row as { label, value }
  //   on its own line, with the label dim and the value highlighted.
  //   Used for the populated post-fetch state where there are 4-6
  //   distinct facts the user wants to read.
  //
  // The hidden activityMetaSlot stays empty; it exists only so any
  // legacy querySelector('#identity-activity-meta') consumer still
  // finds a node.
  const setActivityMetaText = (text) => {
    activityMetaInline.replaceChildren(document.createTextNode(text))
  }
  const setActivityMetaLines = (rows) => {
    const children = []
    for (const row of rows) {
      if (!row) continue
      const lineStyle = row.emphasis === 'warn'
        ? 'color: var(--warn); font-weight: 500;'
        : 'color: var(--text-2);'
      const labelStyle = 'color: var(--text-3); display: inline-block; min-width: 132px;'
      children.push(el('div', { style: lineStyle },
        el('span', { style: labelStyle }, row.label + ':'),
        ' ',
        row.value,
      ))
    }
    activityMetaInline.replaceChildren(...children)
  }
  // Backwards-compat alias for the few existing call sites that pass a
  // simple string.
  const setActivityMeta = setActivityMetaText

  async function refetchActivity() {
    if (!routeGenerationStillCurrent(myGen)) return
    const w = TIME_WINDOWS[currentWindowIdx]
    activityGraphContainer.replaceChildren(el('div', { class: 'loading' }, 'loading activity map…'))
    setActivityMeta('cross-session edges only · loading…')
    const params = new URLSearchParams()
    let windowLabel = w.label
    if (w.sinceMs === 'custom') {
      if (customSinceMs === null || customUntilMs === null) {
        // User picked "custom range…" but hasn't applied bounds yet.
        setActivityMeta('cross-session edges only · pick from/to and apply')
        activityGraphContainer.replaceChildren(el('div', { class: 'empty' },
          'Pick from + to dates and click apply.',
        ))
        return
      }
      params.set('since', String(customSinceMs))
      params.set('until', String(customUntilMs))
      // Custom range = explicit bounds = oldest-first slice. If the
      // window contains more than `limit` records, the user wants to
      // see what happened from their picked start time forward, not
      // the most-recent slice of the same window. The server applies
      // direction; truncation feedback is rendered below.
      params.set('direction', 'oldest')
      windowLabel = `${new Date(customSinceMs).toISOString().slice(0,16).replace('T',' ')}Z → ${new Date(customUntilMs).toISOString().slice(0,16).replace('T',' ')}Z`
    } else if (w.sinceMs !== null) {
      params.set('since', String(Date.now() - w.sinceMs))
      // Preset windows ("last 24h" etc.) are anchored to NOW, so
      // truncation should drop the oldest tail. Default direction
      // (newest) does this. Don't set direction explicitly.
    }
    // Server max is 2000 (ACTIVITY_MAP_MAX_LIMIT). Bumped from 1000 to
    // 2000 to reduce truncation frequency for high-volume creators.
    // When truncation still happens, the response carries
    // total_in_window + effective_window so the user sees what they're
    // missing.
    params.set('limit', '2000')
    // Cache-bust per fetch so neither the browser nor any CDN-side cache
    // returns a stale activity-map for a window the user just switched
    // to. Earlier versions of this view occasionally rendered identical
    // graphs across genuinely different windows; cache-busting rules out
    // caching as a cause and keeps each user-driven refresh genuinely
    // fresh.
    params.set('_cb', String(Date.now()))
    const url = `${ep.graph}/creators/${encodeURIComponent(creatorKey)}/graph?${params.toString()}`
    // Expose the URL on the meta slot too so the user can see in real
    // time what window the dashboard is requesting, plus open it in a
    // new tab to inspect the response directly.
    const fetchStartedAt = Date.now()
    const activity = await fetchMaybe(url)
    if (!routeGenerationStillCurrent(myGen)) return
    if (activity._error) {
      activityGraphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'activity-map error:'), ' ', activity._error,
      ))
      setActivityMeta('cross-session edges only · error')
      return
    }
    if (!activity.graph || !activity.graph.nodes || activity.graph.nodes.length === 0) {
      activityGraphContainer.replaceChildren(el('div', { class: 'empty' },
        `No records in this window (${windowLabel}). Try a longer window.`,
      ))
      setActivityMetaLines([
        { label: 'window', value: windowLabel },
        { label: 'records', value: '0' },
        { label: 'edges', value: '0' },
      ])
      return
    }
    const graph = activity.graph
    // Structured meta lines. Always shown: window label, record + edge
    // counts, fetch latency. Shown only on truncation: total in window,
    // returned slice direction + effective date range, narrowing hint.
    // Each fact lives on its own line so the eye reads it cleanly even
    // when truncation adds two extra lines.
    const fetchMs = Date.now() - fetchStartedAt
    const fmtTs = (ms) => ms == null ? '?' : new Date(ms).toISOString().slice(0, 16).replace('T', ' ') + 'Z'
    const total = typeof activity.total_in_window === 'number' ? activity.total_in_window : activity.record_count
    const eff = activity.effective_window ?? {}
    const direction = activity.window?.direction === 'oldest' ? 'oldest-first' : 'newest-first'

    // Field selection: every line answers a distinct question.
    //
    //   window   – which window did the user pick? (echoes the dropdown
    //              + custom range so the meta is self-contained without
    //              looking up at the controls)
    //   records  – how many records and is this the full window? when
    //              truncated, says "X of Y (Z-first slice)" so the user
    //              sees the lossiness AND the slice direction in one line
    //   edges    – how many cross-session edges were derived
    //   returned span – ONLY when truncated: the actual date range of
    //                   the records returned (helps "I asked for 5 days,
    //                   got days 1-3")
    //   truncated – ONLY when truncated: WHY it was truncated and how
    //               to address it. Warning-styled so the eye lands here.
    //
    // Dropped: the prior 'scope' line ("cross-session edges only") is
    // already in the explainer paragraph above the controls; repeating
    // it on every render added noise. The 'fetched' latency line is
    // moved to a tooltip on the meta block, useful for investigation
    // but not needed in the visible meta.
    const lines = [
      { label: 'window', value: windowLabel },
      {
        label: 'records',
        value: activity.truncated
          ? `${activity.record_count} of ${total} (${direction} slice)`
          : `${activity.record_count}`,
      },
      { label: 'edges', value: String(graph.edges.length) },
    ]
    if (activity.truncated) {
      lines.push({
        label: 'returned span',
        value: `${fmtTs(eff.since)} → ${fmtTs(eff.until)}`,
      })
      lines.push({
        label: 'truncated',
        value: `${total - activity.record_count} record${total - activity.record_count === 1 ? '' : 's'} not shown, narrow the range to see the rest (pagination is on the roadmap)`,
        emphasis: 'warn',
      })
    }
    setActivityMetaLines(lines)
    activityMetaInline.title = `fetched in ${fetchMs}ms`

    if (graph.edges.length === 0) {
      activityGraphContainer.replaceChildren(el('div', { class: 'empty' },
        'No cross-session edges in this window. Each record\'s session DAG is at ',
        el('code', {}, '/session/<context_id>'),
        '.',
      ))
      populateGraphLegend(activityNodeLegend, activityEdgeLegend, graph)
      return
    }
    try {
      await loadGraphLibs()
    } catch (e) {
      activityGraphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'graph library load error:'), ' ', e.message,
      ))
      return
    }
    if (!routeGenerationStillCurrent(myGen)) return
    activityGraphContainer.replaceChildren()
    if (_activeSigmaInstance) {
      try { _activeSigmaInstance.kill() } catch {}
      _activeSigmaInstance = null
    }
    let _activityLayoutMode = 'auto'
    const renderActivity = async (mode) => {
      _activityLayoutMode = mode
      activityGraphContainer.replaceChildren()
      if (_activeSigmaInstance) {
        try { _activeSigmaInstance.kill() } catch {}
        _activeSigmaInstance = null
      }
      try {
        const { sigma, fitCameraToGraph, resolvedMode } = await renderSigmaDAG(activityGraphContainer, graph, { layoutMode: mode })
        _activeSigmaInstance = sigma
        attachCameraControls(activityGraphContainer, fitCameraToGraph, sigma)
        attachLayoutSwitcher(activityGraphContainer, resolvedMode, renderActivity)
      } catch (e) {
        renderGraphRenderError(activityGraphContainer, e)
      }
    }
    await renderActivity(_activityLayoutMode)
    populateGraphLegend(activityNodeLegend, activityEdgeLegend, graph)
  }

  refetchActivity()
}

// Render a session's event-type breakdown as inline chips. Replaces the
// older transaction-only column which showed "—" for every session that
// didn't close commerce. count_by_event_type comes from graph-node and
// log-node session-summary endpoints; absent on legacy responses, in which
// case we fall back to the has_transaction boolean for compatibility.
function renderCompositionChips(s) {
  const counts = s.count_by_event_type
  if (!counts || typeof counts !== 'object') {
    return s.has_transaction
      ? el('span', { class: 'badge ok' }, '✓ tx')
      : el('span', { class: 'meta', style: 'color: var(--text-4);' }, '—')
  }
  const chips = []
  const keys = Object.keys(counts).sort((a, b) => {
    const ai = EVENT_TYPE_ORDER.indexOf(a), bi = EVENT_TYPE_ORDER.indexOf(b)
    if (ai === -1 && bi === -1) return a.localeCompare(b)
    if (ai === -1) return 1
    if (bi === -1) return -1
    return ai - bi
  })
  for (const k of keys) {
    const n = counts[k]
    if (!n) continue
    const info = eventTypeInfo(k)
    const label = pluralEventLabel(info.label, n)
    chips.push(el('span', {
      class: `chip event-${info.key}`,
      style: 'font-size: 11px; padding: 1px 6px; margin-right: 4px;',
      title: `${n} ${pluralEventLabel(info.noun, n)}. ${info.description}`,
      'aria-label': `${n} ${label}`,
    }, `${n} ${label}`))
  }
  return el('span', { style: 'display: inline-flex; flex-wrap: wrap; gap: 2px;' }, ...chips)
}

function sessionSignedRecordCount(s) {
  const counts = s.count_by_event_type
  if (!counts || typeof counts !== 'object') return s.node_count ?? null
  return Object.values(counts).reduce((sum, n) => {
    const value = Number(n)
    return sum + (Number.isFinite(value) ? value : 0)
  }, 0)
}

// Format a duration as Nm / Nh / N-days given two unix-ms timestamps.
// Used in the sessions table to show how long a context_id was active.
// Single-record sessions return "instant".
function renderDuration(firstSeenMs, lastSeenMs) {
  const span = Math.max(0, lastSeenMs - firstSeenMs)
  if (span < 1000) return el('span', { class: 'meta', style: 'font-size: 12px;' }, 'instant')
  const sec = span / 1000
  const min = sec / 60
  const hr = min / 60
  const day = hr / 24
  const txt = day >= 1 ? `${day.toFixed(1)}d`
            : hr >= 1 ? `${hr.toFixed(1)}h`
            : min >= 1 ? `${Math.round(min)}m`
            : `${Math.round(sec)}s`
  return el('span', { class: 'mono', style: 'font-size: 12px;' }, txt)
}

function renderClaimBody(lookup) {
  if (lookup._error) {
    return el('div', { class: 'err-banner' },
      el('span', { class: 'label' }, 'directory error:'), lookup._error,
    )
  }
  if (!lookup.found) {
    return el('div', {},
      el('div', { class: 'empty', style: 'text-align: left; padding: 0 0 12px;' },
        'No identity claim registered.',
      ),
      el('p', { style: 'color: var(--text-3); font-size: 13px; margin: 0;' },
        'Per spec §6.1, identities MAY publish a claim with the directory but are not required to. Records signed by this key remain cryptographically valid; identity attestation is a separate trust layer (see §8.7 layered trust assessment).',
      ),
    )
  }
  const c = lookup.claim
  const subject = c.claim_subject || {}
  return el('div', {},
    el('dl', { class: 'kv' },
      el('dt', {}, 'claim type'),       el('dd', {}, c.claim_type || '—'),
      el('dt', {}, 'claim method'),     el('dd', {}, el('span', { class: 'mono' }, c.claim_method || '—')),
      el('dt', {}, 'directory epoch'),  el('dd', {}, String(lookup.epoch)),
      el('dt', {}, 'version'),          el('dd', {}, String(lookup.version)),
    ),
    el('h3', { style: 'color: var(--text); margin: 24px 0 12px; font: 600 13px/1 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em;' }, 'subject'),
    el('pre', {}, JSON.stringify(subject, null, 2)),
    c.capabilities ? el('h3', { style: 'color: var(--text); margin: 24px 0 12px; font: 600 13px/1 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em;' }, 'capabilities (§6.7)') : null,
    c.capabilities ? el('pre', {}, JSON.stringify(c.capabilities, null, 2)) : null,
  )
}

// ─── Session view ────────────────────────────────────────────────────────

async function renderSession(contextId) {
  setActiveNav(null)
  const ep = endpoints()
  // Capture route generation: per-view auto-refresh fires route() every
  // 60s, which would otherwise stomp on this render's late awaits. Bail
  // when generation drifts.
  const myGen = currentRouteGeneration()
  const root = el('div')

  root.append(viewHeader({
    crumb: 'session',
    title: 'Session',
    subject: contextId,
    explainer: [
      'A ',
      el('span', { class: 'term' }, 'session'),
      ' is one chunk of agent work. Every record sharing the same ',
      el('code', {}, 'context_id'),
      ' (16-byte hex) belongs to it. The records form a graph: chained in order, sometimes converging on a transaction. The graph below is built only from what the records themselves contain (§3.2.4). No semantic interpretation, no operator policy.',
    ],
  }))

  root.append(el('section', { class: 'detail-path', 'aria-label': 'Session page path' },
    detailPathStep('01', 'Check readiness', 'Start with source, graph availability, transaction state, and references.'),
    detailPathStep('02', 'Inspect structure', 'Use the graph to see chain, convergence, annotation, and revision edges.'),
    detailPathStep('03', 'Open records', 'Drop into individual receipts when a row needs proof or raw JSON.'),
  ))

  // Try graph first; fall back to log-derived nodes when graph-node either
  // hasn't ingested the requested context_id OR fails to respond (5xx,
  // timeout, 502 on very large contexts where buildGraph hits a CPU
  // ceiling). The
  // log is the source of truth; the graph is a derived view that may be
  // unreachable, behind on ingestion, or unable to serve a particular
  // session size. fallbackReason distinguishes the cases for the banner.
  let graph = await fetchMaybe(`${ep.graph}/graph/${contextId}?shape=compact`)
  if (!routeGenerationStillCurrent(myGen)) return
  let usingFallback = false
  let fallbackReason = null  // 'not-ingested' | 'graph-error' | null

  if (graph._error || !graph.nodes || graph.nodes.length === 0) {
    // Distinguish 404 (graph-node responded; this context_id genuinely
    // has no records there yet) from any other error class (timeout, 5xx,
    // network failure, graph-node is reachable but couldn't return THIS
    // session). The error string from fetchMaybe is "<status> <statusText>".
    if (graph._error && /^[45]\d\d/.test(graph._error)) {
      fallbackReason = /^404/.test(graph._error) ? 'not-ingested' : 'graph-error'
    } else {
      fallbackReason = 'not-ingested'
    }
    const logEntries = await fetchMaybe(`${ep.log}/by-context/${contextId}`)
    if (!routeGenerationStillCurrent(myGen)) return
    if (!logEntries._error && logEntries.entries && logEntries.entries.length > 0) {
      usingFallback = true
      // Adapt log-entry shape into the graph node shape the renderer expects.
      graph = {
        node_count: logEntries.entries.length,
        edge_count: 0,
        edges: [],
        nodes: logEntries.entries.map(e => ({
          id: e.record_hash,
          event_type: e.event_type,
          creator_key: e.creator_key,
          timestamp: e.timestamp_ms,
          verification_state: 'log_committed',
        })),
      }
    } else {
      root.append(el('section', { class: 'panel' },
        el('div', { class: 'empty' },
          el('span', { class: 'icon' }, '○'),
          'No records found for this context_id in either the graph or the log.',
        ),
      ))
      clearAndRender(root)
      return
    }
  }

  const nodeSummary = summarizeGraphNodes(graph.nodes)
  const recordNodes = graph.nodes.filter(n => !isGraphReferenceNode(n))
  const hasTx = graph.has_transaction || recordNodes.some(n => n.event_type === 'transaction')
  await resolveIdentities(recordNodes.map(n => n.creator_key).filter(Boolean))
  if (!routeGenerationStillCurrent(myGen)) return
  const hasEdges = graph.edges && graph.edges.length > 0
  const referenceEdgeCounts = summarizeReferenceEdges(graph.edges)
  const referenceStatus = formatReferenceStatus(usingFallback, nodeSummary, referenceEdgeCounts)

  // Composition breakdown across the session. Surfaces the event-type
  // diversity that the bare "transaction: none" stat hides. Signed record
  // types and synthetic reference nodes are counted separately so "records"
  // stays reserved for signed records.
  const compositionEntries = Object.entries(nodeSummary.countByEventType)
  if (nodeSummary.referenceNodeCount > 0) {
    compositionEntries.push(['reference_node', nodeSummary.referenceNodeCount])
  }
  const sortedTypes = compositionEntries
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5)
  const compositionPieces = []
  for (let i = 0; i < sortedTypes.length; i++) {
    const [type, count] = sortedTypes[i]
    if (i > 0) compositionPieces.push(' · ')
    const isReferenceSummary = type === 'reference_node'
    const info = isReferenceSummary ? EVENT_TYPE_INFO.dangling_node : eventTypeInfo(type)
    const display = isReferenceSummary
      ? `reference ${count === 1 ? 'node' : 'nodes'}`
      : pluralEventLabel(info.label, count)
    const color = isReferenceSummary
      ? eventTypeColor('dangling_node', { reference_status: 'external' })
      : eventTypeColor(info.key)
    compositionPieces.push(el('span', {
      style: `color: ${color}`,
      title: isReferenceSummary
        ? 'Synthetic nodes for referenced records outside this graph response.'
        : info.description,
    }, `${count} ${display}`))
  }
  const participantCount = new Set(recordNodes.map(n => n.creator_key).filter(Boolean)).size

  root.append(renderDetailStatus([
    {
      label: 'source',
      value: usingFallback ? 'log fallback' : 'graph-node',
      note: usingFallback ? 'Records are log-backed; edges are not shown.' : 'Graph derived from log-backed records.',
      tone: usingFallback ? 'info' : 'ok',
    },
    {
      label: 'graph',
      value: hasEdges ? 'graph ready' : 'records only',
      note: hasEdges ? 'Deterministic edges are available below.' : 'No graph edges are available for this session view.',
      tone: hasEdges ? 'ok' : 'info',
    },
    {
      label: 'transaction',
      value: hasTx ? 'present' : 'none',
      note: hasTx ? 'This session contains a transaction record.' : 'Common for non-commerce workflows.',
      tone: hasTx ? 'ok' : 'info',
    },
    {
      label: 'references',
      value: referenceStatus.value,
      note: referenceStatus.note,
      tone: referenceStatus.tone,
    },
  ], 'Session readiness'))

  root.append(el('div', { class: 'pulse-strip' },
    pulseStat('signed records', String(nodeSummary.recordNodeCount), 'real log-backed records'),
    pulseStat('graph nodes', String(nodeSummary.totalNodeCount), `${nodeSummary.recordNodeCount} records${nodeSummary.referenceNodeCount > 0 ? `, ${nodeSummary.referenceNodeCount} references` : ''}`),
    pulseStat('edges', String(graph.edge_count ?? graph.edges?.length ?? 0), hasEdges ? 'deterministic graph links' : 'none in this view'),
    pulseStat('participants', String(participantCount), 'signed-record identities'),
    pulseStat('composition', sortedTypes.length > 0 ? compositionPieces : '—', 'record types and reference nodes', true),
  ))

  if (usingFallback) {
    const banner = el('div', {
      style: 'background: var(--info-subtle); border: 1px solid var(--info-border); color: var(--info); padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px;',
    })
    if (fallbackReason === 'graph-error') {
      // Most common cause for very large sessions: graph-node's buildGraph
      // hits a CPU/memory ceiling deriving O(N²) intra-session edges and
      // returns 5xx. The records ARE in graph-node's store; the response
      // just couldn't be assembled. Distinguishing this from the "not
      // ingested" case avoids the misleading "graph-node hasn't ingested"
      // message that previously fired here.
      banner.append(
        el('strong', { style: 'font-weight: 600;' }, 'Showing log-derived view. '),
        'graph-node returned an error for this context_id (likely too large to assemble, sessions with non-chained records produce O(N²) edges that exceed graph-node\'s response budget). The records below are pulled directly from the log (the source of truth). Edges are not shown.',
      )
    } else {
      banner.append(
        el('strong', { style: 'font-weight: 600;' }, 'Showing log-derived view. '),
        'graph-node hasn\'t ingested records under this context_id yet, so edges are unavailable. Showing the records as a tabular list pulled directly from the log (the source of truth).',
      )
    }
    root.append(banner)
  }

  // Graph panel (only when graph-node returned edges; built but not rendered
  // until after the synchronous root structure is in place, Sigma needs
  // its container attached to the DOM before init).
  let graphContainer = null
  let nodeLegendRow = null
  let edgeLegendRow = null
  if (hasEdges) {
    graphContainer = el('div', { class: 'trace-graph', id: 'session-graph-container' },
      el('div', { class: 'loading' }, 'rendering session graph…'),
    )
    nodeLegendRow = el('div', { class: 'legend-row', id: 'session-node-legend' })
    edgeLegendRow = el('div', { class: 'legend-row', id: 'session-edge-legend' })
    const legend = el('div', { class: 'graph-legend' },
      el('span', { class: 'legend-label' }, 'nodes'),
      nodeLegendRow,
      el('span', { class: 'legend-label' }, 'edges'),
      edgeLegendRow,
    )
    const referenceSummary = formatReferenceSummary(referenceEdgeCounts)
    const meta = `${formatNodeScope(nodeSummary)} · ${graph.edges.length} edges${referenceSummary ? ` · ${referenceSummary}` : ''} · §3.2.4`

    root.append(el('section', { class: 'panel flush' },
      el('div', { class: 'panel-head' },
        el('h2', {}, 'session graph'),
        el('span', { class: 'meta' }, meta),
      ),
      graphContainer,
      legend,
    ))
  }

  // Nodes table, always rendered. The graph above shows STRUCTURE
  // (relationships); this table preserves the per-record METADATA the graph
  // can't surface inline (identity / timestamp / verification badges).
  //
  // Pagination: large sessions (1000+ records, common for long-running
  // collaborative work) made the unpaginated table unreadable AND killed
  // browser scroll performance because every row contained a chip + link
  // + identity badge + timestamp. SESSION_PAGE_SIZE=100 is the load-more
  // unit; a "load more" button at the foot fetches the next page client-
  // side from the already-loaded graph.nodes array (no additional API
  // call, the data was returned in one shot). Sort newest-first so the
  // first page is the most recently active records.
  const SESSION_PAGE_SIZE = 100
  const sortedNodes = [...recordNodes].sort((a, b) => {
    const ta = typeof a.timestamp === 'number' ? a.timestamp : Date.parse(a.timestamp || 0)
    const tb = typeof b.timestamp === 'number' ? b.timestamp : Date.parse(b.timestamp || 0)
    return tb - ta
  })
  let sessionVisibleCount = Math.min(SESSION_PAGE_SIZE, sortedNodes.length)
  const renderRow = n => el('tr', {},
    el('td', {}, renderEventChip(n.event_type, n.creator_key, n.event_type_uri)),
    el('td', {},
      n.event_type === 'dangling_node'
        ? (() => {
            const refHash = referenceHashFromNode(n)
            const status = graphReferenceStatus(n)
            const label = refHash || n.id
            const attrs = {
              class: 'mono',
              title: `${referenceStatusLabel(status)} (synthetic placeholder)`,
            }
            const actionHash = graphNodeActionHash(n)
            return actionHash
              ? el('a', { href: `/action/${actionHash}` }, el('span', attrs, shorten(label, 13, 4)))
              : el('span', attrs, shorten(label, 13, 4))
          })()
        : el('a', { href: `/action/${n.id}` },
            el('span', { class: 'mono' }, shorten(n.id, 13, 4)),
          )),
    el('td', {}, n.creator_key ? renderIdentityLabel(n.creator_key) : '—'),
    (() => {
      const tsMs = n.timestamp ? (typeof n.timestamp === 'number' ? n.timestamp : Date.parse(n.timestamp)) : null
      return el('td', {
        class: 'shrink',
        title: tsMs ? new Date(tsMs).toISOString() : '',
        ...(tsMs ? { 'data-ts': String(tsMs) } : {}),
      }, tsMs ? timeAgo(tsMs) : '—')
    })(),
    el('td', {}, badgeForState(n.verification_state)),
  )
  const tbody = el('tbody', {}, ...sortedNodes.slice(0, sessionVisibleCount).map(renderRow))
  const loadMoreSlot = el('div', { class: 'load-more-slot', style: 'padding: 12px 16px; text-align: center;' })
  function refreshLoadMore() {
    const remaining = sortedNodes.length - sessionVisibleCount
    if (remaining <= 0) {
      loadMoreSlot.replaceChildren(el('span', { class: 'meta', style: 'font-size: 12px; color: var(--text-3);' }, `all ${sortedNodes.length} signed records loaded`))
      return
    }
    loadMoreSlot.replaceChildren(el('button', {
      class: 'load-more',
      onclick: () => {
        const next = Math.min(sessionVisibleCount + SESSION_PAGE_SIZE, sortedNodes.length)
        for (let i = sessionVisibleCount; i < next; i += 1) tbody.append(renderRow(sortedNodes[i]))
        sessionVisibleCount = next
        refreshLoadMore()
      },
    }, `load older (${remaining.toLocaleString()} more)`))
  }
  refreshLoadMore()
  root.append(el('section', { class: 'feed-wrap', style: hasEdges ? 'margin-top: 24px;' : '' },
    el('div', { class: 'feed-head' },
      el('h2', {}, `signed records (${nodeSummary.recordNodeCount.toLocaleString()})`),
      el('span', { class: 'meta' }, usingFallback ? 'from log · graph not available' : 'derived per spec §3.2.4'),
    ),
    el('div', {},
      el('table', { class: 'feed' },
        el('thead', {}, el('tr', {},
          el('th', {}, 'event'),
          el('th', {}, 'action'),
          el('th', {}, 'identity'),
          el('th', { class: 'shrink' }, 'when'),
          el('th', {}, 'verification'),
        )),
        tbody,
      ),
      loadMoreSlot,
    ),
  ))

  // Edges table, only when graph-node returned edges. The graph encodes
  // type / source / target visually, but the table preserves whether a
  // synthetic reference target is external, missing, or unresolved.
  if (hasEdges) {
    const referenceSummary = formatReferenceSummary(referenceEdgeCounts)
    const renderTarget = e => e.dangling
      ? (() => {
          const status = graphReferenceStatus(e)
          const refHash = referenceHashFromEdge(e)
          const label = refHash || e.target
          const chip = el('span', { class: `chip ref-${status}`, style: 'margin-left: 6px;' }, status === 'external' ? 'external' : status)
          const attrs = { class: 'mono', title: e.reason || referenceStatusLabel(status) }
          return status === 'external' && refHash
            ? el('span', attrs,
                el('a', { href: `/action/${refHash}` }, shorten(label, 10, 4)),
                chip)
            : el('span', attrs, shorten(label, 10, 4), chip)
        })()
      : el('a', { href: `/action/${e.target}` },
          el('span', { class: 'mono' }, shorten(e.target, 10, 4)))
    root.append(el('section', { class: 'feed-wrap', style: 'margin-top: 24px;' },
      el('div', { class: 'feed-head' },
        el('h2', {}, `edges (${graph.edges.length})`),
        el('span', { class: 'meta' },
          referenceSummary
            ? `9 deterministic types per §3.2.3, ${referenceSummary}`
            : '9 deterministic types per §3.2.3'),
      ),
      el('div', {},
        el('table', { class: 'feed' },
          el('thead', {}, el('tr', {},
            el('th', {}, 'type'),
            el('th', {}, 'source'),
            el('th', {}, 'target'),
          )),
          el('tbody', {},
            ...graph.edges.map(e => el('tr', {},
              el('td', {}, el('code', {}, e.type)),
              el('td', {}, el('a', { href: `/action/${e.source}` }, el('span', { class: 'mono' }, shorten(e.source, 10, 4)))),
              el('td', {}, renderTarget(e)),
            )),
          ),
        ),
      ),
    ))
  }

  clearAndRender(root)

  // Async graph viz init (only when hasEdges). Synchronous DOM is now in
  // place above; Sigma can attach to graphContainer.
  if (hasEdges) {
    if (_activeSigmaInstance) {
      try { _activeSigmaInstance.kill() } catch {}
      _activeSigmaInstance = null
    }
    try {
      await loadGraphLibs()
    } catch (e) {
      graphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'graph library load error:'), ' ', e.message,
      ))
      return
    }
    let _sessionLayoutMode = 'auto'
    const renderSessionGraph = async (mode) => {
      _sessionLayoutMode = mode
      graphContainer.replaceChildren()
      if (_activeSigmaInstance) {
        try { _activeSigmaInstance.kill() } catch {}
        _activeSigmaInstance = null
      }
      try {
        const { sigma, fitCameraToGraph, resolvedMode } = await renderSigmaDAG(graphContainer, graph, {
          isFocalNode: (n) => n.event_type === 'transaction',
          layoutMode: mode,
        })
        _activeSigmaInstance = sigma
        attachCameraControls(graphContainer, fitCameraToGraph, sigma)
        attachLayoutSwitcher(graphContainer, resolvedMode, renderSessionGraph)
      } catch (e) {
        renderGraphRenderError(graphContainer, e)
      }
    }
    await renderSessionGraph(_sessionLayoutMode)
    populateGraphLegend(nodeLegendRow, edgeLegendRow, graph)
  }
}

function badgeForState(state) {
  const map = {
    unsigned:        ['warn', 'unsigned'],
    signature_valid: ['ok',   '✓ signed'],
    log_committed:   ['ok',   '✓ logged'],
    witnessed:       ['ok',   '✓ witnessed'],
  }
  const [cls, txt] = map[state] || ['dim', state || '—']
  return el('span', { class: `badge ${cls}` }, txt)
}

// ─── Action view ─────────────────────────────────────────────────────────

async function renderAction(recordHash) {
  setActiveNav(null)
  const ep = endpoints()
  // Capture route generation: per-view auto-refresh fires route() every
  // 60s, which would otherwise stomp on this render's late awaits.
  const myGen = currentRouteGeneration()
  const root = el('div')
  const fullHash = normalizeGraphRecordHash(recordHash)
  if (!fullHash) {
    root.append(el('section', { class: 'panel' },
      el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'invalid action route:'), ' ',
        recordHash || 'missing record hash',
      ),
      el('p', { style: 'color: var(--text-3); font-size: 13px; margin: 0;' },
        'This route does not point to a canonical sha256 record hash. Synthetic graph placeholders are not log records.',
      ),
    ))
    clearAndRender(root)
    return
  }
  if (fullHash !== recordHash) {
    location.replace(`#\/action/${fullHash}`)
  }
  const hashHex = fullHash.slice('sha256:'.length)

  root.append(viewHeader({
    crumb: 'action',
    title: 'Action',
    subject: fullHash,
    explainer: [
      'An ',
      el('span', { class: 'term' }, 'action'),

  let entry = await fetchMaybe(`${ep.log}/lookup/${hashHex}`)
  if (!routeGenerationStillCurrent(myGen)) return
  if (entry._error) {
    root.append(el('section', { class: 'panel' },
      el('div', { class: 'err-banner' },
