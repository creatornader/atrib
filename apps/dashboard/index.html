async function renderIdentity(creatorKey) {
  setActiveNav(null)
  const ep = endpoints()
  const root = el('div')

  root.append(viewHeader({
    crumb: 'identity',
    title: 'Identity',
    subject: creatorKey,
    explainer: [
      'An ',
      el('span', { class: 'term' }, 'identity'),
      ' here is an Ed25519 public key (',
      el('code', {}, '43-char base64url'),
      '). It\'s the thing doing the signing. Identities can publish a directory claim that binds their key to a person, org, or service, but it\'s optional. A missing claim doesn\'t invalidate the signature; the cryptography works either way.',
    ],
  }))

  const stack = el('div', { class: 'stack' })
  root.append(stack)

  const lookup = await resolveIdentity(creatorKey)
  stack.append(el('section', { class: 'panel flush' },
    el('div', { class: 'panel-head' },
      el('h2', {},
        'directory claim ',
        el('span', { class: 'meta', style: 'font-weight: normal; font-size: 12px;' },
          '· spec ', el('a', { href: 'https://github.com/creatornader/atrib/blob/main/atrib-spec.md#62-directory-operations', target: '_blank', rel: 'noopener', style: 'color: var(--text-2);' }, '§6.2'),
        ),
      ),
      el('span', { class: 'meta' },
        lookup._error ? '' :
        lookup.found
          ? el('span', {},
              el('span', { title: 'Per-key counter. The Nth time this creator_key has published to the directory.' }, `version ${lookup.version}`),
              ' · ',
              el('span', { title: 'Global directory counter. The Nth publish operation across ALL keys system-wide.' }, `epoch ${lookup.epoch}`),
            )
          : 'no claim'),
    ),
    el('div', { class: 'panel-body' },
      lookup.found ? el('p', { class: 'meta', style: 'margin: 0 0 14px; color: var(--text-3); font-size: 13px;' },
        'A directory claim binds a creator_key to a name. Optional per spec [§6.1]; the cryptography works either way. ',
        el('strong', {}, 'version'),
        ' increments each time this key publishes (e.g., updating display_name → v2). ',
        el('strong', {}, 'epoch'),
        ' is the directory\'s global counter — every publish across all keys advances it.',
      ) : null,
      renderClaimBody(lookup),
    ),
  ))

  const history = await fetchMaybe(`${ep.directory}/history/${creatorKey}`)
  if (!history._error && history.versions && history.versions.length > 0) {
    stack.append(el('section', { class: 'panel flush' },
      el('div', { class: 'panel-head' },
        el('h2', {}, 'claim history'),
        el('span', { class: 'meta' }, `${history.versions.length} version${history.versions.length === 1 ? '' : 's'}`),
      ),
      el('div', { class: 'panel-body' },
        el('p', { class: 'meta', style: 'margin: 0 0 14px; color: var(--text-3); font-size: 13px;' },
          'Each row is a prior version of this key\'s claim. v2 superseded v1; both remain audit-visible. AKD proofs let any verifier confirm a historical version was the directory\'s current state at its epoch.',
        ),
        el('table', { class: 'feed' },
          el('thead', {}, el('tr', {},
            el('th', {}, 'version'), el('th', {}, 'epoch'), el('th', {}, 'claim_type'),
          )),
          el('tbody', {},
            ...history.versions.map(v => el('tr', {},
              el('td', {}, String(v.version)),
              el('td', {}, String(v.epoch)),
              el('td', {}, v.claim?.claim_type || '—'),
            )),
          ),
        ),
      ),
    ))
  }

  // Try graph first; fall back to log-derived list when graph hasn't ingested.
  let sessions = await fetchMaybe(`${ep.graph}/creators/${encodeURIComponent(creatorKey)}/sessions`)
  let sessionsFromLog = false
  if (sessions._error || !sessions.sessions || sessions.sessions.length === 0) {
    const fromLog = await fetchMaybe(`${ep.log}/by-creator/${creatorKey}`)
    if (!fromLog._error && fromLog.sessions && fromLog.sessions.length > 0) {
      sessions = fromLog
      sessionsFromLog = true
    }
  }
  if (sessions.sessions && sessions.sessions.length > 0) {
    stack.append(el('section', { class: 'panel flush' },
      el('div', { class: 'panel-head' },
        el('h2', {}, 'sessions'),
        el('span', { class: 'meta' },
          `${sessions.sessions.length} session${sessions.sessions.length === 1 ? '' : 's'}` +
          (sessionsFromLog ? ' · from log (graph not ingested)' : '')),
      ),
      el('div', { class: 'panel-body' },
        el('p', { class: 'meta', style: 'margin: 0 0 14px; color: var(--text-3); font-size: 13px;' },
          'A ',
          el('strong', {}, 'session'),
          ' is one logical workflow — a trace, a task, a conversation. Records sharing a ',
          el('code', {}, 'context_id'),
          ' are related operations within that workflow per spec ',
          el('a', { href: 'https://github.com/creatornader/atrib/blob/main/atrib-spec.md#151-context_id-the-session-anchor', target: '_blank', rel: 'noopener', style: 'color: var(--text-2);' }, '§1.5.1'),
          '. New workflow → new session. Long-running collaborative work can produce sessions of thousands of records; one-off scripts produce single-record sessions.',
        ),
        el('table', { class: 'feed' },
          el('thead', {}, el('tr', {},
            el('th', {}, 'context_id'),
            el('th', {}, 'records'),
            el('th', {}, 'composition'),
            el('th', { class: 'shrink' }, 'duration'),
            el('th', { class: 'shrink' }, 'first seen'),
          )),
          el('tbody', {},
            ...sessions.sessions.map(s => el('tr', {},
              el('td', {},
                el('a', { href: `#/session/${s.context_id}` },
                  el('span', { class: 'mono' }, shorten(s.context_id, 10, 6)),
                ),
                ' ',
                s.has_genesis
                  ? el('span', { class: 'badge dim', style: 'font-size: 10px; margin-left: 4px;', title: 'Session contains a genesis record (chain_root = SHA-256(context_id))' }, 'G')
                  : null,
              ),
              el('td', {}, String(s.node_count ?? '—')),
              el('td', {}, renderCompositionChips(s)),
              el('td', { class: 'shrink' },
                s.first_seen && s.last_seen
                  ? renderDuration(s.first_seen, s.last_seen)
                  : '—'),
              el('td', { class: 'shrink', ...(s.first_seen ? { 'data-ts': String(s.first_seen) } : {}) },
                s.first_seen ? timeAgo(s.first_seen) : '—'),
            )),
          ),
        ),
      ),
    ))
  }

  // Activity-map graph (§3.4.7 / D068.consequences). Composes records across
  // every session this creator participated in into a single graph response.
  // Surfaces cross-session edges (CROSS_SESSION via shared session_token,
  // PROVENANCE_OF anchoring sessions) that the per-session DAG cannot show.
  //
  // Time slider exposes the spec §3.4.7 since/until query parameters as a
  // simple "last N hours/days/weeks" select. Without the slider, the activity
  // map is unscoped and quickly becomes unreadable on long-running creators
  // (1000+ records all rendered at once produces a dense blob; selecting
  // "last 24h" trims to recent activity, restoring useful structure).
  // Time-window control: hybrid of presets + explicit since/until inputs
  // for analytical queries (e.g. "what happened during a specific past session"
  // or "the week of April 28"). Presets cover the common case; the custom
  // option exposes the spec §3.4.7 since/until query parameters directly
  // as datetime-local inputs. The custom range is opt-in to keep the
  // common case (last N hours) one click away.
  const TIME_WINDOWS = [
    { label: 'last 6h', sinceMs: 6 * 60 * 60 * 1000 },
    { label: 'last 24h', sinceMs: 24 * 60 * 60 * 1000 },
    { label: 'last 7d', sinceMs: 7 * 24 * 60 * 60 * 1000 },
    { label: 'last 30d', sinceMs: 30 * 24 * 60 * 60 * 1000 },
    { label: 'all time', sinceMs: null },
    { label: 'custom range…', sinceMs: 'custom' },
  ]
  let currentWindowIdx = 1 // default: last 24h
  let customSinceMs = null
  let customUntilMs = null
  const windowSelect = el('select', {
    style: 'background: var(--surface-2); color: var(--text-1); border: 1px solid var(--bd-2); padding: 4px 8px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px;',
    onchange: (ev) => {
      currentWindowIdx = parseInt(ev.target.value, 10)
      const isCustom = TIME_WINDOWS[currentWindowIdx].sinceMs === 'custom'
      customRangeRow.style.display = isCustom ? 'flex' : 'none'
      if (!isCustom) refetchActivity()
    },
  }, ...TIME_WINDOWS.map((w, i) => el('option', { value: String(i), ...(i === currentWindowIdx ? { selected: '' } : {}) }, w.label)))

  // Datetime-local inputs for the custom-range case. When the user picks
  // "custom range…" from the dropdown, this row becomes visible. Apply
  // button triggers the refetch so the user can dial in both bounds before
  // hitting the network.
  const isoLocal = (ms) => new Date(ms - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16)
  const sinceInput = el('input', {
    type: 'datetime-local',
    style: 'background: var(--surface-2); color: var(--text-1); border: 1px solid var(--bd-2); padding: 3px 6px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; color-scheme: dark;',
    value: isoLocal(Date.now() - 24 * 60 * 60 * 1000),
  })
  const untilInput = el('input', {
    type: 'datetime-local',
    style: 'background: var(--surface-2); color: var(--text-1); border: 1px solid var(--bd-2); padding: 3px 6px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; color-scheme: dark;',
    value: isoLocal(Date.now()),
  })
  const applyCustomBtn = el('button', {
    style: 'background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); padding: 3px 12px; border-radius: 3px; font-size: 12px; cursor: pointer;',
    onclick: () => {
      const since = new Date(sinceInput.value).getTime()
      const until = new Date(untilInput.value).getTime()
      if (Number.isNaN(since) || Number.isNaN(until)) {
        activityMetaSlot.textContent = 'invalid date range'
        return
      }
      if (since > until) {
        activityMetaSlot.textContent = 'since must be earlier than until'
        return
      }
      customSinceMs = since
      customUntilMs = until
      refetchActivity()
    },
  }, 'apply')
  const customRangeRow = el('div', { style: 'display: none; margin: 0 12px 12px; align-items: center; gap: 8px; flex-wrap: wrap;' },
    el('label', { style: 'color: var(--text-2); font-size: 12px;' }, 'from'),
    sinceInput,
    el('label', { style: 'color: var(--text-2); font-size: 12px;' }, 'to'),
    untilInput,
    applyCustomBtn,
  )

  const activityGraphContainer = el('div', { class: 'trace-graph', id: 'identity-activity-graph' })
  const activityNodeLegend = el('div', { class: 'legend-row', id: 'identity-activity-node-legend' })
  const activityEdgeLegend = el('div', { class: 'legend-row', id: 'identity-activity-edge-legend' })
  const activityLegend = el('div', { class: 'graph-legend' },
    el('span', { class: 'legend-label' }, 'nodes'),
    activityNodeLegend,
    el('span', { class: 'legend-label' }, 'edges'),
    activityEdgeLegend,
  )
  const activityMetaSlot = el('span', { class: 'meta', id: 'identity-activity-meta' }, 'cross-session edges only · loading…')
  const activitySection = el('section', { class: 'panel flush' },
    el('div', { class: 'panel-head' },
      el('h2', {}, 'activity map'),
      activityMetaSlot,
    ),
    el('div', { class: 'panel-body', style: 'padding: 0 0 12px;' },
      el('p', { class: 'meta', style: 'margin: 0 12px 14px; color: var(--text-3); font-size: 13px;' },
        'Cross-session relationships across this creator\'s records — ',
        el('code', {}, 'CROSS_SESSION'),
        ' (shared ', el('code', {}, 'session_token'), '), ',
        el('code', {}, 'INFORMED_BY'),
        ' / ', el('code', {}, 'ANNOTATES'), ' / ', el('code', {}, 'REVISES'),
        ' across context boundaries, plus ',
        el('code', {}, 'CHAIN_PRECEDES'),
        '. Intra-session sequencing (',
        el('code', {}, 'SESSION_PRECEDES'),
        ' / ', el('code', {}, 'SESSION_PARALLEL'),
        ') is excluded by default per spec §3.4.7 to keep the cross-session signal visible. Each per-session DAG is at ',
        el('code', {}, '#/session/<context_id>'),
        '.',
      ),
      el('div', { style: 'margin: 0 12px 12px; display: flex; align-items: center; gap: 8px;' },
        el('label', { style: 'color: var(--text-2); font-size: 12px;' }, 'time window'),
        windowSelect,
      ),
      customRangeRow,
    ),
    activityGraphContainer,
    activityLegend,
  )
  stack.append(activitySection)
  activityGraphContainer.replaceChildren(el('div', { class: 'loading' }, 'loading activity map…'))

  clearAndRender(root)

  const myGen = currentRouteGeneration()

  async function refetchActivity() {
    if (!routeGenerationStillCurrent(myGen)) return
    const w = TIME_WINDOWS[currentWindowIdx]
    activityGraphContainer.replaceChildren(el('div', { class: 'loading' }, 'loading activity map…'))
    activityMetaSlot.textContent = 'cross-session edges only · loading…'
    const params = new URLSearchParams()
    let windowLabel = w.label
    if (w.sinceMs === 'custom') {
      if (customSinceMs === null || customUntilMs === null) {
        // User picked "custom range…" but hasn't applied bounds yet.
        activityMetaSlot.textContent = 'cross-session edges only · pick from/to and apply'
        activityGraphContainer.replaceChildren(el('div', { class: 'empty' },
          'Pick from + to dates and click apply.',
        ))
        return
      }
      params.set('since', String(customSinceMs))
      params.set('until', String(customUntilMs))
      windowLabel = `${new Date(customSinceMs).toISOString().slice(0,16).replace('T',' ')}Z → ${new Date(customUntilMs).toISOString().slice(0,16).replace('T',' ')}Z`
    } else if (w.sinceMs !== null) {
      params.set('since', String(Date.now() - w.sinceMs))
    }
    params.set('limit', '1000')
    const url = `${ep.graph}/creators/${encodeURIComponent(creatorKey)}/graph?${params.toString()}`
    const activity = await fetchMaybe(url)
    if (!routeGenerationStillCurrent(myGen)) return
    if (activity._error) {
      activityGraphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'activity-map error:'), ' ', activity._error,
      ))
      activityMetaSlot.textContent = 'cross-session edges only · error'
      return
    }
    if (!activity.graph || !activity.graph.nodes || activity.graph.nodes.length === 0) {
      activityGraphContainer.replaceChildren(el('div', { class: 'empty' },
        `No records in this window (${windowLabel}). Try a longer window.`,
      ))
      activityMetaSlot.textContent = `cross-session edges only · ${windowLabel} · 0 records`
      return
    }
    const graph = activity.graph
    activityMetaSlot.textContent = `cross-session edges only · ${windowLabel} · ${activity.record_count} record${activity.record_count === 1 ? '' : 's'}, ${graph.edges.length} edge${graph.edges.length === 1 ? '' : 's'}` + (activity.truncated ? ' · truncated' : '')

    if (graph.edges.length === 0) {
      activityGraphContainer.replaceChildren(el('div', { class: 'empty' },
        'No cross-session edges in this window. Each record\'s session DAG is at ',
        el('code', {}, '#/session/<context_id>'),
        '.',
      ))
      populateGraphLegend(activityNodeLegend, activityEdgeLegend, graph)
      return
    }
    try {
      await loadGraphLibs()
    } catch (e) {
      activityGraphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'graph library load error:'), ' ', e.message,
      ))
      return
    }
    if (!routeGenerationStillCurrent(myGen)) return
    activityGraphContainer.replaceChildren()
    if (_activeSigmaInstance) {
      try { _activeSigmaInstance.kill() } catch {}
      _activeSigmaInstance = null
    }
    const { sigma } = renderSigmaDAG(activityGraphContainer, graph, {})
    _activeSigmaInstance = sigma
    populateGraphLegend(activityNodeLegend, activityEdgeLegend, graph)
  }

  refetchActivity()
}

// Render a session's event-type breakdown as inline chips. Replaces the
// older transaction-only column which showed "—" for every session that
// didn't close commerce. count_by_event_type comes from graph-node and
// log-node session-summary endpoints; absent on legacy responses, in which
// case we fall back to the has_transaction boolean for compatibility.
function renderCompositionChips(s) {
  const counts = s.count_by_event_type
  if (!counts || typeof counts !== 'object') {
    return s.has_transaction
      ? el('span', { class: 'badge ok' }, '✓ tx')
      : el('span', { class: 'meta', style: 'color: var(--text-4);' }, '—')
  }
  const ORDER = ['tool_call', 'observation', 'annotation', 'revision', 'transaction', 'directory_anchor', 'extension']
  const chips = []
  const keys = Object.keys(counts).sort((a, b) => {
    const ai = ORDER.indexOf(a), bi = ORDER.indexOf(b)
    if (ai === -1 && bi === -1) return a.localeCompare(b)
    if (ai === -1) return 1
    if (bi === -1) return -1
    return ai - bi
  })
  for (const k of keys) {
    const n = counts[k]
    if (!n) continue
    chips.push(el('span', {
      class: `chip event-${k}`,
      style: 'font-size: 11px; padding: 1px 6px; margin-right: 4px;',
      title: `${n} ${k} record${n === 1 ? '' : 's'}`,
    }, `${k} ${n}`))
  }
  return el('span', { style: 'display: inline-flex; flex-wrap: wrap; gap: 2px;' }, ...chips)
}

// Format a duration as Nm / Nh / N-days given two unix-ms timestamps.
// Used in the sessions table to show how long a context_id was active.
// Single-record sessions return "instant".
function renderDuration(firstSeenMs, lastSeenMs) {
  const span = Math.max(0, lastSeenMs - firstSeenMs)
  if (span < 1000) return el('span', { class: 'meta', style: 'font-size: 12px;' }, 'instant')
  const sec = span / 1000
  const min = sec / 60
  const hr = min / 60
  const day = hr / 24
  const txt = day >= 1 ? `${day.toFixed(1)}d`
            : hr >= 1 ? `${hr.toFixed(1)}h`
            : min >= 1 ? `${Math.round(min)}m`
            : `${Math.round(sec)}s`
  return el('span', { class: 'mono', style: 'font-size: 12px;' }, txt)
}

function renderClaimBody(lookup) {
  if (lookup._error) {
    return el('div', { class: 'err-banner' },
      el('span', { class: 'label' }, 'directory error:'), lookup._error,
    )
  }
  if (!lookup.found) {
    return el('div', {},
      el('div', { class: 'empty', style: 'text-align: left; padding: 0 0 12px;' },
        'No identity claim registered.',
      ),
      el('p', { style: 'color: var(--text-3); font-size: 13px; margin: 0;' },
        'Per spec §6.1, identities MAY publish a claim with the directory but are not required to. Records signed by this key remain cryptographically valid; identity attestation is a separate trust layer (see §8.7 layered trust assessment).',
      ),
    )
  }
  const c = lookup.claim
  const subject = c.claim_subject || {}
  return el('div', {},
    el('dl', { class: 'kv' },
      el('dt', {}, 'claim type'),       el('dd', {}, c.claim_type || '—'),
      el('dt', {}, 'claim method'),     el('dd', {}, el('span', { class: 'mono' }, c.claim_method || '—')),
      el('dt', {}, 'directory epoch'),  el('dd', {}, String(lookup.epoch)),
      el('dt', {}, 'version'),          el('dd', {}, String(lookup.version)),
    ),
    el('h3', { style: 'color: var(--text); margin: 24px 0 12px; font: 600 13px/1 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em;' }, 'subject'),
    el('pre', {}, JSON.stringify(subject, null, 2)),
    c.capabilities ? el('h3', { style: 'color: var(--text); margin: 24px 0 12px; font: 600 13px/1 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em;' }, 'capabilities (§6.7)') : null,
    c.capabilities ? el('pre', {}, JSON.stringify(c.capabilities, null, 2)) : null,
  )
}

// ─── Session view ────────────────────────────────────────────────────────

async function renderSession(contextId) {
  setActiveNav(null)
  const ep = endpoints()
  // Capture route generation: per-view auto-refresh fires route() every
  // 60s, which would otherwise stomp on this render's late awaits. Bail
  // when generation drifts.
  const myGen = currentRouteGeneration()
  const root = el('div')

  root.append(viewHeader({
    crumb: 'session',
    title: 'Session',
    subject: contextId,
    explainer: [
      'A ',
      el('span', { class: 'term' }, 'session'),
      ' is one chunk of agent work. Every record sharing the same ',
      el('code', {}, 'context_id'),
      ' (16-byte hex) belongs to it. The records form a graph: chained in order, sometimes converging on a transaction. The graph below is built only from what the records themselves contain (§3.2.4). No semantic interpretation, no operator policy.',
    ],
  }))

  // Try graph first; fall back to log-derived nodes when graph-node either
  // hasn't ingested the requested context_id OR fails to respond (5xx,
  // timeout, 502 on very large contexts where buildGraph hits a CPU
  // ceiling). The
  // log is the source of truth; the graph is a derived view that may be
  // unreachable, behind on ingestion, or unable to serve a particular
  // session size. fallbackReason distinguishes the cases for the banner.
  let graph = await fetchMaybe(`${ep.graph}/graph/${contextId}`)
  if (!routeGenerationStillCurrent(myGen)) return
  let usingFallback = false
  let fallbackReason = null  // 'not-ingested' | 'graph-error' | null

  if (graph._error || !graph.nodes || graph.nodes.length === 0) {
    // Distinguish 404 (graph-node responded; this context_id genuinely
    // has no records there yet) from any other error class (timeout, 5xx,
    // network failure — graph-node is reachable but couldn't return THIS
    // session). The error string from fetchMaybe is "<status> <statusText>".
    if (graph._error && /^[45]\d\d/.test(graph._error)) {
      fallbackReason = /^404/.test(graph._error) ? 'not-ingested' : 'graph-error'
    } else {
      fallbackReason = 'not-ingested'
    }
    const logEntries = await fetchMaybe(`${ep.log}/by-context/${contextId}`)
    if (!routeGenerationStillCurrent(myGen)) return
    if (!logEntries._error && logEntries.entries && logEntries.entries.length > 0) {
      usingFallback = true
      // Adapt log-entry shape into the graph node shape the renderer expects.
      graph = {
        node_count: logEntries.entries.length,
        edge_count: 0,
        edges: [],
        nodes: logEntries.entries.map(e => ({
          id: e.record_hash,
          event_type: e.event_type,
          creator_key: e.creator_key,
          timestamp: e.timestamp_ms,
          verification_state: 'log_committed',
        })),
      }
    } else {
      root.append(el('section', { class: 'panel' },
        el('div', { class: 'empty' },
          el('span', { class: 'icon' }, '○'),
          'No records found for this context_id in either the graph or the log.',
        ),
      ))
      clearAndRender(root)
      return
    }
  }

  const hasTx = graph.has_transaction || graph.nodes.some(n => n.event_type === 'transaction')
  await resolveIdentities(graph.nodes.map(n => n.creator_key).filter(Boolean))
  if (!routeGenerationStillCurrent(myGen)) return

  // Composition breakdown across the session. Surfaces the event-type
  // diversity (e.g. "473 annotation, 753 tool_call, 204 observation, 54
  // revision") that the bare "transaction: none" stat hides. For
  // transaction-less sessions (the common case) this is the more useful
  // pulse stat; for transaction-bearing sessions both stats are shown.
  const eventTypeCounts = {}
  for (const n of graph.nodes) {
    const et = n.event_type || 'unknown'
    eventTypeCounts[et] = (eventTypeCounts[et] ?? 0) + 1
  }
  const compositionLabel = Object.entries(eventTypeCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 4)
    .map(([k, v]) => `${v} ${k}`)
    .join(' · ')

  root.append(el('div', { class: 'pulse-strip' },
    pulseStat('nodes', String(graph.node_count ?? graph.nodes.length)),
    pulseStat('edges', String(graph.edge_count ?? graph.edges?.length ?? 0)),
    pulseStat('transaction', hasTx ? 'present' : 'none', hasTx ? 'session converges on a transaction' : 'no transaction record (typical for non-commerce sessions)'),
    pulseStat('participants', String(new Set(graph.nodes.map(n => n.creator_key).filter(Boolean)).size), 'distinct identities'),
    pulseStat('composition', compositionLabel || '—', 'top event-type counts'),
  ))

  if (usingFallback) {
    const banner = el('div', {
      style: 'background: var(--info-subtle); border: 1px solid var(--info-border); color: var(--info); padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px;',
    })
    if (fallbackReason === 'graph-error') {
      // Most common cause for very large sessions: graph-node's buildGraph
      // hits a CPU/memory ceiling deriving O(N²) intra-session edges and
      // returns 5xx. The records ARE in graph-node's store; the response
      // just couldn't be assembled. Distinguishing this from the "not
      // ingested" case avoids the misleading "graph-node hasn't ingested"
      // message that previously fired here.
      banner.append(
        el('strong', { style: 'font-weight: 600;' }, 'Showing log-derived view. '),
        'graph-node returned an error for this context_id (likely too large to assemble — sessions with non-chained records produce O(N²) edges that exceed graph-node\'s response budget). The records below are pulled directly from the log (the source of truth). Edges are not shown.',
      )
    } else {
      banner.append(
        el('strong', { style: 'font-weight: 600;' }, 'Showing log-derived view. '),
        'graph-node hasn\'t ingested records under this context_id yet, so edges are unavailable. Showing the records as a tabular list pulled directly from the log (the source of truth).',
      )
    }
    root.append(banner)
  }

  const hasEdges = graph.edges && graph.edges.length > 0

  // Graph panel (only when graph-node returned edges; built but not rendered
  // until after the synchronous root structure is in place — Sigma needs
  // its container attached to the DOM before init).
  let graphContainer = null
  let nodeLegendRow = null
  let edgeLegendRow = null
  if (hasEdges) {
    graphContainer = el('div', { class: 'trace-graph', id: 'session-graph-container' },
      el('div', { class: 'loading' }, 'rendering session graph…'),
    )
    nodeLegendRow = el('div', { class: 'legend-row', id: 'session-node-legend' })
    edgeLegendRow = el('div', { class: 'legend-row', id: 'session-edge-legend' })
    const legend = el('div', { class: 'graph-legend' },
      el('span', { class: 'legend-label' }, 'nodes'),
      nodeLegendRow,
      el('span', { class: 'legend-label' }, 'edges'),
      edgeLegendRow,
    )
    const danglingCount = graph.edges.filter((e) => e.dangling === true).length
    const meta = `${graph.nodes.length} nodes · ${graph.edges.length} edges${danglingCount > 0 ? ` · ${danglingCount} dangling` : ''} · §3.2.4`

    root.append(el('section', { class: 'panel flush' },
      el('div', { class: 'panel-head' },
        el('h2', {}, 'session graph'),
        el('span', { class: 'meta' }, meta),
      ),
      graphContainer,
      legend,
    ))
  }

  // Nodes table — always rendered. The graph above shows STRUCTURE
  // (relationships); this table preserves the per-record METADATA the graph
  // can't surface inline (identity / timestamp / verification badges).
  //
  // Pagination: large sessions (1000+ records — common for long-running
  // collaborative work) made the unpaginated table unreadable AND killed
  // browser scroll performance because every row contained a chip + link
  // + identity badge + timestamp. SESSION_PAGE_SIZE=100 is the load-more
  // unit; a "load more" button at the foot fetches the next page client-
  // side from the already-loaded graph.nodes array (no additional API
  // call — the data was returned in one shot). Sort newest-first so the
  // first page is the most recently active records.
  const SESSION_PAGE_SIZE = 100
  const sortedNodes = [...graph.nodes].sort((a, b) => {
    const ta = typeof a.timestamp === 'number' ? a.timestamp : Date.parse(a.timestamp || 0)
    const tb = typeof b.timestamp === 'number' ? b.timestamp : Date.parse(b.timestamp || 0)
    return tb - ta
  })
  let sessionVisibleCount = Math.min(SESSION_PAGE_SIZE, sortedNodes.length)
  const renderRow = n => el('tr', {},
    el('td', {}, renderEventChip(n.event_type, n.creator_key, n.event_type_uri)),
    el('td', {},
      n.event_type === 'dangling_node'
        ? el('span', { class: 'mono', title: 'unresolved reference (synthetic placeholder)' }, shorten(n.id, 13, 4))
        : el('a', { href: `#/action/${n.id}` },
            el('span', { class: 'mono' }, shorten(n.id, 13, 4)),
          )),
    el('td', {}, n.creator_key ? renderIdentityLabel(n.creator_key) : '—'),
    (() => {
      const tsMs = n.timestamp ? (typeof n.timestamp === 'number' ? n.timestamp : Date.parse(n.timestamp)) : null
      return el('td', {
        class: 'shrink',
        title: tsMs ? new Date(tsMs).toISOString() : '',
        ...(tsMs ? { 'data-ts': String(tsMs) } : {}),
      }, tsMs ? timeAgo(tsMs) : '—')
    })(),
    el('td', {}, badgeForState(n.verification_state)),
  )
  const tbody = el('tbody', {}, ...sortedNodes.slice(0, sessionVisibleCount).map(renderRow))
  const loadMoreSlot = el('div', { class: 'load-more-slot', style: 'padding: 12px 16px; text-align: center;' })
  function refreshLoadMore() {
    const remaining = sortedNodes.length - sessionVisibleCount
    if (remaining <= 0) {
      loadMoreSlot.replaceChildren(el('span', { class: 'meta', style: 'font-size: 12px; color: var(--text-3);' }, `all ${sortedNodes.length} records loaded`))
      return
    }
    loadMoreSlot.replaceChildren(el('button', {
      class: 'load-more',
      onclick: () => {
        const next = Math.min(sessionVisibleCount + SESSION_PAGE_SIZE, sortedNodes.length)
        for (let i = sessionVisibleCount; i < next; i += 1) tbody.append(renderRow(sortedNodes[i]))
        sessionVisibleCount = next
        refreshLoadMore()
      },
    }, `load older (${remaining.toLocaleString()} more)`))
  }
  refreshLoadMore()
  root.append(el('section', { class: 'feed-wrap', style: hasEdges ? 'margin-top: 24px;' : '' },
    el('div', { class: 'feed-head' },
      el('h2', {}, `records (${graph.nodes.length.toLocaleString()})`),
      el('span', { class: 'meta' }, usingFallback ? 'from log · graph not available' : 'derived per spec §3.2.4'),
    ),
    el('div', {},
      el('table', { class: 'feed' },
        el('thead', {}, el('tr', {},
          el('th', {}, 'event'),
          el('th', {}, 'action'),
          el('th', {}, 'identity'),
          el('th', { class: 'shrink' }, 'when'),
          el('th', {}, 'verification'),
        )),
        tbody,
      ),
      loadMoreSlot,
    ),
  ))

  // Edges table — only when graph-node returned edges. The graph encodes
  // type / source / target visually, but the table preserves the per-edge
  // dangling marker (§3.2.4 step 6/7) which the current Sigma rendering
  // doesn't visually distinguish (left for a later polish pass).
  if (hasEdges) {
    const danglingCount = graph.edges.filter((e) => e.dangling === true).length
    const renderTarget = e => e.dangling
      ? el('span', { class: 'mono', title: e.reason || 'dangling reference' },
          shorten(e.target, 10, 4),
          el('span', { class: 'chip event-dangling_node', style: 'margin-left: 6px;' }, 'dangling'))
      : el('a', { href: `#/action/${e.target}` },
          el('span', { class: 'mono' }, shorten(e.target, 10, 4)))
    root.append(el('section', { class: 'feed-wrap', style: 'margin-top: 24px;' },
      el('div', { class: 'feed-head' },
        el('h2', {}, `edges (${graph.edges.length})`),
        el('span', { class: 'meta' },
          danglingCount > 0
            ? `9 deterministic types per §3.2.3 — ${danglingCount} dangling`
            : '9 deterministic types per §3.2.3'),
      ),
      el('div', {},
        el('table', { class: 'feed' },
          el('thead', {}, el('tr', {},
            el('th', {}, 'type'),
            el('th', {}, 'source'),
            el('th', {}, 'target'),
          )),
          el('tbody', {},
            ...graph.edges.map(e => el('tr', {},
              el('td', {}, el('code', {}, e.type)),
              el('td', {}, el('a', { href: `#/action/${e.source}` }, el('span', { class: 'mono' }, shorten(e.source, 10, 4)))),
              el('td', {}, renderTarget(e)),
            )),
          ),
        ),
      ),
    ))
  }

  clearAndRender(root)

  // Async graph viz init (only when hasEdges). Synchronous DOM is now in
  // place above; Sigma can attach to graphContainer.
  if (hasEdges) {
    if (_activeSigmaInstance) {
      try { _activeSigmaInstance.kill() } catch {}
      _activeSigmaInstance = null
    }
    try {
      await loadGraphLibs()
    } catch (e) {
      graphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'graph library load error:'), ' ', e.message,
      ))
      return
    }
    graphContainer.replaceChildren()
    const { sigma } = renderSigmaDAG(graphContainer, graph, {
      isFocalNode: (n) => n.event_type === 'transaction',
    })
    _activeSigmaInstance = sigma
    populateGraphLegend(nodeLegendRow, edgeLegendRow, graph)
  }
}

function badgeForState(state) {
  const map = {
    unsigned:        ['warn', 'unsigned'],
    signature_valid: ['ok',   '✓ signed'],
    log_committed:   ['ok',   '✓ logged'],
    witnessed:       ['ok',   '✓ witnessed'],
  }
  const [cls, txt] = map[state] || ['dim', state || '—']
  return el('span', { class: `badge ${cls}` }, txt)
}

  const myGen = currentRouteGeneration()
  const root = el('div')

        el('dd', {}, entry.creator_key ? renderIdentityLabel(entry.creator_key, { short: false }) : '—'),
        el('dt', {}, 'session'),

          : '—'),
        el('dt', {}, 'verification'),

// ─── Graph viz: lazy-loaded libraries ────────────────────────────────────
// Graph-rendering libraries (graphology, dagre, sigma) only load when a
// graph view actually renders. Overview / identity / action / anchoring /
// about views never pay the bytes.
//
// Versions pinned 2026-05-06; jsDelivr CDN with sha384 SRI integrity
// hashes. If jsDelivr serves a tampered file, the browser blocks it and
// the graph render fails closed (banner shown to user) instead of
// executing untrusted JS in the explorer's origin.
//
// To regenerate hashes after bumping a version:
//   curl -sL <url> | openssl dgst -sha384 -binary | base64
// then prefix with 'sha384-'.

const GRAPH_LIBS = [
  {
    src: 'https://cdn.jsdelivr.net/npm/graphology@0.26.0/dist/graphology.umd.min.js',
    integrity: 'sha384-YdXPUVLFDJ3oITK7LFAPRyzkOcDK06bb7KRaE8GiQyGLsrvHaLS9Ej/lELMC7aCE',
  },
  {
    src: 'https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js',
    integrity: 'sha384-2IH3T69EIKYC4c+RXZifZRvaH5SRUdacJW7j6HtE5rQbvLhKKdawxq6vpIzJ7j9M',
  },
  {
    src: 'https://cdn.jsdelivr.net/npm/sigma@3.0.0/dist/sigma.min.js',
    integrity: 'sha384-LJODrW2yz5f5z94ds0vxQWW6YK2fNbbAWQ291KBJ4NecKigl47jwhH+hYXDYkd4m',
  },
]
let _graphLibsPromise = null
function loadGraphLibs() {
  if (_graphLibsPromise) return _graphLibsPromise
  _graphLibsPromise = (async () => {
    // graphology + dagre have no inter-dependency; load in parallel.
    await Promise.all([loadScript(GRAPH_LIBS[0]), loadScript(GRAPH_LIBS[1])])
    // Sigma's UMD references graphology globally; load it last.
    await loadScript(GRAPH_LIBS[2])
  })().catch((e) => {
    // Reset on failure so a re-render can retry.
    _graphLibsPromise = null
    throw e
  })
  return _graphLibsPromise
}
function loadScript(spec) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script')
    s.src = spec.src
    s.crossOrigin = 'anonymous'
    if (spec.integrity) s.integrity = spec.integrity
    s.onload = () => resolve()
    s.onerror = () => reject(new Error(`failed to load ${spec.src}`))
    document.head.appendChild(s)
  })
}

// Color helpers parallel the chip palette so the graph reads consistently
// with the rest of the dashboard. Reads CSS variables live, so any future
// theme override flows through without a code change.
function _cssVar(name, fallback) {
  const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim()
  return v || fallback
}
function eventTypeColor(eventType) {
  const map = {
    tool_call: '--info',
    transaction: '--accent',
    observation: '--et-observation',
    annotation: '--et-annotation',
    revision: '--et-revision',
    directory_anchor: '--et-system',
    extension: '--muted',
    gap_node: '--et-dangling',
  }
  return _cssVar(map[eventType] || '--muted', '#9ca3af')
}
// Edge color is keyed by edge_type, distinct vocabulary from node event_type.
// All entries resolve via dedicated `--edge-*` tokens defined in :root; the
// CSS records which edges intentionally alias a node color (ANNOTATES, REVISES,
// CONVERGES_ON) versus which get their own hue (--edge-ancestry for INFORMED_BY
// + PROVENANCE_OF — both are ancestry signals not bound to any one event_type).
function edgeTypeColor(edgeType) {
  const map = {
    INFORMED_BY:      '--edge-ancestry',
    PROVENANCE_OF:    '--edge-ancestry',
    ANNOTATES:        '--edge-annotates',
    REVISES:          '--edge-revises',
    CHAIN_PRECEDES:   '--edge-chain',
    CONVERGES_ON:     '--edge-converges',
    SESSION_PRECEDES: '--edge-session-precedes',
    SESSION_PARALLEL: '--edge-session-parallel',
    CROSS_SESSION:    '--edge-cross-session',
  }
  return _cssVar(map[edgeType] || '--muted', '#9ca3af')
}

// ─── Shared DAG renderer (graphology + dagre + sigma) ────────────────────
// One pipeline used by every graph view (trace, session DAG, future creator
// activity map). Caller supplies the graph data ({nodes, edges} from any
// graph-node response) plus optional focal-node test + click handler. The
// helper returns the live sigma instance so the caller can kill() it before
// the next render.
//
// Layout selection (per-render, by graph shape):
//   - HIERARCHICAL_EDGE_TYPES present + total edges < DAGRE_MAX_EDGES
//     -> dagre top-to-bottom DAG (the right tool for ancestry / chain views)
//   - dense + non-hierarchical (e.g., a session with no chain_root
//     reconstruction so every record gets all-pairs SESSION_PRECEDES,
//     n*(n-1)/2 edges) -> built-in circular layout
//
// Why not force-atlas2 for the dense case: graphology-layout-forceatlas2 is
// published as CommonJS, not browser-ready UMD. Bringing it in needs an
// esm.sh import or local bundle. Circular gets the dense graph rendered
// cleanly with zero new deps; FA2 is queued as polish for a later iteration.
//
// Color decisions defer to eventTypeColor() / edgeTypeColor() so any palette
// override flows through both the helper and the legend code paths.

const HIERARCHICAL_EDGE_TYPES = new Set([
  'CHAIN_PRECEDES',
  'INFORMED_BY',
  'PROVENANCE_OF',
  'ANNOTATES',
  'REVISES',
  'CONVERGES_ON',
])
const DAGRE_MAX_EDGES = 2000

function renderSigmaDAG(container, graphData, options = {}) {
  const {
    isFocalNode = () => false,
    focalSize = 16,
    nodeSize = 10,
    rankDir = 'TB',
    nodeSep = 50,
    rankSep = 70,
    edgeSize = 2,
    onNodeClick = null,
  } = options

  const Graph = window.graphology.Graph
  const Sigma = window.Sigma
  const dagre = window.dagre

  // Decide layout up front based on graph shape.
  const totalEdges = graphData.edges.length
  const hierarchicalEdgeCount = graphData.edges.filter((e) =>
    HIERARCHICAL_EDGE_TYPES.has(e.type),
  ).length
  const useDagre = totalEdges < DAGRE_MAX_EDGES && (hierarchicalEdgeCount > 0 || totalEdges < 100)

  const gx = new Graph({ type: 'directed', multi: true, allowSelfLoops: false })

  // Build graphology graph (always). Build dagre side-graph only if we'll
  // actually run dagre.layout — saves the per-node setNode call when not.
  const dgx = useDagre ? new dagre.graphlib.Graph({ multigraph: true }) : null
  if (dgx) {
    dgx.setGraph({ rankdir: rankDir, ranksep: rankSep, nodesep: nodeSep, marginx: 30, marginy: 30 })
    dgx.setDefaultEdgeLabel(() => ({}))
  }

  for (const n of graphData.nodes) {
    const isFocal = isFocalNode(n)
    const color = eventTypeColor(n.event_type)
    const size = isFocal ? focalSize : nodeSize
    const labelHash = n.record_hash || (n.id ? (n.id.startsWith('sha256:') ? n.id : `sha256:${n.id}`) : '')
    const label = `${n.event_type || '?'} · ${shorten(labelHash, 8, 4)}`

    gx.addNode(n.id, {
      x: 0, y: 0,
      size,
      color,
      label,
      _node: n,
      _isFocal: isFocal,
    })
    if (dgx) {
      // Dagre node sizes are pixel boxes for layout spacing only.
      dgx.setNode(n.id, { width: Math.max(60, label.length * 7), height: 28 })
    }
  }

  // Distinct-key edges so multi-edges (same source/target, different type)
  // don't collide. Defensive try/catch: graph-node shouldn't emit an edge
  // referencing a missing node, but skip rather than crash if it does.
  let edgeSeq = 0
  for (const e of graphData.edges) {
    const color = edgeTypeColor(e.type)
    const key = `${e.source}->${e.target}#${e.type}#${edgeSeq++}`
    if (!gx.hasNode(e.source) || !gx.hasNode(e.target)) continue
    try {
      gx.addEdgeWithKey(key, e.source, e.target, {
        size: edgeSize,
        color,
        type: 'arrow',
        label: e.type,
        _edge: e,
      })
    } catch {
      continue
    }
    if (dgx) dgx.setEdge(e.source, e.target, {}, key)
  }

  if (useDagre) {
    dagre.layout(dgx)
    // Copy positions back to graphology; flip y because Sigma's coordinate
    // system has y growing upward (mathematical) while dagre's grows downward
    // (screen). Without the flip the graph reads bottom-up on screen.
    gx.forEachNode((nodeId) => {
      const dnode = dgx.node(nodeId)
      if (dnode) {
        gx.mergeNodeAttributes(nodeId, { x: dnode.x, y: -dnode.y })
      }
    })
  } else {
    // Circular layout: scale radius with node count so labels don't crowd
    // for small graphs and the ring is large enough to spread for dense ones.
    const n = gx.order
    const radius = Math.max(200, n * 6)
    let i = 0
    gx.forEachNode((nodeId) => {
      const angle = (i / n) * 2 * Math.PI
      gx.mergeNodeAttributes(nodeId, {
        x: Math.cos(angle) * radius,
        y: Math.sin(angle) * radius,
      })
      i++
    })
  }

  // Custom arrow program: defaults are length=2.5x, wideness=2x of the edge
  // size, which renders almost-invisible heads on thin lines. Bumping the
  // ratios lets the line stay slim while the direction marker reads at a
  // glance — direction is the load-bearing signal in any provenance graph.
  const ProminentArrowProgram = Sigma.rendering.createEdgeArrowProgram({
    lengthToThicknessRatio: 5,
    widenessToThicknessRatio: 6,
  })

  const sigmaInstance = new Sigma(gx, container, {
    renderEdgeLabels: false,
    defaultEdgeType: 'arrow',
    edgeProgramClasses: { arrow: ProminentArrowProgram },
    defaultNodeColor: _cssVar('--muted', '#9ca3af'),
    labelColor: { color: _cssVar('--text-2', '#a0a3ab') },
    labelSize: 11,
    labelDensity: 0.4,
    edgeLabelColor: { color: _cssVar('--text-3', '#6a6e78') },
  })

  // Default click → drill into the matching action view. Caller can override
  // (e.g., a session view might prefer to highlight in-place rather than
  // navigate). Callback signature: (nodeId, sourceRecord) => void.
  const handleClick = onNodeClick || ((nodeId, sourceRecord) => {
    if (sourceRecord && sourceRecord.record_hash) {
      location.hash = `#/action/${sourceRecord.record_hash}`
    } else if (sourceRecord && sourceRecord.id) {
      const id = sourceRecord.id.startsWith('sha256:') ? sourceRecord.id : `sha256:${sourceRecord.id}`
      location.hash = `#/action/${id}`
    }
  })
  sigmaInstance.on('clickNode', ({ node }) => {
    const attrs = gx.getNodeAttributes(node)
    handleClick(node, attrs._node)
  })

  return { sigma: sigmaInstance, graph: gx }
}

// Pair-aware legend population for any graph view. Two-row layout:
//   row 1 (nodes): event_type swatches as filled discs
//   row 2 (edges): edge_type swatches as 2px lines
// Paired entries (annotation/ANNOTATES, revision/REVISES, transaction/
// CONVERGES_ON) stack in the same grid column; unpaired entries flow
// into a shared tail column that flexes independently per row.
function populateGraphLegend(nodeLegendRow, edgeLegendRow, graphData) {
  const PAIRS = [
    ['annotation', 'ANNOTATES'],
    ['revision', 'REVISES'],
    ['transaction', 'CONVERGES_ON'],
  ]
  const pairedNodeSet = new Set(PAIRS.map((p) => p[0]))
  const pairedEdgeSet = new Set(PAIRS.map((p) => p[1]))

  const presentNodeKinds = new Set(graphData.nodes.map((n) => n.event_type).filter(Boolean))
  const presentEdgeTypes = new Set(graphData.edges.map((e) => e.type))

  const activePairs = PAIRS.filter(([n, e]) =>
    presentNodeKinds.has(n) || presentEdgeTypes.has(e),
  )

  const nodeKindOrder = ['tool_call', 'observation', 'directory_anchor', 'extension', 'gap_node']
  const presentUnpairedNodes = nodeKindOrder.filter((k) =>
    !pairedNodeSet.has(k) && presentNodeKinds.has(k),
  )

  const edgeKindOrder = [
    ['INFORMED_BY', 'informed_by'],
    ['PROVENANCE_OF', 'provenance_of'],
    ['CHAIN_PRECEDES', 'chain_precedes'],
    ['SESSION_PRECEDES', 'session_precedes'],
    ['SESSION_PARALLEL', 'session_parallel'],
    ['CROSS_SESSION', 'cross_session'],
  ]
  const presentUnpairedEdges = edgeKindOrder.filter(([typ]) =>
    !pairedEdgeSet.has(typ) && presentEdgeTypes.has(typ),
  )

  const tailCol = activePairs.length + 1

  const nodeSwatches = []
  activePairs.forEach(([nodeKind], i) => {
    if (presentNodeKinds.has(nodeKind)) {
      nodeSwatches.push(el('span',
        { class: `swatch node ${nodeKind}`, style: `grid-column: ${i + 1};` },
        nodeKind))
    }
  })
  if (presentUnpairedNodes.length > 0) {
    const tail = el('div', { class: 'legend-tail', style: `grid-column: ${tailCol};` })
    presentUnpairedNodes.forEach((kind) => {
      tail.append(el('span', { class: `swatch node ${kind}` }, kind))
    })
    nodeSwatches.push(tail)
  }
  if (nodeSwatches.length === 0) {
    nodeLegendRow.replaceChildren(el('span', { class: 'swatch empty' }, 'none'))
  } else {
    nodeLegendRow.replaceChildren(...nodeSwatches)
  }

  const edgeSwatches = []
  activePairs.forEach(([, edgeKind], i) => {
    if (presentEdgeTypes.has(edgeKind)) {
      const cls = edgeKind.toLowerCase()
      edgeSwatches.push(el('span',
        { class: `swatch edge ${cls}`, style: `grid-column: ${i + 1};` },
        edgeKind))
    }
  })
  if (presentUnpairedEdges.length > 0) {
    const tail = el('div', { class: 'legend-tail', style: `grid-column: ${tailCol};` })
    presentUnpairedEdges.forEach(([typ, cls]) => {
      tail.append(el('span', { class: `swatch edge ${cls}` }, typ))
    })
    edgeSwatches.push(tail)
  }
  if (edgeSwatches.length === 0) {
    edgeLegendRow.replaceChildren(el('span', { class: 'swatch empty' }, 'none'))
  } else {
    edgeLegendRow.replaceChildren(...edgeSwatches)
  }
}

// ─── Trace view (provenance ancestry visualization) ──────────────────────
// Backward BFS from a starting record_hash via INFORMED_BY (D041), ANNOTATES
// (D058), REVISES (D059) edges. Renders the ancestor subgraph as a directed
// DAG with dagre layout; Sigma.js draws to canvas/WebGL.
//
// Caveats inherited from /v1/trace:
//  - PROVENANCE_OF refs (16-byte truncations per §1.2.6) are not walked
//    server-side because resolving requires a scan; they appear in the
//    response payload but not the ancestor subgraph.
//  - Dangling edges (§3.2.4 step 6) — INFORMED_BY refs to records not in
//    the resolved set — surface as `gap_node` entries in graph.nodes.

let _activeSigmaInstance = null

// Merge two graph responses (each {nodes:[], edges:[], ...}) into a single
// graph response. Nodes are deduped by id (same record is included only once
// even if both endpoints returned it). Edges are deduped by (source, target,
// type) tuple. Other top-level fields are taken from the first non-empty
// graph (context_id, has_transaction, etc.) — these aren't well-defined for
// a merged trace+chain view, so the dashboard treats them as informational.
function mergeGraphs(a, b) {
  const seenNodes = new Map()
  const seenEdges = new Set()
  const out = {
    nodes: [],
    edges: [],
    spec_version: a.spec_version || b.spec_version,
    context_id: a.context_id || b.context_id,
    generated_at: a.generated_at || b.generated_at,
  }
  for (const n of [...(a.nodes || []), ...(b.nodes || [])]) {
    const id = n.id || n.record_hash
    if (!id || seenNodes.has(id)) continue
    seenNodes.set(id, n)
    out.nodes.push(n)
  }
  for (const e of [...(a.edges || []), ...(b.edges || [])]) {
    const src = e.source || e.from
    const tgt = e.target || e.to
    const key = `${src}|${tgt}|${e.type}`
    if (seenEdges.has(key)) continue
    seenEdges.add(key)
    out.edges.push(e)
  }
  out.node_count = out.nodes.length
  out.edge_count = out.edges.length
  return out
}

// Render a compact "Chain predecessors" section as a linear sequence of
// record links. The chain endpoint per §3.4.6 walks chain_precedes
// backward — substrate-derived ordering, distinct from the
// producer-claimed ancestry that /v1/trace surfaces. The chain is linear
// (each record has exactly one chain_precedes ancestor), so the list reads
// alongside the merged DAG: the graph shows the full topology including
// chain edges; the list shows the linear timeline at a glance.
function appendChainSection(root, chainResult, fullHash) {
  // The "chain timeline" naming + scope-explicit meta line make the
  // section's purpose unambiguous: this is the linear chain_precedes walk,
  // a subset of what the graph above shows. Without these tweaks, readers
  // who don't already know the spec couldn't tell whether the list was
  // re-rendering the same data as the graph or showing something different.
  const sectionHead = el('div', { class: 'panel-head' },
    el('h2', {}, 'chain timeline'),
    el('span', { class: 'meta' }, 'linear view · ', el('code', {}, 'chain_precedes'), ' only'),
  )

  if (!chainResult || chainResult._error) {
    root.append(el('section', { class: 'panel', style: 'margin-top: 24px;' },
      sectionHead,
      el('div', { class: 'panel-body' },
        el('div', { class: 'empty' },
          'Could not fetch chain predecessors',
          chainResult?._error ? `: ${chainResult._error}` : '.',
        ),
      ),
    ))
    return
  }

  const nodes = (chainResult.graph?.nodes || []).slice()
  // graph-builder returns nodes in arbitrary order; sort newest-first by
  // timestamp so the start record appears at the top and predecessors run
  // backward in time below it.
  nodes.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))

  if (nodes.length <= 1) {
    root.append(el('section', { class: 'panel', style: 'margin-top: 24px;' },
      sectionHead,
      el('div', { class: 'panel-body' },
        el('div', { class: 'empty' },
          'No ', el('code', {}, 'chain_precedes'), ' predecessors. ',
          'This is the genesis record of its session — ',
          el('code', {}, 'chain_root'), ' equals ', el('code', {}, 'SHA-256(context_id)'),
          ' per spec §1.2.3.',
        ),
      ),
    ))
    return
  }

  const list = el('ol', { class: 'chain-list', style: 'list-style: none; padding: 0; margin: 0;' })
  for (const node of nodes) {
    const isStart = node.record_hash === fullHash || node.id === fullHash
    const recordHash = node.record_hash || node.id || ''
    list.append(el('li', { style: 'padding: 8px 0; border-bottom: 1px solid var(--bd-2); display: flex; align-items: center; gap: 12px; flex-wrap: wrap;' },
      isStart
        ? el('span', { class: 'chip', style: 'background: var(--accent-soft); color: var(--accent);' }, 'start')
        : null,
      renderEventChip(node.event_type, node.creator_key, node.event_type_uri),
      el('a', { href: `#/action/${recordHash}`, class: 'mono', style: 'color: var(--text-1);' },
        shorten(recordHash, 14, 6),
      ),
      node.timestamp
        ? el('span', { class: 'meta', style: 'margin-left: auto; font-size: 12px;' }, timeAgo(node.timestamp))
        : null,
    ))
  }

  const truncated = chainResult.truncated_by_depth
  root.append(el('section', { class: 'panel', style: 'margin-top: 24px;' },
    sectionHead,
    el('div', { class: 'panel-body' },
      // Scope hint: explicitly call out that this list is a SUBSET (just
      // chain_precedes) of what the graph above renders. The graph derives
      // every applicable edge type from the merged record set — up to 9
      // when all are present — so naming a fixed count would be wrong.
      el('p', { style: 'margin: 0 0 12px; color: var(--text-3); font-size: 13px;' },
        'Linear timeline view of the substrate-derived ',
        el('code', {}, 'chain_precedes'),
        ' edges only. The graph above shows producer-claimed ancestry (',
        el('code', {}, 'informed_by'),
        ', ',
        el('code', {}, 'annotates'),
        ', ',
        el('code', {}, 'revises'),
        ') alongside substrate-derived structure (',
        el('code', {}, 'chain_precedes'),
        ' plus session_precedes / session_parallel / cross_session / converges_on / provenance_of when applicable). This section is the linear backbone read from the same chain.',
      ),
      el('p', { style: 'margin: 0 0 12px; color: var(--text-2);' },
        nodes.length - 1, ' substrate-derived predecessor',
        nodes.length === 2 ? '' : 's',
        ' via ', el('code', {}, 'chain_precedes'),
        '. Walks backward through ', el('code', {}, 'chain_root'),
        ' until session genesis.',
      ),
      list,
      truncated
        ? el('p', { style: 'margin-top: 12px; color: var(--warn); font-size: 13px;' },
            'Depth ceiling reached — chain extends further. Increase depth via the slider.')
        : null,
    ),
  ))
}

async function renderTrace(rawHash) {
  setActiveNav(null)
  const ep = endpoints()
  // Capture the generation at entry; any post-fetch DOM write below bails
  // when the user navigated away mid-fetch.
  const myGen = currentRouteGeneration()

  // Tear down any prior Sigma instance from a previous render. Sigma
  // attaches canvas + event listeners that leak across hashchange.
  if (_activeSigmaInstance) {
    try { _activeSigmaInstance.kill() } catch {}
    _activeSigmaInstance = null
  }

  // Accept both "sha256:<hex>" and bare 64-char hex; canonicalize once.
  const hashHex = rawHash.startsWith('sha256:') ? rawHash.slice(7) : rawHash
  const fullHash = `sha256:${hashHex}`

  if (!/^[0-9a-f]{64}$/.test(hashHex)) {
    clearAndRender(el('div', {},
      viewHeader({
        crumb: 'trace',
        title: 'Provenance trace',
        explainer: ['Backward provenance walk from a signed record. Follows ', el('code', {}, 'informed_by'), ', ', el('code', {}, 'annotates'), ', ', el('code', {}, 'revises'), '.'],
      }),
      el('section', { class: 'panel' },
        el('div', { class: 'err-banner' },
          el('span', { class: 'label' }, 'invalid record_hash:'),
          ' expected 64 hex chars, optionally prefixed with sha256:',
        ),
      ),
    ))
    return
  }

  const root = el('div')
  root.append(viewHeader({
    crumb: 'trace',
    title: 'Provenance trace',
    subject: fullHash,
    explainer: [
      'A ',
      el('span', { class: 'term' }, 'trace'),
      ' is the backward provenance of one signed record, split into two views per spec §3.4.5/§3.4.6 (D068). The ',
      el('strong', {}, 'graph above'),
      ' merges producer claims (',
      el('code', {}, 'informed_by'),
      ', ',
      el('code', {}, 'annotates'),
      ', ',
      el('code', {}, 'revises'),
      ') with substrate-derived structure (',
      el('code', {}, 'chain_precedes'),
      ' plus session/cross-session/transaction edges when applicable) — up to 9 edge types when all are present. The ',
      el('strong', {}, 'chain timeline below'),
      ' is the linear backbone of the chain, ',
      el('code', {}, 'chain_precedes'),
      ' only. Every node is a real signed record; every edge is derived from record content alone — no semantic interpretation.',
    ],
  }))

  // Depth from URL search params; clamped to the /v1/trace endpoint cap (20).
  const params = new URLSearchParams(location.search)
  let depth = Math.max(1, Math.min(parseInt(params.get('depth') ?? '5', 10) || 5, 20))

  const depthReadout = el('span', { class: 'depth-readout' }, `depth ${depth}`)
  const depthInput = el('input', {
    type: 'range', min: '1', max: '20', value: String(depth), step: '1',
    style: 'width: 120px;',
    oninput: (ev) => {
      depth = parseInt(ev.target.value, 10)
      depthReadout.textContent = `depth ${depth}`
    },
    onchange: () => {
      // Re-render at new depth. Use search-param so the URL is shareable.
      const newUrl = new URL(location.href)
      newUrl.searchParams.set('depth', String(depth))
      history.replaceState(null, '', newUrl.toString())
      route()
    },
  })

  const controls = el('div', { class: 'trace-controls' },
    el('label', {}, 'start'),
    el('span', { class: 'start-link' },
      el('a', { href: `#/action/${fullHash}` },
        el('span', { class: 'mono' }, shorten(fullHash, 14, 6)),
      ),
    ),
    el('label', { style: 'margin-left: 16px;' }, 'depth'),
    depthInput,
    depthReadout,
    el('span', { class: 'actions' },
      el('a', { href: `#/action/${fullHash}` }, 'open record →'),
    ),
  )

  const graphContainer = el('div', { class: 'trace-graph', id: 'trace-graph-container' },
    el('div', { class: 'loading' }, 'loading provenance graph…'),
  )
  // Two-row legend: NODES (event_type colors) + EDGES (edge_type colors).
  // Both rows filter dynamically to only the kinds present in the response.
  const nodeLegendRow = el('div', { class: 'legend-row', id: 'trace-node-legend' })
  const edgeLegendRow = el('div', { class: 'legend-row', id: 'trace-edge-legend' })
  const legend = el('div', { class: 'graph-legend' },
    el('span', { class: 'legend-label' }, 'nodes'),
    nodeLegendRow,
    el('span', { class: 'legend-label' }, 'edges'),
    edgeLegendRow,
  )
  const truncationSlot = el('div')
  const startSummary = el('section', { class: 'panel', style: 'margin-top: 24px;' },
    el('div', { class: 'panel-head' },
      el('h2', {}, 'start record'),
    ),
    el('div', { class: 'panel-body', id: 'trace-start-summary' },
      el('div', { class: 'empty' }, 'loading…'),
    ),
  )

  root.append(
    el('section', { class: 'panel flush' },
      el('div', { class: 'panel-head' },
        el('h2', {}, 'ancestry graph'),
        el('span', { class: 'meta' }, 'producer claims + substrate structure · all 9 edge types when present'),
      ),
      controls,
      graphContainer,
      legend,
    ),
    truncationSlot,
    startSummary,
  )

  clearAndRender(root)

  // Lazy-load libs while BOTH the trace and chain fetches are in flight.
  // /v1/trace walks producer-claimed ancestry (informed_by/annotates/revises);
  // /v1/chain walks substrate-derived chain_precedes per spec §3.4.6 / D068.
  // The two operations are disjoint by design — see D068 for the
  // structure-vs-claims separation.
  const [libErr, traceResult, chainResult] = await Promise.all([
    loadGraphLibs().then(() => null).catch((e) => e),
    fetchMaybe(`${ep.graph}/trace/${hashHex}?depth=${depth}`),
    fetchMaybe(`${ep.graph}/chain/${hashHex}?depth=${depth}`),
  ])

  // The user may have navigated away during the parallel fetches above.
  // Bailing here prevents the trace renderer from stomping on whatever
  // view is now in progress.
  if (!routeGenerationStillCurrent(myGen)) return

  if (libErr) {
    graphContainer.replaceChildren(el('div', { class: 'err-banner' },
      el('span', { class: 'label' }, 'graph library load error:'), ' ', libErr.message,
    ))
    return
  }

  if (traceResult._error) {
    // Distinguish graph-node lag (record is signed + committed to the log,
    // but graph-node hasn't pulled it from the mirror yet — common for
    // recently-emitted records) from a genuine missing record. The probe
    // against log-node is cheap and only runs on the error path.
    const logProbe = await fetchMaybe(`${ep.log}/lookup/${hashHex}`)
    const inLog = !logProbe._error
    const startSummaryEl = document.getElementById('trace-start-summary')

    if (inLog && /\b404\b/.test(traceResult._error)) {
      graphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('div', { class: 'err-body' },
          el('p', { style: 'margin: 0 0 8px;' },
            el('span', { class: 'label', style: 'color: var(--text-2); font-weight: 600;' },
              'graph-node still indexing this record.'),
          ),
          el('p', { style: 'margin: 0 0 14px;' },
            'It\'s signed and committed to the log (', el('code', {}, '/v1/lookup'),
            ' returns 200), but hasn\'t propagated through the mirror to graph-node yet. Provenance edges land after the next mirror push.',
          ),
          el('div', {},
            el('a', {
              href: location.hash, // self-link forces re-fetch via route()
              onclick: (ev) => { ev.preventDefault(); route() },
              style: 'color: var(--accent); border-bottom: 1px dotted var(--accent); text-decoration: none; margin-right: 16px;',
            }, '↻ retry'),
            el('a', {
              href: `#/action/${fullHash}`,
              style: 'color: var(--text-2); border-bottom: 1px dotted var(--text-3); text-decoration: none;',
            }, 'view the record directly →'),
          ),
        ),
      ))
      // Populate the start-record summary from the log lookup so the user
      // still sees the record's metadata while waiting on graph-node.
      if (startSummaryEl && logProbe.creator_key) {
        await resolveIdentity(logProbe.creator_key)
        startSummaryEl.replaceChildren(el('dl', { class: 'kv' },
          el('dt', {}, 'event_type'),
          el('dd', {}, renderEventChip(logProbe.event_type, logProbe.creator_key)),
          el('dt', {}, 'identity'),
          el('dd', {}, renderIdentityLabel(logProbe.creator_key, { short: false })),
          el('dt', {}, 'session'),
          el('dd', {}, logProbe.context_id
            ? el('a', { href: `#/session/${logProbe.context_id}` }, el('span', { class: 'mono' }, logProbe.context_id))
            : '—'),
          el('dt', {}, 'timestamp'),
          el('dd', {}, logProbe.timestamp_ms
            ? el('span', {}, timeAgo(logProbe.timestamp_ms), ' · ', el('span', { class: 'mono' }, isoTime(logProbe.timestamp_ms)))
            : '—'),
        ))
      }
    } else if (!inLog) {
      graphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'record not found.'),
        ' No signed record with this hash exists on either log-node or graph-node.',
      ))
      if (startSummaryEl) {
        startSummaryEl.replaceChildren(el('div', { class: 'empty' }, 'no record found at this hash'))
      }
    } else {
      graphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'trace error:'), ' ', traceResult._error,
      ))
      if (startSummaryEl) {
        startSummaryEl.replaceChildren(el('div', { class: 'empty' }, 'unable to load record summary'))
      }
    }
    return
  }

  // Merge the trace graph (producer-claimed ancestry) and chain graph
  // (substrate-derived chain_precedes) into one rendered DAG. The two API
  // endpoints stay disjoint per D068 (structure-vs-claims separation at the
  // protocol layer), but the dashboard composes them client-side so users see
  // every relationship in one visualization. Without the merge, chain
  // predecessors only rendered in the list section below — an unjustified
  // asymmetry given chain_precedes is a first-class edge type per §3.2.3.
  const traceGraph = traceResult.graph || { nodes: [], edges: [] }
  const chainGraph = chainResult && !chainResult._error
    ? (chainResult.graph || { nodes: [], edges: [] })
    : { nodes: [], edges: [] }
  const graph = mergeGraphs(traceGraph, chainGraph)
  const nodeCount = graph.nodes.length
  const edgeCount = graph.edges.length

  // Pre-resolve identity claims so renderIdentityLabel can pull synchronously.
  const creatorKeys = [...new Set(graph.nodes.map((n) => n.creator_key).filter(Boolean))]
  if (creatorKeys.length) await resolveIdentities(creatorKeys)

  // Truncation banners — depth and/or count exceeded.
  if (traceResult.truncated_by_depth || traceResult.truncated_by_count) {
    const banner = el('div', { class: 'trace-truncation' })
    if (traceResult.truncated_by_depth) {
      banner.append(
        el('strong', {}, 'depth ceiling reached'),
        ` — ${traceResult.depth_requested} hops walked. Some ancestors above the ceiling are not in this graph. Increase depth via the slider (max 20).`,
      )
    }
    if (traceResult.truncated_by_count) {
      banner.append(
        traceResult.truncated_by_depth ? el('br', {}) : null,
        el('strong', {}, 'node cap reached'),
        ' — 500 ancestors (the per-trace endpoint cap). Reduce depth or fetch upstream subtrees from individual records.',
      )
    }
    truncationSlot.append(banner)
  }

  // Start-record summary panel. Find the start node by record_hash match;
  // graph-node uses opaque ids, so several lookup attempts cover the field
  // shape without taking a hard dependency on it.
  const startNode = graph.nodes.find((n) =>
    n.record_hash === fullHash || n.id === hashHex || n.id === fullHash,
  ) || graph.nodes[0]
  const startSummaryEl = document.getElementById('trace-start-summary')
  if (startNode && startSummaryEl) {
    startSummaryEl.replaceChildren(el('dl', { class: 'kv' },
      el('dt', {}, 'event_type'),
      el('dd', {}, renderEventChip(startNode.event_type, startNode.creator_key, startNode.event_type_uri)),
      el('dt', {}, 'identity'),
      el('dd', {}, startNode.creator_key ? renderIdentityLabel(startNode.creator_key, { short: false }) : '—'),
      el('dt', {}, 'session'),
      el('dd', {}, startNode.context_id
        ? el('a', { href: `#/session/${startNode.context_id}` }, el('span', { class: 'mono' }, startNode.context_id))
        : '—'),
      el('dt', {}, 'timestamp'),
      el('dd', {}, startNode.timestamp
        ? el('span', {}, timeAgo(startNode.timestamp), ' · ', el('span', { class: 'mono' }, isoTime(startNode.timestamp)))
        : '—'),
      el('dt', {}, 'ancestors found'),
      el('dd', {},
        `${nodeCount - 1} record${nodeCount === 2 ? '' : 's'}`,
        ', ',
        `${edgeCount} edge${edgeCount === 1 ? '' : 's'}`,
      ),
    ))
  }

  // Populate both legend rows in one shared call (used by every graph view).
  populateGraphLegend(nodeLegendRow, edgeLegendRow, graph)

  // True empty case: neither producer-claimed nor substrate-derived ancestors.
  // The merged graph still has the start record as a single isolated node;
  // skip the DAG render and surface the explainer text instead.
  if (nodeCount <= 1) {
    graphContainer.replaceChildren(el('div', { class: 'empty' },
      'No ancestors. This record has no ',
      el('code', {}, 'informed_by'), ', ',
      el('code', {}, 'annotates'), ', ',
      el('code', {}, 'revises'),
      ', or ',
      el('code', {}, 'chain_precedes'),
      ' edges into the resolved set — typically a session genesis with no producer-claimed informants.',
    ))
    appendChainSection(root, chainResult, fullHash)
    return
  }
  appendChainSection(root, chainResult, fullHash)

  // Hand off to the shared DAG renderer. The trace view's only specialty
  // here is the focal-node test (start record can match by record_hash, by
  // hashHex, or by sha256-prefixed id depending on the node-id shape
  // graph-node returned).
  graphContainer.replaceChildren()
  const { sigma } = renderSigmaDAG(graphContainer, graph, {
    isFocalNode: (n) =>
      (n.record_hash === fullHash) || (n.id === hashHex) || (n.id === fullHash),
  })
  _activeSigmaInstance = sigma
}

async function renderAnchoring() {
  setActiveNav('anchoring')
  const ep = endpoints()
  const myGen = currentRouteGeneration()
  const root = el('div')

  root.append(viewHeader({
    crumb: 'anchoring',
    title: 'Anchoring',
    explainer: [
      el('span', { class: 'term' }, 'Anchoring'),
      ' is the unforgery story. The Merkle log emits signed checkpoints in C2SP signed-note format (§2.4). The directory writes back into that log on every operation (§6.2.4). Together that means any retroactive change to the log would invalidate every signature that came after.',
    ],
  }))

  const stack = el('div', { class: 'stack' })
  root.append(stack)

  const [stats, checkpointResult, dirAnchor] = await Promise.all([
    fetchMaybe(`${ep.log}/stats`),
    fetchTextMaybe(`${ep.log}/checkpoint`),
    fetchMaybe(`${ep.directory}/anchor`),
  ])
  if (!routeGenerationStillCurrent(myGen)) return

  if (!stats._error) {
    const eb = stats.entries_by_event_type || {}
    const total = Object.values(eb).reduce((a, b) => a + b, 0)
    stack.append(el('div', { class: 'pulse-strip' },
      pulseStat('tree size', String(stats.tree_size ?? '—'), 'total signed entries'),
      pulseStat('signers', String(stats.distinct_signers ?? '—'), 'distinct creator_keys'),
      pulseStat('time span',
        stats.oldest_timestamp_ms && stats.newest_timestamp_ms
          ? `${Math.max(1, Math.round((stats.newest_timestamp_ms - stats.oldest_timestamp_ms) / (1000 * 60 * 60)))}h`
          : '—',
        stats.oldest_timestamp_ms ? `since ${new Date(stats.oldest_timestamp_ms).toISOString().slice(0, 10)}` : null),
      pulseStat('event mix',
        Object.entries(eb).filter(([_, v]) => v > 0).length + ' types',
        total > 0
          ? Object.entries(eb).filter(([_, v]) => v > 0).map(([k, v]) => `${k} ${Math.round((v / total) * 100)}%`).join(' · ')
          : 'no entries'),
    ))
  }

  stack.append(el('section', { class: 'panel flush' },
    el('div', { class: 'panel-head' },
      el('h2', {}, 'latest log checkpoint'),
      el('span', { class: 'meta' }, 'C2SP signed-note (§2.4)'),
    ),
    el('div', { class: 'panel-body' },
      checkpointResult._error
        ? el('div', { class: 'err-banner' },
            el('span', { class: 'label' }, 'checkpoint error:'), checkpointResult._error)
        : el('pre', {}, checkpointResult.text || '(no checkpoint)'),
      el('p', { style: 'color: var(--text-3); font-size: 13px; margin: 12px 0 0;' },
        'The body (above the blank line) commits to the log\'s origin, current size, and Merkle root. The signature lines below verify against the log operator key (',
        el('code', {}, '/v1/log-pubkey'),
        ') plus any registered witnesses. To independently verify: fetch ',
        el('code', {}, '/v1/log-pubkey'),
        ' and check the Ed25519 signature over the body.'),
    ),
  ))

  stack.append(el('section', { class: 'panel flush' },
    el('div', { class: 'panel-head' },
      el('h2', {}, 'directory anchor'),
      el('span', { class: 'meta' }, 'per-operation anchoring (§6.2.4)'),
    ),
    el('div', { class: 'panel-body' },
      dirAnchor._error
        ? el('div', { class: 'err-banner' },
            el('span', { class: 'label' }, 'directory error:'), dirAnchor._error)
        : el('dl', { class: 'kv' },
            el('dt', {}, 'epoch'),            el('dd', {}, String(dirAnchor.epoch ?? '—')),
            el('dt', {}, 'root_hash'),        el('dd', {}, el('span', { class: 'mono' }, dirAnchor.root_hash || '—')),
            el('dt', {}, 'origin'),           el('dd', {}, el('span', { class: 'mono' }, dirAnchor.directory_origin || '—')),
          ),
      el('p', { style: 'color: var(--text-3); font-size: 13px; margin: 16px 0 0;' },
        'Per spec §6.2.4 per-operation anchoring: every directory state change emits a ',
        el('code', {}, 'directory_anchor'),
        ' record to the log immediately. This binds directory history to log history. A verifier can prove the directory state at any historical checkpoint root.'),
    ),
  ))

  clearAndRender(root)
}

        'And it\'s not "trust the operator." atrib certifies signing, not truth. The full threat model lives in §8.7 of the spec.',
      ),

      el('h2', {}, 'Override endpoints (for local dev)'),
      el('p', {},
        'Append URL params: ',
        el('code', {}, '?log=http://localhost:3100/v1&graph=...&directory=...'),
        '. The defaults point at the production deployments (',
        el('code', {}, 'log.atrib.dev'), ', ',
        el('code', {}, 'graph.atrib.dev'), ', ',
        el('code', {}, 'directory.atrib.dev'), ').',
      ),
    ),
  ))

  clearAndRender(root)
}

// ─── Router ──────────────────────────────────────────────────────────────
//
// Generation token guards against late-async-fetch render races. Each
// route() invocation increments _routeGeneration; render functions can
// capture the current generation at entry and compare against the live
// counter before any post-fetch DOM write. Mid-fetch hashchange (the user
// navigates from /trace to /session before the trace's parallel fetches
// complete) bumps the generation, so the trace's late .then() callbacks
// no-op via routeGenerationStillCurrent() instead of stomping on the
// session view's DOM. Without this guard, fast navigation between views
// produced flicker + occasional wrong-DOM-target write errors.

let _routeGeneration = 0
function currentRouteGeneration() { return _routeGeneration }
function routeGenerationStillCurrent(captured) { return captured === _routeGeneration }

async function route() {
  _routeGeneration += 1
  const myGen = _routeGeneration
  renderEndpoints()
  if (!isOverviewRoute()) stopPolling()
  // Cross-view soft refresh: turn ON for non-overview views, OFF when on
  // overview (which has its own dedicated polling at a faster interval).
  // The router fires startViewRefresh() once and the interval calls back
  // into route() periodically; the recursive call is safe because each
  // route() bumps the generation counter so any in-flight render bails.
  if (isOverviewRoute()) {
    stopViewRefresh()
  } else {
    startViewRefresh()
  }
  document.getElementById('app').replaceChildren(el('div', { class: 'empty' }, 'loading…'))
  const hash = location.hash.replace(/^#/, '')

  try {
    if (!hash || hash === '/' || hash === '/overview')      return await renderOverview()
    if (hash.startsWith('/identity/'))                       return await renderIdentity(hash.slice('/identity/'.length))
    if (hash.startsWith('/session/'))                        return await renderSession(hash.slice('/session/'.length))
    if (hash.startsWith('/action/'))                         return await renderAction(hash.slice('/action/'.length))
    if (hash.startsWith('/trace/'))                          return await renderTrace(hash.slice('/trace/'.length))
    if (hash === '/anchoring')                               return await renderAnchoring()
    if (hash === '/about')                                   return renderAbout()

    if (!routeGenerationStillCurrent(myGen)) return // stale render
    document.getElementById('app').replaceChildren(el('div', { class: 'panel' },
      el('h2', {}, 'unknown route'),
      el('p', {}, 'Try ', el('a', { href: '#/' }, 'overview'), '.'),
    ))
  } catch (e) {
    if (!routeGenerationStillCurrent(myGen)) return // user navigated; do not paint
    document.getElementById('app').replaceChildren(el('div', { class: 'panel' },
      el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'unhandled error:'), e?.message || String(e),
      ),
      el('p', {}, 'Return to ', el('a', { href: '#/' }, 'overview'), '.'),
    ))
  }
}

window.addEventListener('hashchange', route)
window.addEventListener('DOMContentLoaded', route)
</script>
</body>
