<!-- Canonical: the explorer is hosted at explore.atrib.dev (production); the
     /dashboard path on log.atrib.dev serves the same file as a fallback. -->
<link rel="canonical" href="https://explore.atrib.dev/" />
<style>
  /*
   * atrib explorer, design system
   * D054 option 1, single-file vanilla; no framework, no build.
   */

  :root {
    /* Surface */
    --bg: #0a0b0e;
    --surface: #14161a;
    --surface-2: #1b1d22;
    --surface-hover: #1f2128;
    --border: #262930;
    --border-subtle: #1d2026;

    /* Text */
    --text: #ededef;
    --text-2: #a0a3ab;
    --text-3: #6a6e78;
    --text-4: #44474f;

    /* Brand: amber, evoking wax seal / signed / highlighted */
    --accent: #fcd34d;
    --accent-strong: #fde68a;
    --accent-subtle: rgba(252, 211, 77, 0.12);
    --accent-border: rgba(252, 211, 77, 0.3);

    /* Status */
    --ok: #34d399;
    --ok-subtle: rgba(52, 211, 153, 0.12);
    --ok-border: rgba(52, 211, 153, 0.3);
    --warn: #fbbf24;
    --warn-subtle: rgba(251, 191, 36, 0.12);
    --warn-border: rgba(251, 191, 36, 0.3);
    --err: #f87171;
    --err-subtle: rgba(248, 113, 113, 0.12);
    --err-border: rgba(248, 113, 113, 0.3);
    --info: #60a5fa;
    --info-subtle: rgba(96, 165, 250, 0.12);
    --info-border: rgba(96, 165, 250, 0.3);
    --muted: #9ca3af;
    --muted-subtle: rgba(156, 163, 175, 0.1);

    /* Per event_type chip colors */
    --et-tool-call: var(--info);
    --et-tool-call-subtle: var(--info-subtle);
    --et-tool-call-border: var(--info-border);
    --et-transaction: var(--accent);
    --et-transaction-subtle: var(--accent-subtle);
    --et-transaction-border: var(--accent-border);
    --et-observation: #c084fc;
    --et-observation-subtle: rgba(192, 132, 252, 0.12);
    --et-observation-border: rgba(192, 132, 252, 0.3);
    --et-extension: var(--muted);
    --et-extension-subtle: var(--muted-subtle);
    --et-extension-border: rgba(156, 163, 175, 0.25);
    /* Atrib-system event types (e.g. directory_anchor, byte 0x04 per D056).
       Pink sits well outside both the agent-action triad (blue tool_call,
       amber transaction, purple observation) and the verification-badge
       greens, so infrastructure events read as a clearly distinct category.
       Falls back to this style for any future atrib-namespace URI that ships
       before its own byte allocation lands (renderEventChip safety net). */
    --et-system: #ec4899;
    --et-system-subtle: rgba(236, 72, 153, 0.12);
    --et-system-border: rgba(236, 72, 153, 0.3);
    /* Synthetic dangling nodes (§3.2.4 step 6/7/8): an INFORMED_BY,
       PROVENANCE_OF, or ANNOTATES reference that did not resolve to a
       record in the resolved set. Surfaces the agent's claim without
       pretending the upstream is recoverable here. Muted-warning style
       (warm grey) so the dangling marker reads as "incomplete" without
       competing with the err-red used for verification failures. */
    --et-dangling: #92400e;
    --et-dangling-subtle: rgba(146, 64, 14, 0.12);
    --et-dangling-border: rgba(146, 64, 14, 0.3);
    /* Annotation event_type (D058, byte 0x05): the recall-fidelity
       primitive. Annotations are commentary records pointing at any
       prior record via the `annotates` field. Distinct color from
       observation (purple) since their cognitive role is different,
       annotations are forward-pointing claims about earlier records,
       observations are first-class signed events. Teal sits between
       observation's purple and tool_call's blue, signalling "related
       to but distinct from both." */
    --et-annotation: #14b8a6;
    --et-annotation-subtle: rgba(20, 184, 166, 0.12);
    --et-annotation-border: rgba(20, 184, 166, 0.3);
    /* Revision event_type (D059, byte 0x06): the contradiction-handling
       primitive. A revision asserts the agent now holds a position
       incompatible with the referenced predecessor (which stays immutable
       on the log). Distinct color from annotation (teal) because the
       semantics are different: annotation comments, revision supersedes.
       Indigo signals "structural change of stance" and reads as deeper /
       weightier than annotation's commentary tone. */
    --et-revision: #6366f1;
    --et-revision-subtle: rgba(99, 102, 241, 0.12);
    --et-revision-border: rgba(99, 102, 241, 0.3);

    /* Edge-type colors (graph viz), organized in two semantic tiers.
       Tier 1 (vibrant): the load-bearing edges that carry meaning beyond
       structure. Each either gets a dedicated color (informed_by) or
       intentionally aliases a node color (annotates → annotation node,
       revises → revision node, converges_on → transaction node) so the
       visual cluster reads as a single semantic thread.
       Tier 2 (muted greys, graded): structural-derivation edges with no
       semantic content of their own. CHAIN_PRECEDES is "primary structural"
       (every non-genesis record has one), the SESSION_* and CROSS_SESSION
       edges are weaker derivations. The grey gradient marks this hierarchy
       (text-2 > text-3 > text-4 > muted). */
    /* Tier 1, load-bearing semantic */
    --edge-ancestry:         #fb923c;                  /* informed_by + provenance_of (warm orange, no node analogue) */
    --edge-annotates:        var(--et-annotation);     /* tracks annotation node */
    --edge-revises:          var(--et-revision);       /* tracks revision node */
    --edge-converges:        var(--accent);            /* tracks transaction node */
    /* Tier 2, structural derivations, graded by strength */
    --edge-chain:            var(--text-2);            /* chain_precedes, primary structural backbone */
    --edge-session-precedes: var(--text-3);            /* session_precedes, fallback sequencing */
    --edge-session-parallel: var(--text-4);            /* session_parallel, equal-time peers */
    --edge-cross-session:    var(--muted);             /* cross_session, across-session derived */

    /* Type */
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, Roboto, sans-serif;
    --font-mono: ui-monospace, "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;

    /* Layout */
    --container: 1180px;
    --radius: 8px;
    --radius-sm: 5px;
  }

  * { box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.55 var(--font-sans);
    font-feature-settings: 'cv11', 'ss01', 'ss03';
  }

  ::selection { background: var(--accent); color: var(--bg); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--surface-hover); }

  a { color: var(--accent); text-decoration: none; transition: color 120ms ease; }
  a:hover { color: var(--accent-strong); text-decoration: underline; text-underline-offset: 2px; }
  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

  code {
    font: 12.5px/1.4 var(--font-mono);
    color: var(--text);
    background: var(--surface-2);
    padding: 1px 6px;
    border-radius: 3px;
    word-break: break-all;
  }
  pre {
    font: 12.5px/1.55 var(--font-mono);
    background: var(--surface-2);
    border: 1px solid var(--border-subtle);
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    max-height: 420px;
    color: var(--text-2);
  }

  /* ─── Page header (top nav) ──────────────────────────────────────────── */
  /* Scoped to body > header so it doesn't bleed into per-view <header class="view-header">. */

  body > header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px max(20px, calc((100vw - var(--container)) / 2 + 20px));
    border-bottom: 1px solid var(--border);
    background: rgba(10, 11, 14, 0.85);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    position: sticky; top: 0; z-index: 50;
  }
  body > header .brand { display: flex; align-items: center; gap: 10px; }
  body > header .brand a {
    color: var(--text); font: 600 16px/1 var(--font-sans);
    letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px;
  }
  body > header .brand a:hover { text-decoration: none; color: var(--accent-strong); }
  body > header .brand .seal {
    display: inline-block; width: 18px; height: 18px;
    background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(252, 211, 77, 0.2), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
  }
  body > header .brand .sub {
    color: var(--text-3); font: 12px/1 var(--font-mono);
    padding-left: 10px; border-left: 1px solid var(--border);
    margin-left: 2px;
  }
  body > header nav { display: flex; gap: 4px; align-items: center; }
  body > header nav a {
    color: var(--text-2); font: 500 13px/1 var(--font-sans);
    padding: 8px 12px; border-radius: var(--radius-sm);
    transition: background 120ms ease, color 120ms ease;
  }
  body > header nav a:hover { background: var(--surface-2); color: var(--text); text-decoration: none; }
  body > header nav a.active { color: var(--accent); background: var(--accent-subtle); }

  /* ─── Layout ──────────────────────────────────────────────────────────── */

  main {
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  .stack { display: flex; flex-direction: column; gap: 32px; }
  .stack-sm { display: flex; flex-direction: column; gap: 12px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 24px;
  }
  .panel.flush { padding: 0; overflow: hidden; }
  .panel .panel-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .panel .panel-head h2 {
    margin: 0; font: 600 13px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-2);
  }
  .panel .panel-head .meta { font: 12px/1 var(--font-mono); color: var(--text-3); }
  .panel .panel-body { padding: 20px; }

  /* ─── Hero ───────────────────────────────────────────────────────────── */

  .hero {
    padding: 64px 0 48px;
    text-align: left;
    max-width: 880px;
  }
  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--accent-subtle);
    border: 1px solid var(--accent-border);
    padding: 6px 10px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
  .hero .eyebrow .pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 var(--ok);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
    70%  { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
    100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
  }
  .hero h1 {
    font: 600 44px/1.08 var(--font-sans);
    letter-spacing: -0.025em;
    color: var(--text);
    margin: 0 0 18px;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero .lede {
    font: 17px/1.55 var(--font-sans);
    color: var(--text-2);
    margin: 0 0 28px;
    max-width: 700px;
  }
  .hero .quick-links {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
  }
  .hero .quick-links a {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 7px 12px;
    font: 500 13px/1 var(--font-sans);
    border-radius: var(--radius-sm);
    transition: all 120ms ease;
  }
  .hero .quick-links a:hover {
    background: var(--surface-hover); color: var(--text);
    border-color: var(--text-3);
    text-decoration: none;
  }
  .hero .quick-links a .arrow { color: var(--text-3); transition: color 120ms ease; }
  .hero .quick-links a:hover .arrow { color: var(--accent); }

  /* ─── System pulse strip (demoted stats) ─────────────────────────────── */

  .pulse-strip {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .pulse-strip .stat {
    background: var(--surface);
    padding: 18px 22px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .pulse-strip .stat .label {
    font: 500 11px/1 var(--font-sans);
    color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .pulse-strip .stat .value {
    font: 600 22px/1.1 var(--font-sans);
    letter-spacing: -0.015em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .pulse-strip .stat .sub {
    font: 12px/1.3 var(--font-sans);
    color: var(--text-3);
  }

  @media (max-width: 720px) {
    .pulse-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .hero h1 { font-size: 32px; }
  }

  /* ─── Search ─────────────────────────────────────────────────────────── */

  .search-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    display: flex; gap: 4px;
    transition: border-color 120ms ease;
  }
  .search-wrap:focus-within { border-color: var(--accent); }
  .search-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 12px 14px;
    font: 14px/1 var(--font-mono);
    min-width: 0;
  }
  .search-wrap input:focus { outline: none; }
  .search-wrap input::placeholder { color: var(--text-4); }
  .search-wrap button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: 600 13px/1 var(--font-sans);
    letter-spacing: 0.01em;
    transition: all 120ms ease;
  }
  .search-wrap button:hover { background: var(--accent-strong); }
  .search-help {
    font: 12px/1.5 var(--font-sans);
    color: var(--text-3);
    margin: 8px 2px 0;
  }
  .search-help code {
    background: transparent;
    color: var(--text-2);
    padding: 0;
    font-size: 12px;
  }

  /* ─── Activity feed ──────────────────────────────────────────────────── */

  .load-more {
    background: var(--surface-2);
    color: var(--text-2);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font: 500 12px/1 var(--font-sans);
    letter-spacing: 0.02em;
    transition: all 120ms ease;
  }
  .load-more:hover { background: var(--surface-hover); color: var(--text); border-color: var(--accent); }

  .feed-wrap { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--radius); overflow: hidden; }
  /* Activity table mobile fix: on narrow viewports the table's columns
   * (creator_key, content_id, hash, action) overflow the wrapper. The base
   * wrapper rule above sets overflow:hidden (needed to clip rounded corners
   * for animations etc.); on mobile, switch to overflow-x:auto and pin a
   * min-width on the table so columns stay readable while horizontal scroll
   * is enabled. Defined AFTER the base rule so the cascade resolves correctly
   * (CSS specificity is identical; later rule wins). */
  @media (max-width: 720px) {
    .feed-wrap { overflow-x: auto; overflow-y: hidden; }
    table.feed { min-width: 540px; }
  }
  .feed-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .feed-head h2 {
    margin: 0; font: 600 13px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
  }
  .feed-head .live-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--ok);
    padding: 4px 8px; border-radius: 999px;
    background: var(--ok-subtle); border: 1px solid var(--ok-border);
  }
  .feed-head .live-tag .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok);
    animation: pulse 2s infinite;
  }
  .feed-head .meta { font: 12px/1 var(--font-mono); color: var(--text-3); }

  table.feed { width: 100%; border-collapse: collapse; font: 13.5px/1.4 var(--font-sans); }
  table.feed thead th {
    text-align: left;
    color: var(--text-3);
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 10px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-subtle);
  }
  table.feed tbody tr {
    border-bottom: 1px solid var(--border-subtle);
    transition: background 120ms ease;
  }
  table.feed tbody tr:last-child { border-bottom: none; }
  table.feed tbody tr:hover { background: var(--surface-hover); }
  table.feed tbody td { padding: 12px 16px; vertical-align: middle; }
  table.feed tbody td.shrink { white-space: nowrap; width: 1%; }
  table.feed tbody td .mono {
    font: 12.5px/1 var(--font-mono); color: var(--text-2);
  }
  /* New-row highlight: a sustained amber wash (not a flicker). The cell-level
   * animation matches the row-level so striped table backgrounds don't
   * override on tr. Holds full color for ~3.5s, fades over ~3s. Total
   * ~6.5s, long enough to actually catch the eye scanning the table. */
  table.feed tbody tr.new,
  table.feed tbody tr.new td {
    animation: rowEnter 6500ms ease-out;
  }
  @keyframes rowEnter {
    0%   { background-color: rgba(252, 211, 77, 0.18); }
    50%  { background-color: rgba(252, 211, 77, 0.18); }
    100% { background-color: transparent; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hero .eyebrow .pulse, .feed-head .live-tag .dot { animation: none; }
    table.feed tbody tr.new,
    table.feed tbody tr.new td { animation: none; }
  }

  /* ─── Chips & badges ─────────────────────────────────────────────────── */

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font: 500 11px/1 var(--font-sans);
    padding: 4px 8px;
    border-radius: 4px;
    text-transform: lowercase;
    letter-spacing: 0;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .chip.event-tool_call    { background: var(--et-tool-call-subtle);    color: var(--et-tool-call);    border-color: var(--et-tool-call-border); }
  .chip.event-transaction  { background: var(--et-transaction-subtle);  color: var(--et-transaction);  border-color: var(--et-transaction-border); }
  .chip.event-observation  { background: var(--et-observation-subtle);  color: var(--et-observation);  border-color: var(--et-observation-border); }
  .chip.event-extension        { background: var(--et-extension-subtle); color: var(--et-extension); border-color: var(--et-extension-border); }
  .chip.event-directory_anchor { background: var(--et-system-subtle);    color: var(--et-system);    border-color: var(--et-system-border); }
  .chip.event-annotation       { background: var(--et-annotation-subtle); color: var(--et-annotation); border-color: var(--et-annotation-border); }
  .chip.event-revision         { background: var(--et-revision-subtle);   color: var(--et-revision);   border-color: var(--et-revision-border); }
  .chip.event-system           { background: var(--et-system-subtle);    color: var(--et-system);    border-color: var(--et-system-border); }
  .chip.event-dangling_node    { background: var(--et-dangling-subtle);  color: var(--et-dangling);  border-color: var(--et-dangling-border); }
  .chip.event-reserved         { background: var(--err-subtle);          color: var(--err);          border-color: var(--err-border); }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font: 500 10.5px/1 var(--font-sans);
    padding: 3px 7px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.05em;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .badge.ok    { background: var(--ok-subtle);    color: var(--ok);    border-color: var(--ok-border); }
  .badge.warn  { background: var(--warn-subtle);  color: var(--warn);  border-color: var(--warn-border); }
  .badge.err   { background: var(--err-subtle);   color: var(--err);   border-color: var(--err-border); }
  .badge.info  { background: var(--info-subtle);  color: var(--info);  border-color: var(--info-border); }
  .badge.dim   { background: var(--muted-subtle); color: var(--muted); border-color: rgba(156, 163, 175, 0.2); }

  .verify-badges { display: inline-flex; gap: 4px; flex-wrap: wrap; }

  /* ─── Identity label ─────────────────────────────────────────────────── */

  .id-label { display: inline-flex; align-items: center; gap: 8px; }
  .id-label .name { color: var(--text); font-weight: 500; }
  .id-label .key { color: var(--text-3); font: 11.5px/1 var(--font-mono); }

  /* ─── Footer ─────────────────────────────────────────────────────────── */

  footer {
    border-top: 1px solid var(--border-subtle);
    margin-top: 80px;
    padding: 32px max(20px, calc((100vw - var(--container)) / 2 + 20px));
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
    color: var(--text-3); font-size: 13px;
  }
  footer h3 {
    margin: 0 0 12px; font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2);
  }
  footer .endpoints code {
    background: transparent; padding: 0;
    color: var(--text-2);
    font-size: 12px;
  }
  footer .endpoints div { padding: 4px 0; }
  footer .links { display: flex; flex-direction: column; gap: 6px; }
  footer .links a { color: var(--text-2); }
  footer .links a:hover { color: var(--accent); }

  @media (max-width: 720px) { footer { grid-template-columns: 1fr; } }

  /* ─── Loading + error states ─────────────────────────────────────────── */

  .empty {
    color: var(--text-3); font-style: normal;
    padding: 32px 20px; text-align: center;
    font-size: 14px;
  }
  .empty .icon { font-size: 24px; opacity: 0.4; display: block; margin-bottom: 8px; }

  .err-banner {
    background: var(--err-subtle); border: 1px solid var(--err-border);
    color: var(--err); padding: 12px 16px;
    border-radius: var(--radius-sm); margin-bottom: 16px;
    font: 13px/1.5 var(--font-sans);
  }
  .err-banner .label { font-weight: 600; margin-right: 6px; }

  /* ─── View headers (per-view onboarding) ─────────────────────────────── */

  .view-header { margin: 32px 0 24px; }
  .view-header .crumb {
    display: inline-flex; gap: 6px; align-items: center;
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-3); margin-bottom: 12px;
  }
  .view-header h1 {
    margin: 0 0 8px;
    font: 600 28px/1.15 var(--font-sans);
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .view-header .subject {
    font: 13.5px/1.4 var(--font-mono);
    color: var(--text-2);
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    display: inline-block;
    margin-bottom: 16px;
    word-break: break-all;
  }
  .view-header .explainer {
    color: var(--text-2);
    font: 14px/1.6 var(--font-sans);
    max-width: 720px;
    margin: 8px 0 0;
  }
  .view-header .explainer .term {
    color: var(--accent); font-weight: 500;
  }

  /* ─── Key-value grids (per-view detail panels) ───────────────────────── */

  dl.kv {
    display: grid; grid-template-columns: 180px 1fr;
    gap: 0; margin: 0;
  }
  dl.kv dt, dl.kv dd {
    padding: 12px 0;
    border-bottom: 1px solid var(--border-subtle);
    margin: 0;
  }
  dl.kv dt {
    color: var(--text-3);
    font: 12px/1.4 var(--font-sans);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding-right: 16px;
  }
  dl.kv dd { color: var(--text); font: 13.5px/1.4 var(--font-sans); }
  dl.kv dt:last-of-type, dl.kv dd:last-of-type { border-bottom: none; }
  dl.kv dd .mono { font: 13px/1.4 var(--font-mono); color: var(--text-2); word-break: break-all; }

  /* ─── About view styling ─────────────────────────────────────────────── */

  .prose { max-width: 720px; color: var(--text-2); font-size: 15px; line-height: 1.7; }
  .prose h2 { color: var(--text); margin: 32px 0 12px; font: 600 18px/1.2 var(--font-sans); letter-spacing: -0.01em; }
  .prose h3 { color: var(--text); margin: 24px 0 8px; font: 600 14px/1.3 var(--font-sans); }
  .prose p { margin: 0 0 16px; }
  .prose ul { padding-left: 18px; margin: 0 0 16px; }
  .prose li { margin: 6px 0; }

  /* ─── Trace view (provenance ancestry) ──────────────────────────────── */

  .trace-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--surface-2);
    font: 13px/1.4 var(--font-sans);
  }
  .trace-controls label {
    color: var(--text-3);
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .trace-controls input[type=range] {
    accent-color: var(--accent);
    vertical-align: middle;
  }
  .trace-controls .depth-readout {
    font: 11px var(--font-mono);
    color: var(--text-3);
    min-width: 56px;
  }
  .trace-controls .start-link a {
    color: var(--text-2);
    text-decoration: none;
    border-bottom: 1px dotted var(--text-3);
  }
  .trace-controls .start-link a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  .trace-controls .actions { margin-left: auto; display: inline-flex; gap: 12px; }
  .trace-controls .actions a {
    color: var(--text-2);
    text-decoration: none;
    border-bottom: 1px dotted var(--text-3);
  }
  .trace-controls .actions a:hover { color: var(--accent); border-color: var(--accent); }

  .trace-graph {
    position: relative;
    width: 100%;
    height: 600px;
    background: var(--surface);
  }
  .trace-graph .empty,
  .trace-graph .loading,
  .trace-graph .err-banner {
    position: absolute;
    inset: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    font: 14px/1.5 var(--font-sans);
    text-align: center;
  }
  .trace-graph canvas { display: block; }

  .trace-truncation {
    margin: 16px 0 0;
    padding: 10px 14px;
    border: 1px solid var(--warn-border);
    background: var(--warn-subtle);
    color: var(--warn);
    border-radius: var(--radius-sm);
    font: 13px/1.5 var(--font-sans);
  }
  .trace-truncation strong { color: var(--warn); font-weight: 600; }

  .graph-legend {
    padding: 14px 20px;
    border-top: 1px solid var(--border-subtle);
    background: var(--surface-2);
    font: 11.5px/1 var(--font-mono);
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 8px 14px;
    align-items: center;
  }
  .graph-legend .legend-label {
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .graph-legend .legend-row {
    display: grid;
    grid-auto-columns: max-content;
    grid-auto-flow: column;
    gap: 10px 16px;
    align-items: center;
  }
  /* Tail container for unpaired entries. Each row has its own .legend-tail
     occupying the SAME grid column, but the children inside flex independently
    , so unpaired NODES (tool_call, observation) and unpaired EDGES (INFORMED_BY,
     CHAIN_PRECEDES) don't inherit each other's widths. The shared column
     auto-sizes to the wider tail; each tail's internal spacing is uniform. */
  .graph-legend .legend-tail {
    display: flex;
    gap: 10px 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .graph-legend .swatch {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-3);
  }
  /* Node legend: filled disc preceding the label */
  .graph-legend .swatch.node::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: currentColor;
  }
  /* Edge legend: 2px line preceding the label */
  .graph-legend .swatch.edge::before {
    content: '';
    display: inline-block;
    width: 18px;
    height: 2px;
    background: currentColor;
  }
  .graph-legend .swatch.empty {
    color: var(--text-3);
    font-style: italic;
  }
  /* Node-color tokens (read by JS via _cssVar; mirrored here so the legend
     can reference them without parsing each event_type's chip class). */
  .graph-legend .swatch.node.tool_call         { color: var(--info); }
  .graph-legend .swatch.node.transaction       { color: var(--accent); }
  .graph-legend .swatch.node.observation       { color: var(--et-observation); }
  .graph-legend .swatch.node.annotation        { color: var(--et-annotation); }
  .graph-legend .swatch.node.revision          { color: var(--et-revision); }
  .graph-legend .swatch.node.directory_anchor  { color: var(--et-system); }
  .graph-legend .swatch.node.extension         { color: var(--muted); }
  .graph-legend .swatch.node.gap_node          { color: var(--et-dangling); }
  .graph-legend .swatch.edge.informed_by      { color: var(--edge-ancestry); }
  .graph-legend .swatch.edge.provenance_of    { color: var(--edge-ancestry); }
  .graph-legend .swatch.edge.annotates        { color: var(--edge-annotates); }
  .graph-legend .swatch.edge.revises          { color: var(--edge-revises); }
  .graph-legend .swatch.edge.chain_precedes   { color: var(--edge-chain); }
  .graph-legend .swatch.edge.converges_on     { color: var(--edge-converges); }
  .graph-legend .swatch.edge.session_precedes { color: var(--edge-session-precedes); }
  .graph-legend .swatch.edge.session_parallel { color: var(--edge-session-parallel); }
  .graph-legend .swatch.edge.cross_session    { color: var(--edge-cross-session); }
</style>

<body>

<header>
  <div class="brand">
    <a href="#/">
      <span class="seal" aria-hidden="true"></span>
      <span>atrib</span>
    </a>
    <span class="sub" id="brand-sub">explorer</span>
  </div>
  <nav id="nav">
    <a href="#/" data-route="overview">overview</a>
    <a href="#/anchoring" data-route="anchoring">anchoring</a>
    <a href="#/about" data-route="about">about</a>
  </nav>
</header>

<main id="app"></main>

<footer>
  <div>
    <h3>Endpoints</h3>
    <div class="endpoints" id="endpoints"></div>
  </div>
  <div>
    <h3>Links</h3>
    <div class="links">
      <a href="https://github.com/creatornader/atrib" target="_blank" rel="noopener">github.com/creatornader/atrib</a>
      <a href="https://github.com/creatornader/atrib/blob/main/atrib-spec.md" target="_blank" rel="noopener">atrib-spec.md</a>
      <a href="https://github.com/creatornader/atrib/blob/main/DECISIONS.md#d054-unified-public-explorer-vs-per-service-admin-uis" target="_blank" rel="noopener">D054 (this explorer)</a>
      <a href="#/about">what is this?</a>
    </div>
  </div>
</footer>

<script type="module">
/*
 * atrib explorer, D054 option 1.
 * Single-file vanilla JS. Read-only public surface composing log + graph + directory.
 * Routes (URL hash):
 *   #/                              overview (live activity feed + system pulse + search)
 *   #/identity/<creator_key>        identity view
 *   #/session/<context_id>          session view
 *   #/action/<record_hash>          action view
 *   #/trace/<record_hash>           provenance trace view (ancestor DAG)
 *   #/anchoring                     log + directory anchoring details
 *   #/about                         what atrib is, how to read this
 */

const DEFAULTS = {
  log:       'https://log.atrib.dev/v1',
  graph:     'https://graph.atrib.dev/v1',
  directory: 'https://directory.atrib.dev/v6',
}

const POLL_INTERVAL_MS = 5000
const RECENT_LIMIT = 25

function endpoints() {
  const q = new URLSearchParams(location.search)
  return {
    log:       q.get('log')       || DEFAULTS.log,
    graph:     q.get('graph')     || DEFAULTS.graph,
    directory: q.get('directory') || DEFAULTS.directory,
  }
}

// ─── DOM helpers ─────────────────────────────────────────────────────────

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag)
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue
    if (k === 'class') e.className = v
    else if (k === 'style') e.style.cssText = v
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v)
    else e.setAttribute(k, v)
  }
  for (const c of children) {
    if (c == null || c === false) continue
    if (Array.isArray(c)) for (const i of c) { if (i != null && i !== false) e.append(i instanceof Node ? i : document.createTextNode(String(i))) }
    else e.append(c instanceof Node ? c : document.createTextNode(String(c)))
  }
  return e
}

function clearAndRender(node) {
  document.getElementById('app').replaceChildren(node)
}

// ─── Formatting helpers ──────────────────────────────────────────────────

function shorten(s, head = 6, tail = 4) {
  if (!s) return ''
  if (s.startsWith('sha256:')) return 'sha256:' + shorten(s.slice(7), head, tail)
  if (s.length < head + tail + 2) return s
  return `${s.slice(0, head)}…${s.slice(-tail)}`
}

function timeAgo(ms) {
  if (!ms || typeof ms !== 'number') return '—'
  const diff = Date.now() - ms
  if (diff < 0) return 'just now'
  const sec = Math.floor(diff / 1000)
  if (sec < 5) return 'just now'
  if (sec < 60) return `${sec}s ago`
  const min = Math.floor(sec / 60)
  if (min < 60) return `${min}m ago`
  const hr = Math.floor(min / 60)
  if (hr < 24) return `${hr}h ago`
  const day = Math.floor(hr / 24)
  if (day < 7) return `${day}d ago`
  return new Date(ms).toISOString().slice(0, 10)
}

function isoTime(ms) {
  if (!ms || typeof ms !== 'number') return ''
  return new Date(ms).toISOString()
}

// ─── Network helpers ─────────────────────────────────────────────────────

async function fetchJson(url, opts = {}) {
  const r = await fetch(url, { headers: { accept: 'application/json' }, ...opts })
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`)
  return r.json()
}

async function fetchMaybe(url, opts = {}) {
  try { return await fetchJson(url, opts) }
  catch (e) { return { _error: e.message } }
}

async function fetchTextMaybe(url) {
  try {
    const r = await fetch(url)
    if (!r.ok) return { _error: `${r.status} ${r.statusText}` }
    return { text: await r.text() }
  } catch (e) { return { _error: e.message } }
}

// ─── Identity-label cache ────────────────────────────────────────────────
// Many feed rows share a small set of creator_keys. Cache directory lookups
// across the page lifetime; "no claim" is a valid cached state too.

const identityCache = new Map() // key → { found, claim, version, epoch } or { _error }

async function resolveIdentity(creatorKey) {
  if (identityCache.has(creatorKey)) return identityCache.get(creatorKey)
  const ep = endpoints()
  // Custom fetch: treat 404 (no claim published) as a successful "no claim"
  // result rather than an error, per §6.1 absence of claim is normal.
  let result
  try {
    const r = await fetch(`${ep.directory}/lookup/${creatorKey}`, {
      headers: { accept: 'application/json' },
    })
    if (r.status === 404) {
      result = { found: false }
    } else if (!r.ok) {
      result = { _error: `${r.status} ${r.statusText}` }
    } else {
      result = await r.json()
    }
  } catch (e) {
    result = { _error: e.message }
  }
  identityCache.set(creatorKey, result)
  return result
}

async function resolveIdentities(creatorKeys) {
  const unique = [...new Set(creatorKeys)]
  await Promise.all(unique.map((k) => resolveIdentity(k)))
}

function renderIdentityLabel(creatorKey, opts = {}) {
  const lookup = identityCache.get(creatorKey)
  const { withLink = true, short = true } = opts
  let inner
  if (lookup && lookup.found && lookup.claim?.claim_subject) {
    const subject = lookup.claim.claim_subject
    // §6.1 IdentityClaim uses display_name. organization is a SECONDARY
    // attribute, not a primary label, without this fallback ordering,
    // an "individual under an org" claim shows the org as the identity.
    const name = subject.display_name || subject.name || subject.organization || subject.email || subject.url || subject.handle || null
    if (name) {
      inner = el('span', { class: 'id-label' },
        el('span', { class: 'name' }, name),
        short ? el('span', { class: 'key' }, shorten(creatorKey)) : null,
      )
    } else {
      inner = el('span', { class: 'id-label' },
        el('span', { class: 'mono', style: 'font-family: var(--font-mono); color: var(--text-2);' }, short ? shorten(creatorKey) : creatorKey),
      )
    }
  } else {
    inner = el('span', { class: 'id-label' },
      el('span', { class: 'mono', style: 'font-family: var(--font-mono); color: var(--text-2);' }, short ? shorten(creatorKey) : creatorKey),
      lookup && lookup.found === false ? el('span', { class: 'badge dim' }, 'unclaimed') : null,
    )
  }
  return withLink
    ? el('a', { href: `#/identity/${creatorKey}`, style: 'text-decoration: none;' }, inner)
    : inner
}

// ─── Event-type chip ─────────────────────────────────────────────────────
// The 90-byte log entry (§2.3.1) only carries one byte for event_type, so any
// URI without a dedicated normative byte slot arrives here as 'extension'.
// As of D059 (2026-05-04), normative bytes are 0x01 tool_call, 0x02
// transaction, 0x03 observation, 0x04 directory_anchor (D056), 0x05
// annotation (D058), 0x06 revision (D059); the spec reserves 0x07-0xFE
// for future atrib normative additions per D036, and 0xFF for non-atrib-namespace extension
// URIs. Pre-D056 directory_anchor records (encoded 0xFF before the byte
// allocation landed) still arrive here as 'extension'; when one is signed
// by an atrib-system identity (claim URL in the atrib.dev namespace), the
// renderEventChip helper below relabels it rather than implying it's an
// external/non-normative type. Pre-D058 annotation records (emitted under
// downstream-consumer extension URIs before the byte allocation landed)
// remain valid signed records but carry the extension byte; they will be
// queryable via URI filter, not byte filter, until they age out.
function atribSystemSignerKind(creatorKey) {
  const lookup = identityCache.get(creatorKey)
  if (!lookup || !lookup.found) return null
  const subject = lookup.claim?.claim_subject
  if (!subject) return null

  // Canonical signal: explicit url host. Future self-claims should populate
  // this; checking it first lets the URL-based path supersede string sniffing.
  const url = subject.url
  if (typeof url === 'string') {
    let host
    try { host = new URL(url).host } catch { host = null }
    if (host === 'directory.atrib.dev') return 'directory_anchor'
    if (host === 'atrib.dev' || (host && host.endsWith('.atrib.dev'))) return 'system'
  }

  // Fallback: scan display_name + organization for atrib-namespace hostnames.
  // Existing self-claims (directory-node pre-D056-follow-up, log-node) encode
  // the system-identity intent in the friendly name rather than the url field.
  // Sniff for atrib.dev hostnames so the chip recognizes the signer until those
  // claims get re-published with proper url fields.
  const hay = `${subject.display_name ?? ''} ${subject.organization ?? ''}`.toLowerCase()
  if (hay.includes('directory.atrib.dev')) return 'directory_anchor'
  if (hay.includes('atrib.dev')) return 'system'

  return null
}

function renderEventChip(eventType, creatorKey, eventTypeUri = null) {
  if (eventType === 'extension') {
    // Prefer the URI when graph-node served it: shows the actual leaf
    // segment (e.g. "directory_anchor") rather than collapsing every
    // non-byte-slotted type to one label.
    if (typeof eventTypeUri === 'string' && eventTypeUri.startsWith('https://atrib.dev/v1/types/')) {
      const leaf = eventTypeUri.slice('https://atrib.dev/v1/types/'.length)
      return el('span', {
        class: `chip event-${leaf}`,
        title: `${eventTypeUri} (atrib normative type; pre-D056 records encoded as 0xFF)`,
      }, leaf)
    }
    // /v1/recent only carries the byte. Use the signer's directory claim
    // to recover the specific atrib-system type, falling back to a generic
    // "atrib system" label for unknown atrib-namespace signers.
    if (creatorKey) {
      const kind = atribSystemSignerKind(creatorKey)
      if (kind === 'directory_anchor') {
        return el('span', {
          class: 'chip event-directory_anchor',
          title: 'directory_anchor record (§6.2.4). Pre-D056 record encoded with byte 0xFF; post-D056 records use byte 0x04.',
        }, 'directory_anchor')
      }
      if (kind === 'system') {
        return el('span', {
          class: 'chip event-system',
          title: 'atrib-namespace event_type without a dedicated byte slot in the log entry (§2.3.1 reserves 0x05-0xFE for future atrib normative additions). Open the record for the full URI.',
        }, 'atrib system')
      }
    }
  }
  return el('span', { class: `chip event-${eventType || 'extension'}` }, eventType || 'extension')
}

// ─── Verification badges ─────────────────────────────────────────────────
// For each entry surfaced in the feed:
//   sig:      always OK (log only accepts sig-validated submissions)
//   identity: OK if directory has a claim, dim if not
//   log:      always OK (the row IS in the log by definition)

function renderVerifyBadges(creatorKey) {
  const lookup = identityCache.get(creatorKey)
  const idOk = lookup && lookup.found === true
  return el('span', { class: 'verify-badges' },
    el('span', { class: 'badge ok', title: 'Ed25519 signature checked at log submission (§1.4 + §2.6.1)' }, '✓ sig'),
    idOk
      ? el('span', { class: 'badge ok', title: 'Creator key has a directory claim binding it to a name (§6.1)' }, '✓ id')
      : el('span', { class: 'badge dim', title: 'No directory claim for this creator key. Optional per §6.1; the signature is still valid.' }, '○ id'),
    el('span', { class: 'badge ok', title: 'Entry is in the public Merkle log (§2.3)' }, '✓ log'),
  )
}

// ─── Endpoints renderer ──────────────────────────────────────────────────

function renderEndpoints() {
  const ep = endpoints()
  document.getElementById('endpoints').replaceChildren(
    el('div', {}, 'log: ',       el('code', {}, ep.log)),
    el('div', {}, 'graph: ',     el('code', {}, ep.graph)),
    el('div', {}, 'directory: ', el('code', {}, ep.directory)),
  )
}

function setActiveNav(routeName) {
  for (const a of document.querySelectorAll('header nav a')) {
    a.classList.toggle('active', a.dataset.route === routeName)
  }
  const sub = document.getElementById('brand-sub')
  if (sub) sub.textContent = routeName === 'overview' ? 'explorer' : (routeName || 'explorer')
}

// ─── Search routing ──────────────────────────────────────────────────────

function doSearch() {
  const q = document.getElementById('search').value.trim()
  if (!q) return
  if (/^[A-Za-z0-9_-]{43}$/.test(q))                location.hash = `#/identity/${q}`
  else if (/^[0-9a-f]{32}$/.test(q))                location.hash = `#/session/${q}`
  else if (/^sha256:[0-9a-f]{64}$/.test(q))         location.hash = `#/action/${q}`
  else if (/^[0-9a-f]{64}$/.test(q))                location.hash = `#/action/sha256:${q}`
  else alert('Not a recognized format.\n\nExpected one of:\n• creator_key (43 chars base64url)\n• context_id (32 hex chars)\n• record_hash (64 hex chars, optionally sha256: prefixed)')
}

function pulseStat(label, value, sub = null) {
  return el('div', { class: 'stat' },
    el('span', { class: 'label' }, label),
    el('span', { class: 'value' }, value),
    sub ? el('span', { class: 'sub' }, sub) : null,

function updatePulseStrip(stats, checkpoint) {
  const strip = document.getElementById('pulse-strip')
  if (!strip) return
  if (stats._error) {
    strip.replaceChildren(el('div', { class: 'stat', style: 'grid-column: 1 / -1;' },
      el('span', { class: 'label' }, 'system'),
      el('span', { class: 'value', style: 'color: var(--err);' }, 'log unreachable'),
      el('span', { class: 'sub' }, stats._error),
    ))
    return
  }
  let cpSize = null, cpAge = '—'
  if (!checkpoint._error && checkpoint.text) {
    const sizeLine = checkpoint.text.split('\n')[1]
    if (sizeLine && /^\d+$/.test(sizeLine.trim())) cpSize = parseInt(sizeLine.trim(), 10)
    cpAge = stats.newest_timestamp_ms ? timeAgo(stats.newest_timestamp_ms) : '—'
  }
  strip.replaceChildren(
    pulseStat('signed actions', String(stats.tree_size ?? '—'), 'committed to the log'),
    pulseStat('signing identities', String(stats.distinct_signers ?? '—'), 'distinct creator_keys'),
    pulseStat('latest action', stats.newest_timestamp_ms ? timeAgo(stats.newest_timestamp_ms) : '—',
      stats.newest_timestamp_ms ? isoTime(stats.newest_timestamp_ms) : null),
    pulseStat('latest checkpoint', cpAge,
      cpSize !== null ? `tree size ${cpSize}` : null),
  )
}

// Module-level state so renderFeed + load-more can compose without re-fetching.
let feedEntries = []
let feedTreeSize = 0

function renderFeed(entries, withAnimation, treeSize = null) {
  const body = document.getElementById('feed-body')
  if (!body) return
  feedEntries = entries
  if (treeSize !== null) feedTreeSize = treeSize
  const meta = document.getElementById('feed-meta')
  if (meta) {
    const totalSuffix = feedTreeSize > 0 ? ` of ${feedTreeSize.toLocaleString()}` : ''
    meta.textContent = `showing ${entries.length}${totalSuffix} signed actions, newest first`
  }

  const tbl = el('table', { class: 'feed' },
    el('thead', {}, el('tr', {},
      el('th', {}, 'event'),
      el('th', {}, 'action'),
      el('th', {}, 'identity'),
      el('th', {}, 'session'),
      el('th', { class: 'shrink' }, 'when'),
      el('th', {}, 'verification'),
    )),
    el('tbody', {},
      ...entries.map((e, idx) => {
        const isNew = withAnimation && lastFeedTopHash !== null && idx === 0 && e.record_hash !== lastFeedTopHash
        return el('tr', { class: isNew ? 'new' : '' },
          el('td', {}, renderEventChip(e.event_type, e.creator_key)),
          el('td', {}, el('a', { href: `#/action/${e.record_hash}` },
            el('span', { class: 'mono' }, shorten(e.record_hash, 13, 4)),
          )),
          el('td', {}, renderIdentityLabel(e.creator_key)),
          el('td', {}, el('a', { href: `#/session/${e.context_id}` },
            el('span', { class: 'mono' }, shorten(e.context_id, 8, 4)),
          )),
          el('td', { class: 'shrink', title: isoTime(e.timestamp_ms), 'data-ts': String(e.timestamp_ms) }, timeAgo(e.timestamp_ms)),
          el('td', {}, renderVerifyBadges(e.creator_key)),
        )
      }),
    ),
  )
  body.replaceChildren(tbl)
  if (entries.length > 0) lastFeedTopHash = entries[0].record_hash
  renderLoadMore()
}

function renderLoadMore() {
  const wrap = document.getElementById('feed-loadmore')
  if (!wrap) return
  const haveMore = feedTreeSize > feedEntries.length
  if (!haveMore) { wrap.replaceChildren(); return }
  const remaining = feedTreeSize - feedEntries.length
  const btn = el('button', {
    class: 'load-more',
    onclick: loadOlder,
  }, `load older (${remaining.toLocaleString()} more)`)
  wrap.replaceChildren(btn)
}

async function loadOlder() {
  const wrap = document.getElementById('feed-loadmore')
  if (wrap) wrap.replaceChildren(el('span', { class: 'meta' }, 'loading…'))
  const ep = endpoints()
  // Pause polling while we paginate so the live tail doesn't race with our offset window.
  stopPolling()
  const offset = feedEntries.length
  const more = await fetchMaybe(`${ep.log}/recent?limit=50&offset=${offset}`)
  if (more._error || !more.entries || more.entries.length === 0) {
    if (wrap) wrap.replaceChildren(
      el('span', { class: 'meta' }, more._error || 'no more entries'),
    )
    if (isOverviewRoute()) startPolling()
    return
  }
  await resolveIdentities(more.entries.map(e => e.creator_key))
  renderFeed([...feedEntries, ...more.entries], false, more.tree_size ?? feedTreeSize)
  if (isOverviewRoute()) startPolling()
}
window.loadOlder = loadOlder

function populateQuickLinks(entries) {
  const wrap = document.getElementById('quick-links')
  if (!wrap || entries.length === 0) return
  // Pick the freshest entry that has all three IDs populated. Defensive:
  // every well-formed entry projection populates all three (record_hash +
  // context_id + creator_key are required by §2.3.1 binary entry layout),
  // but the filter guards against any future projection that drops a field
  // from listing payloads.
  const linkable = entries.find(
    (e) => e && e.record_hash && e.context_id && e.creator_key,
  ) ?? entries[0]
  const txn = entries.find((e) => e.event_type === 'transaction')
  // replaceChildren coerces non-Node args via String(), so passing JS null
  // renders the literal text "null". Filter optional links explicitly.
  const links = [
    el('a', { href: `#/action/${linkable.record_hash}` },
      'See a recent action ', el('span', { class: 'arrow' }, '→'),
    ),
    linkable.context_id && el('a', { href: `#/session/${linkable.context_id}` },
      'Browse a recent session ', el('span', { class: 'arrow' }, '→'),
    ),
    linkable.creator_key && el('a', { href: `#/identity/${linkable.creator_key}` },
      'Inspect an identity ', el('span', { class: 'arrow' }, '→'),
    ),
    txn && el('a', { href: `#/action/${txn.record_hash}` },
        'See a transaction ', el('span', { class: 'arrow' }, '→'),
      ),
  ].filter(Boolean)
  wrap.replaceChildren(...links)
}

// ─── Polling ─────────────────────────────────────────────────────────────

function isOverviewRoute() {
  const h = location.hash.replace(/^#/, '')
  return !h || h === '/' || h === '/overview'
}

function startPolling() {
  stopPolling()
  pollHandle = setInterval(async () => {
    if (document.hidden) return
    if (!isOverviewRoute()) { stopPolling(); return }
    const ep = endpoints()
    const [recent, stats, checkpoint] = await Promise.all([
      fetchMaybe(`${ep.log}/recent?limit=${RECENT_LIMIT}`),
      fetchMaybe(`${ep.log}/stats`),
      fetchTextMaybe(`${ep.log}/checkpoint`),
    ])
    updatePulseStrip(stats, checkpoint)
    if (recent._error || !recent.entries) return
    if (recent.entries.length === 0) return
    if (recent.entries[0].record_hash === lastFeedTopHash) return
    // Prepend any newly-arrived entries (those above lastFeedTopHash) instead
    // of replacing the whole feed, preserves the user's loaded-older state.
    const knownTop = lastFeedTopHash
    const newOnes = []
    for (const e of recent.entries) {
      if (e.record_hash === knownTop) break
      newOnes.push(e)
    }
    if (newOnes.length === 0) return
    await resolveIdentities(newOnes.map(e => e.creator_key))
    renderFeed([...newOnes, ...feedEntries], true, recent.tree_size ?? feedTreeSize)
  }, POLL_INTERVAL_MS)
}

function stopPolling() {
  if (pollHandle) { clearInterval(pollHandle); pollHandle = null }
}

// Independent ticker that re-renders any cell tagged with data-ts so
// "Xs ago" labels don't go stale between polls. Runs every 10s globally
// (cheap; just a querySelectorAll + textContent set per cell).
// Independent of polling because rows stay in the DOM across polls.
function tickRelativeTimes() {
  const cells = document.querySelectorAll('[data-ts]')
  cells.forEach((cell) => {
    const ts = parseInt(cell.dataset.ts, 10)
    if (Number.isFinite(ts)) cell.textContent = timeAgo(ts)
  })
}
setInterval(tickRelativeTimes, 10000)

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isOverviewRoute() && !pollHandle) startPolling()
  // Also tick immediately when the tab becomes visible so the first
  // glance shows fresh times rather than "5s ago" from minutes prior.
  if (!document.hidden) tickRelativeTimes()
})

// ─── Session view ────────────────────────────────────────────────────────

async function renderSession(contextId) {
  setActiveNav(null)
  const ep = endpoints()
  const root = el('div')

  root.append(viewHeader({
    crumb: 'session',
    title: 'Session',
    subject: contextId,
    explainer: [
      'A ',
      el('span', { class: 'term' }, 'session'),
      ' is one chunk of agent work. Every record sharing the same ',
      el('code', {}, 'context_id'),
      ' (16-byte hex) belongs to it. The records form a graph: chained in order, sometimes converging on a transaction. The graph below is built only from what the records themselves contain (§3.2.4). No semantic interpretation, no operator policy.',
    ],
  }))

  // Try graph first; fall back to log-derived nodes when the graph hasn't
  // ingested this session. The log is the source of truth; the graph is a
  // derived view that may be unreachable or behind on ingestion.
  let graph = await fetchMaybe(`${ep.graph}/graph/${contextId}`)
  let usingFallback = false

  if (graph._error || !graph.nodes || graph.nodes.length === 0) {
    const logEntries = await fetchMaybe(`${ep.log}/by-context/${contextId}`)
    if (!logEntries._error && logEntries.entries && logEntries.entries.length > 0) {
      usingFallback = true
      // Adapt log-entry shape into the graph node shape the renderer expects.
      graph = {
        node_count: logEntries.entries.length,
        edge_count: 0,
        edges: [],
        nodes: logEntries.entries.map(e => ({
          id: e.record_hash,
          event_type: e.event_type,
          creator_key: e.creator_key,
          timestamp: e.timestamp_ms,
          verification_state: 'log_committed',
        })),
      }
    } else {
      root.append(el('section', { class: 'panel' },
        el('div', { class: 'empty' },
          el('span', { class: 'icon' }, '○'),
          'No records found for this context_id in either the graph or the log.',
        ),
      ))
      clearAndRender(root)
      return
    }
  }

  const hasTx = graph.has_transaction || graph.nodes.some(n => n.event_type === 'transaction')
  await resolveIdentities(graph.nodes.map(n => n.creator_key).filter(Boolean))

  root.append(el('div', { class: 'pulse-strip' },
    pulseStat('nodes', String(graph.node_count ?? graph.nodes.length)),
    pulseStat('edges', String(graph.edge_count ?? graph.edges?.length ?? 0)),
    pulseStat('transaction', hasTx ? 'present' : 'none', hasTx ? 'session converges on a transaction' : 'no transaction record'),
    pulseStat('participants', String(new Set(graph.nodes.map(n => n.creator_key).filter(Boolean)).size), 'distinct identities'),
  ))

  if (usingFallback) {
    root.append(el('div', {
      style: 'background: var(--info-subtle); border: 1px solid var(--info-border); color: var(--info); padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px;',
    },
      el('strong', { style: 'font-weight: 600;' }, 'Showing log-derived view. '),
      'graph-node hasn\'t ingested records under this context_id yet, so edges are unavailable. Showing the records as a tabular list pulled directly from the log (the source of truth).',
    ))
  }

  const hasEdges = graph.edges && graph.edges.length > 0

  if (hasEdges) {
    // Graph view: shared Sigma DAG renderer. Same pipeline as the trace view.
    // The transaction node (if any) is the focal, sessions converge on a
    // transaction, so highlighting it visually mirrors the "session climax"
    // mental model the pulse-strip already calls out.
    const graphContainer = el('div', { class: 'trace-graph', id: 'session-graph-container' },
      el('div', { class: 'loading' }, 'rendering session graph…'),
    )
    const nodeLegendRow = el('div', { class: 'legend-row', id: 'session-node-legend' })
    const edgeLegendRow = el('div', { class: 'legend-row', id: 'session-edge-legend' })
    const legend = el('div', { class: 'graph-legend' },
      el('span', { class: 'legend-label' }, 'nodes'),
      nodeLegendRow,
      el('span', { class: 'legend-label' }, 'edges'),
      edgeLegendRow,
    )

    const danglingCount = graph.edges.filter((e) => e.dangling === true).length
    const meta = `${graph.nodes.length} nodes · ${graph.edges.length} edges${danglingCount > 0 ? ` · ${danglingCount} dangling` : ''} · §3.2.4`

    root.append(el('section', { class: 'panel flush' },
      el('div', { class: 'panel-head' },
        el('h2', {}, 'session graph'),
        el('span', { class: 'meta' }, meta),
      ),
      graphContainer,
      legend,
    ))

    clearAndRender(root)

    // Tear down any prior Sigma instance from a previous render before
    // starting a new one (prevents canvas + listener leaks).
    if (_activeSigmaInstance) {
      try { _activeSigmaInstance.kill() } catch {}
      _activeSigmaInstance = null
    }

    try {
      await loadGraphLibs()
    } catch (e) {
      graphContainer.replaceChildren(el('div', { class: 'err-banner' },
        el('span', { class: 'label' }, 'graph library load error:'), ' ', e.message,
      ))
      return
    }

    graphContainer.replaceChildren()
    const { sigma } = renderSigmaDAG(graphContainer, graph, {
      isFocalNode: (n) => n.event_type === 'transaction',
    })
    _activeSigmaInstance = sigma
    populateGraphLegend(nodeLegendRow, edgeLegendRow, graph)
    return
  }

  // No-edges fallback: log-derived view (graph-node hasn't ingested) OR a
  // genesis-only session with no derived edges. Render the records as a
  // table since there's no graph structure to show.
  root.append(el('section', { class: 'feed-wrap' },
    el('div', { class: 'feed-head' },
      el('h2', {}, `nodes (${graph.nodes.length})`),
      el('span', { class: 'meta' }, usingFallback ? 'from log (graph not ingested)' : 'derived per spec §3.2.4'),
    ),
    el('div', {},
      el('table', { class: 'feed' },
        el('thead', {}, el('tr', {},
          el('th', {}, 'event'),
          el('th', {}, 'action'),
          el('th', {}, 'identity'),
          el('th', { class: 'shrink' }, 'when'),
          el('th', {}, 'verification'),
        )),
        el('tbody', {},
          ...graph.nodes.map(n => el('tr', {},
            el('td', {}, renderEventChip(n.event_type, n.creator_key, n.event_type_uri)),
            // Dangling nodes (§3.2.4 step 6/7) have synthetic ids that no
            // /action/ route can resolve. Render the id but skip the link so
            // the user gets a clear "this is a placeholder" cue instead of a
            // broken navigation.
            el('td', {},
              n.event_type === 'dangling_node'
                ? el('span', { class: 'mono', title: 'unresolved reference (synthetic placeholder)' }, shorten(n.id, 13, 4))
                : el('a', { href: `#/action/${n.id}` },
                    el('span', { class: 'mono' }, shorten(n.id, 13, 4)),
                  )),
            el('td', {}, n.creator_key ? renderIdentityLabel(n.creator_key) : '—'),
            (() => {
              const tsMs = n.timestamp ? (typeof n.timestamp === 'number' ? n.timestamp : Date.parse(n.timestamp)) : null
              return el('td', {
                class: 'shrink',
                title: tsMs ? new Date(tsMs).toISOString() : '',
                ...(tsMs ? { 'data-ts': String(tsMs) } : {}),
              }, tsMs ? timeAgo(tsMs) : '—')
            })(),
            el('td', {}, badgeForState(n.verification_state)),
          )),
        ),
      ),
    ),
  ))

  clearAndRender(root)
}

function badgeForState(state) {
  const map = {
    unsigned:        ['warn', 'unsigned'],
    signature_valid: ['ok',   '✓ signed'],
    log_committed:   ['ok',   '✓ logged'],
    witnessed:       ['ok',   '✓ witnessed'],
  }
  const [cls, txt] = map[state] || ['dim', state || '—']
  return el('span', { class: `badge ${cls}` }, txt)
}
