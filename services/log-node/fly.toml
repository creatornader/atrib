app = 'atrib-log'
primary_region = 'iad'

[build]
  dockerfile = '../../services/log-node/Dockerfile'

[env]
  PORT = '3100'
  HOST = '0.0.0.0'
  ATRIB_LOG_PERSIST = '/data/entries.bin'

[[mounts]]
  source = 'atrib_log_data'
  destination = '/data'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[checks]
  [checks.health]
    port = 3100
    type = 'http'
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    # /v1/pubkey always returns 200 (even with an empty tree); /v1/checkpoint
    # returns 404 until the first entry lands. With persistence in place a
    # restart now restores the tree, so /v1/checkpoint would also work, but
    # /v1/pubkey is robust against the cold-start case too.
    path = '/v1/pubkey'
