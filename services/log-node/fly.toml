app = 'atrib-log'
primary_region = 'iad'

[build]
  dockerfile = '../../services/log-node/Dockerfile'

[env]
  PORT = '3100'
  HOST = '0.0.0.0'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[checks]
  [checks.health]
    port = 3100
    type = 'http'
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/v1/checkpoint'
