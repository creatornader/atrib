app = 'atrib-graph'
primary_region = 'iad'

[build]
  dockerfile = '../../services/graph-node/Dockerfile'

[env]
  PORT = '3200'
  HOST = '0.0.0.0'
  # Append-only archive of every successful /v1/ingest. Replayed on
  # cold-start so graph-node rebuilds its in-memory store after OOM /
  # deploy / fly machine reboot. Mounts on the [mounts] volume below.
  # See services/graph-node/src/persistence.ts for format + crash
  # semantics.
  ATRIB_RECORD_ARCHIVE = '/data/records.jsonl'

[[mounts]]
  source = 'atrib_graph_data'
  destination = '/data'

[http_service]
  internal_port = 3200
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  # Bumped from 256mb after observed OOM-kill on 2026-05-06 with ~1500 records
  # in-memory. graph-node holds all derived edges + per-record verification
  # state in memory (no volume), so memory pressure scales with log size.
  # 1024mb gives headroom for several thousand records before OOM.
  memory = '1024mb'
