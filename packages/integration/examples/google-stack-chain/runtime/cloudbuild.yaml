substitutions:
  _LOCATION: us-central1
  _REPOSITORY: atrib-demos
  _IMAGE: atrib-google-evidence-runtime
  _TAG: local

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - packages/integration/examples/google-stack-chain/runtime/Dockerfile
      - -t
      - ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      - -t
      - ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - .

images:
  - ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
  - ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
