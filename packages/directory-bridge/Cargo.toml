[package]
name = "atrib-directory-bridge"
version = "0.1.0"
edition = "2021"
description = "Rust→WASM bridge exposing Meta's AKD primitives to @atrib/directory"
license = "Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
akd = { version = "0.12", default-features = false, features = ["public_auditing", "whatsapp_v1", "serde_serialization"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
console_error_panic_hook = { version = "0.1", optional = true }
getrandom = { version = "0.2", features = ["js"] }
bincode = "1"
hex = "0.4"

[features]
default = ["console_error_panic_hook"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
# IMPORTANT: this profile MUST be built via `./build-wasm.sh` (not bare
# `wasm-pack build`). The wrapper sets --remap-path-prefix flags that
# strip the builder's $HOME from debug info, panic locations, and
# DWARF symbols. Without it, every WASM panic message contains the
# builder's full path verbatim. See build-wasm.sh + README.md.
#
# The Cargo-native `trim-paths = "all"` would be the cleaner fix but
# is still nightly-only as of Cargo 1.90 despite RFC 3127. Migrate
# when stable.
