# pre-commit.com configuration for atrib contributors.
#
# Run-once setup:
#   pip install pre-commit  (or: brew install pre-commit)
#   pre-commit install
#
# After setup, the hooks below run on every `git commit`. They cover
# the public-facing concerns: secret scanning, formatting, lint.
# Maintainers may run additional checks via their own hook chains;
# nothing here depends on those, and contributors don't need to set
# them up.

repos:
  # Secret/credential scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ['--config', '.gitleaks.toml']

  # Narrative-leak detection (catalog-driven prose patterns)
  - repo: https://github.com/creatornader/leakguard
    rev: v0.1.1
    hooks:
      - id: leakguard

  # Structural-leak detection (no private path in public tree)
  - repo: https://github.com/creatornader/oss-twin
    rev: v0.1.1
    hooks:
      - id: oss-twin-check

  # Generic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: |
          (?x)^(
              packages/directory/wasm/.*|
              .*\.wasm
          )$
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
              packages/directory/wasm/.*|
              .*\.wasm|
              .*\.png|
              .*\.svg
          )$
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
        exclude: '^spec/conformance/'  # corpus files have specific structure
      - id: check-added-large-files
        args: [--maxkb=1000]
        exclude: '^packages/directory/wasm/'  # WASM blob is intentional

  # Prettier, local hook using the project's installed prettier
  # (devDependency in package.json, so any contributor who ran
  # `pnpm install` has it). The pre-commit-mirrors-prettier hook is
  # archived; using a local hook is the project-recommended path.
  - repo: local
    hooks:
      - id: prettier-check
        name: prettier (check formatting)
        entry: pnpm exec prettier --check
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]
        exclude: |
          (?x)^(
              spec/conformance/.*|
              packages/directory/wasm/.*|
              pnpm-lock\.yaml
          )$
