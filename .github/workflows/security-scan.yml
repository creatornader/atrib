name: security-scan

# Two-tier credential / secret scanning for atrib.
#
# Tier 1: gitleaks, fast pattern-based credential scanner. Runs on every
#   push and PR. Uses .gitleaks.toml at repo root for atrib-specific
#   allowlists (Ed25519 public keys in conformance vectors are not
#   credentials).
#
# Tier 2: TruffleHog, verified-secrets scanner. Calls the live API for
#   each candidate to confirm a real credential vs a regex-shaped string.
#   Runs weekly + on push to main. Slower but high-precision.
#
# Why both: gitleaks catches what the pattern catalog knows about (regex
# precision), TruffleHog catches what the catalog doesn't (entropy +
# verification). Defense in depth.
#
# Vale (prose-leak linter) is run locally via a pre-commit hook with
# a project-specific style configuration. The style configuration is
# not part of this workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly TruffleHog full-history sweep, Sunday 09:00 UTC. Catches
    # drift if a credential ever lands outside CI (manual force-push,
    # admin override, etc.).
    - cron: '0 9 * * 0'

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (credential pattern scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans every commit

      # gitleaks-action v2 auto-detects .gitleaks.toml at repo root.
      # Don't pass config-path (deprecated in v2 API).
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    name: TruffleHog (verified-secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Full-repo scan. The action's base/head diff mode requires
      # base != head, which fails on push-to-main and on schedule
      # events. Full-repo scan works in all trigger contexts and only
      # adds a few seconds. --results=verified,unknown surfaces both
      # live-API-confirmed credentials (verified) and pattern matches
      # without verification support (unknown), suppresses raw entropy
      # noise.
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown
