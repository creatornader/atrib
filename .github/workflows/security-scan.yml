name: security-scan

# Multi-tier security scanning for atrib.
#
# Tier 1 (every push + PR):
#   - typos:     spelling check across spec, ADRs, code comments
#   - gitleaks:  pattern-based credential scanner
#   - TruffleHog: verified-secrets scanner with live API confirmation
#
# Tier 2 (schedule-only, deeper scans):
#   - OSV-Scanner: transitive-dep CVE check across the OSV database.
#                  Runs Sunday 09:00 UTC. Complements gitleaks
#                  (credentials) + TruffleHog (live secrets) by covering
#                  the third surface: known CVEs in lockfiles. Overlaps
#                  Dependabot but uses a different database.
#
# Vale (prose-leak linter) is intentionally not in CI — local pre-commit
# hook with a project-specific style configuration covers it. Layer B
# (LLM semantic prose audit) is also local-only for cost reasons.
#
# OSSF Scorecard is documented in the public-flip runbook and will be
# added when the repo is public (Scorecard scores public-repo signals;
# private repos return N/A for most checks).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 09:00 UTC — full security sweep.
    - cron: '0 9 * * 0'

permissions:
  contents: read

jobs:
  typos:
    name: typos (spelling check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # crate-ci/typos action; reads _typos.toml at repo root for
      # project-specific config (base64url + hex blob suppressions,
      # vendor proper nouns).
      - uses: crate-ci/typos@v1.46.1

  gitleaks:
    name: gitleaks (credential pattern scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so gitleaks scans every commit

      # We invoke gitleaks directly rather than via gitleaks-action@v2
      # because the action's bundled gitleaks binary (8.24.3 as of
      # 2026-05-04) does not honor [[allowlists]] semantics the same way
      # newer versions do — even with GITLEAKS_CONFIG set and
      # regexTarget=line, the conformance-corpus public-key fixtures
      # still trigger generic-api-key flags. Pinning to 8.30+ (matches
      # local pre-push hook version) restores allowlist behavior.
      # Re-evaluate when gitleaks-action bumps its bundled binary.
      #
      # Inputs to this step are all CI-controlled constants: a literal
      # release URL, a literal version, and github.workspace (the runner
      # path). No user-controlled github.event.* fields flow into either
      # run: command. Per the github.blog injection guide.
      - name: Install gitleaks 8.30.1
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (project config)
        env:
          GITLEAKS_CONFIG_PATH: ${{ github.workspace }}/.gitleaks.toml
        run: gitleaks git --no-banner -c "$GITLEAKS_CONFIG_PATH"

  trufflehog:
    name: TruffleHog (verified-secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

  osv-scanner:
    name: OSV-Scanner (CVE scan, scheduled)
    # Reusable workflow from google/osv-scanner-action. Runs full repo
    # scan + uploads SARIF to GHAS Code Scanning. Code Scanning requires
    # GitHub Pro for private repos — until the public flip, the upload
    # step will fail cleanly while the scan output still appears in the
    # workflow logs.
    if: github.event_name == 'schedule'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      actions: read
      security-events: write
      contents: read
