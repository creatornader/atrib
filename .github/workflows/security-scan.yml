name: security-scan

# Multi-tier security scanning for atrib.
#
# Tier 1 (every push + PR):
#   - typos:     spelling check across spec, ADRs, code comments
#   - gitleaks:  pattern-based credential scanner
#   - TruffleHog: verified-secrets scanner with live API confirmation
#
# Tier 2 (schedule-only, deeper scans):
#   - OSV-Scanner: transitive-dep CVE check across the OSV database.
#                  Runs Sunday 09:00 UTC. Complements gitleaks
#                  (credentials) + TruffleHog (live secrets) by covering
#                  the third surface: known CVEs in lockfiles. Overlaps
#                  Dependabot but uses a different database.
#
# Vale (prose-leak linter) is intentionally not in CI — local pre-commit
# hook with a project-specific style configuration covers it. Layer B
# (LLM semantic prose audit) is also local-only for cost reasons.
#
# OSSF Scorecard is documented in the public-flip runbook and will be
# added when the repo is public (Scorecard scores public-repo signals;
# private repos return N/A for most checks).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 09:00 UTC — full security sweep.
    - cron: '0 9 * * 0'

permissions:
  contents: read

jobs:
  typos:
    name: typos (spelling check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # crate-ci/typos action; reads _typos.toml at repo root for
      # project-specific config (base64url + hex blob suppressions,
      # vendor proper nouns).
      - uses: crate-ci/typos@v1.46.0

  gitleaks:
    name: gitleaks (credential pattern scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans every commit

      # gitleaks-action v2 needs GITLEAKS_CONFIG set explicitly to load
      # the custom .gitleaks.toml at repo root. Without it, the action
      # runs gitleaks's default ruleset only, which flags the conformance
      # corpus's high-entropy public-key and provenance_token values as
      # generic-api-key matches (CI failure observed on 4fba1b9). Both
      # GITHUB_TOKEN and GITLEAKS_CONFIG resolve from CI-controlled
      # contexts (no user-controlled inputs flow through this step).
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

  trufflehog:
    name: TruffleHog (verified-secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

  osv-scanner:
    name: OSV-Scanner (CVE scan, scheduled)
    # Reusable workflow from google/osv-scanner-action. Runs full repo
    # scan + uploads SARIF to GHAS Code Scanning. Code Scanning requires
    # GitHub Pro for private repos — until the public flip, the upload
    # step will fail cleanly while the scan output still appears in the
    # workflow logs.
    if: github.event_name == 'schedule'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    permissions:
      actions: read
      security-events: write
      contents: read
