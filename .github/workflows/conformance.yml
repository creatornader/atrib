name: Conformance corpus drift check

on:
  push:
    paths:
      - 'packages/log-dev/scripts/**'
      - 'spec/conformance/**'
  pull_request:
    paths:
      - 'packages/log-dev/scripts/**'
      - 'spec/conformance/**'


# Default to read-only GITHUB_TOKEN; jobs that need more (release.yml does)
# specify their own permissions block. Closes CodeQL alert
# actions/missing-workflow-permissions.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @atrib/mcp build

      - run: pnpm --filter @atrib/log-dev corpus

      - name: Check for uncommitted corpus changes
        run: git diff --exit-code spec/conformance/2.6.1/
